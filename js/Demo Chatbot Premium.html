        function getAvailableScientists(){
            const materia=(typeof CONFIG!=='undefined'&&CONFIG.materia)?CONFIG.materia:'Física';
            const isCiencias=materia.toLowerCase().includes('ciencia')||materia.toLowerCase().includes('natural')||materia.toLowerCase().includes('biolog')||materia.toLowerCase().includes('quím');
            const filtered={};
            Object.entries(SCIENTISTS).forEach(([k,v])=>{
                if(!v.area||v.area==='ambas') filtered[k]=v;
                else if(v.area==='ciencias'&&isCiencias) filtered[k]=v;
                else if(v.area==='fisica'&&!isCiencias) filtered[k]=v;
            });
            return filtered;
        }

        // ═══ BUILD DOM ═══
        function build(){
            if(document.getElementById('pg-root'))return;
            const sc=SCIENTISTS[currentSci];
            const root=document.createElement('div');root.id='pg-root';
            root.innerHTML=`
        <div id="pg-bubble" title="Asistente IA"><div id="pg-pulse"></div>${sc.svg}<div id="pg-badge">💬</div></div>
        <div id="pg-win">
        <div id="pg-hdr"><div id="pg-hdr-av">${sc.svg}</div><div id="pg-hdr-info"><div id="pg-hdr-name">${sc.full}</div><div id="pg-hdr-status">Asistente IA Interactivo</div></div>
        <button class="pg-hb" id="pg-btn-sci" title="Cambiar personaje"><i class="fa-solid fa-users"></i></button>
        <button class="pg-hb" id="pg-btn-key" title="API Key"><i class="fa-solid fa-key"></i></button>
        <button class="pg-hb" id="pg-btn-x" title="Cerrar"><i class="fa-solid fa-xmark"></i></button></div>
        <div id="pg-panel"><h4>Elige tu mentor científico</h4><div id="pg-grid"></div></div>

        <div id="pg-sugg"></div>
        <div id="pg-inp"><textarea id="pg-ta" placeholder="Pregúntame algo..." rows="1"></textarea><button id="pg-send" title="Enviar"><i class="fa-solid fa-paper-plane"></i></button></div>
        <div id="pg-ov"><div id="pg-modal"><div style="font-size:40px;margin-bottom:10px">🔑</div><h3>API Key de Gemini</h3><p>Obtén tu clave gratuita en <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> para activar el chat inteligente.</p><input id="pg-ki" type="password" placeholder="AIzaSy..."/><div style="display:flex;gap:10px"><button class="pg-btn pg-btn-s" id="pg-kc">Cancelar</button><button class="pg-btn pg-btn-p" id="pg-ks">Guardar</button></div></div></div>
        </div>`;
            document.body.appendChild(root);
            buildCards();
            renderSugg();

        function buildCards(){
            const g=document.getElementById('pg-grid');g.innerHTML='';
            Object.entries(getAvailableScientists()).forEach(([k,sc])=>{
                const d=document.createElement('div');
                d.className='pg-sc'+(k===currentSci?' on':'');
                d.dataset.k=k;
                d.innerHTML=sc.svg+'<span>'+sc.name+'</span>';
                d.addEventListener('click',()=>pickSci(k));
                g.appendChild(d);
            });
        }

        function renderSugg(){
            const c=document.getElementById('pg-sugg');
            const materia=(typeof CONFIG!=='undefined'&&CONFIG.materia)?CONFIG.materia:'Física';
            const suggs=materia.includes('Ciencias')||materia.includes('Natural')
                ?["¿Qué recursos hay?","Explica la Evolución","Tabla Periódica","Estructura del ADN"]
                :["¿Qué recursos hay?","Leyes de Newton","¿Qué es el Momentum?","Explica la Gravedad"];
            suggs.forEach(s=>{
                const b=document.createElement('button');b.className='pg-sg';b.textContent=s;
                b.addEventListener('click',()=>{document.getElementById('pg-ta').value=s;handleSend();c.style.display='none'});
                c.appendChild(b);
            });
        }

        function updateColors(){
            const sc=SCIENTISTS[currentSci],r=document.getElementById('pg-root');
            r.style.setProperty('--c',sc.color);r.style.setProperty('--lt',sc.lt);r.style.setProperty('--glow',sc.glow);
        }

        function pickSci(k){
            currentSci=k;localStorage.setItem(STORAGE_SCI,k);
            const sc=SCIENTISTS[k];
            updateColors();
            document.getElementById('pg-hdr-av').innerHTML=sc.svg;
            document.getElementById('pg-hdr-name').textContent=sc.full;
            const b=document.getElementById('pg-bubble');b.querySelectorAll('svg').forEach(s=>s.remove());b.insertAdjacentHTML('beforeend',sc.svg);
            document.querySelectorAll('.pg-sc').forEach(c=>c.classList.toggle('on',c.dataset.k===k));
            chatHistory=[];document.getElementById('pg-msgs').innerHTML='';
            addMsg('b',sc.hi);
            document.getElementById('pg-panel').classList.remove('show');
            document.getElementById('pg-sugg').style.display='flex';
        }

        // ═══ MENSAJES ═══
        function addMsg(role,text){
            const c=document.getElementById('pg-msgs'),d=document.createElement('div');
            d.className='pg-m '+(role==='b'?'pg-mb':'pg-mu');
            if(role==='b'){d.innerHTML=renderMD(text);setTimeout(()=>{if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([d]).catch(()=>{});d.querySelectorAll('pre code').forEach(b=>{if(window.hljs)hljs.highlightElement(b)})},50)}
            else d.textContent=text;
            c.appendChild(d);c.scrollTop=c.scrollHeight;
        }

        function showTyp(){const c=document.getElementById('pg-msgs'),d=document.createElement('div');d.id='pg-typ';d.className='pg-typ';d.innerHTML='<span></span><span></span><span></span>';c.appendChild(d);c.scrollTop=c.scrollHeight}
        function hideTyp(){const e=document.getElementById('pg-typ');if(e)e.remove()}

        function renderMD(t){
            if(window.marked){try{marked.setOptions({breaks:true,gfm:true});return marked.parse(t)}catch(e){}}
            return t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
        }

        // ═══ GEMINI API ═══
        async function callGemini(msg){
            const key=getKey();if(!key)throw new Error('NO_KEY');
            const sc=SCIENTISTS[currentSci],ctx=getSiteContext();
            const materia = (typeof CONFIG !== 'undefined' && CONFIG.materia) ? CONFIG.materia : 'Física';
            const sys=`${sc.prompt}\n\n${ctx}\n\nReglas:\n1. Responde SIEMPRE en español.\n2. Usa Markdown. Fórmulas LaTeX: $inline$ y $$bloque$$\n3. Puedes responder sobre CUALQUIER tema de ${materia}, STEM.\n4. Sé pedagógico: explica el porqué.\n5. Recomienda recursos del sitio web si es pertinente.\n6. Máximo 400 palabras.`;
            
            const contents=[];
            chatHistory.slice(-12).forEach(m=>contents.push({role:m.r==='u'?'user':'model',parts:[{text:m.t}]}));
            contents.push({role:'user',parts:[{text:msg}]});
            
            const payload={
                system_instruction:{parts:[{text:sys}]},
                contents:contents,
                generationConfig:{temperature:.7,maxOutputTokens:2048}
            };
            
            const savedModel=localStorage.getItem('pg_workingModel');
            let modelsToTry=[];
            if(savedModel)modelsToTry.push(savedModel);
            GEMINI_MODELS.forEach(m=>{if(!modelsToTry.includes(m))modelsToTry.push(m)});
            
            for(const model of modelsToTry){
                try{
                    const res=await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
                        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}
                    );
                    const data=await res.json();
                    
                    if(data.error){
                        if(data.error.message.includes('not found')||data.error.code===404) continue;
                        if(data.error.message.includes('Quota')||data.error.code===429){
                            const waitMatch=data.error.message.match(/retry in ([\d.]+)s/i);
                            throw new Error('QUOTA|'+(waitMatch?Math.ceil(parseFloat(waitMatch[1])):15));
                        }
                        throw new Error(data.error.message);
                    }
                    if(data.candidates?.[0]?.content?.parts?.[0]?.text){
                        localStorage.setItem('pg_workingModel',model);
                        return data.candidates[0].content.parts[0].text;
                    }
                    throw new Error('Respuesta vacía');
                }catch(err){
                    if(err.message.startsWith('QUOTA|'))throw err;
                    if(model===modelsToTry[modelsToTry.length-1])throw err;
                }
            }
            throw new Error('No se pudo conectar.');
        }

        async function fetchWithRetry(url,options,retries=3,delay=2000){
            try{
                const res=await fetch(url,options);
                if((res.status===429||res.status===503)&&retries>0){
                    await new Promise(r=>setTimeout(r,delay));
                    return fetchWithRetry(url,options,retries-1,delay*2);
                }
                return res;
            }catch(err){
                if(retries>0){await new Promise(r=>setTimeout(r,delay));return fetchWithRetry(url,options,retries-1,delay*2)}
                throw err;
            }
        }

        async function handleSend(){
            const ta=document.getElementById('pg-ta'),btn=document.getElementById('pg-send'),t=ta.value.trim();
            if(!t||isTyping)return;
            if(!hasKey()){document.getElementById('pg-ov').classList.add('show');return}
            document.getElementById('pg-sugg').style.display='none';
            addMsg('u',t);chatHistory.push({r:'u',t});ta.value='';ta.style.height='auto';
            isTyping=true;btn.disabled=true;showTyp();
            try{const r=await callGemini(t);hideTyp();addMsg('b',r);chatHistory.push({r:'b',t:r})}
            catch(e){hideTyp();
                if(e.message==='NO_KEY'){addMsg('b','🔑 Configura tu API Key para comenzar.');document.getElementById('pg-ov').classList.add('show')}
                else if(e.message.startsWith('QUOTA|')) addMsg('b',`⏳ **Cuota agotada.** Espera **${parseInt(e.message.split('|')[1])||15} segundos** e intenta de nuevo.`);
                else if(e.message.includes('API key')) addMsg('b','🔑 API Key inválida. Genera una nueva en [AI Studio](https://aistudio.google.com/apikey).');
                else addMsg('b','⚠️ Error: '+e.message)}
            finally{isTyping=false;btn.disabled=false;ta.focus()}
        }

        // ═══ EVENTS ═══
        function initEvents(){
            document.getElementById('pg-bubble').addEventListener('click',()=>{
                isOpen=true;document.getElementById('pg-bubble').classList.add('hide');document.getElementById('pg-win').classList.add('open');
                document.getElementById('pg-badge').style.display='none';
                if(!chatHistory.length)setTimeout(()=>addMsg('b',SCIENTISTS[currentSci].hi),300);
                setTimeout(()=>document.getElementById('pg-ta').focus(),500);
            });
            document.getElementById('pg-btn-x').addEventListener('click',()=>{isOpen=false;document.getElementById('pg-win').classList.remove('open');setTimeout(()=>document.getElementById('pg-bubble').classList.remove('hide'),300)});
            document.getElementById('pg-btn-sci').addEventListener('click',()=>document.getElementById('pg-panel').classList.toggle('show'));
            document.getElementById('pg-btn-key').addEventListener('click',()=>{document.getElementById('pg-ki').value=getKey();document.getElementById('pg-ov').classList.add('show')});
            document.getElementById('pg-ks').addEventListener('click',()=>{const k=document.getElementById('pg-ki').value.trim();if(k){setKey(k);document.getElementById('pg-ov').classList.remove('show');addMsg('b','✅ ¡Clave guardada!')}});
            document.getElementById('pg-kc').addEventListener('click',()=>document.getElementById('pg-ov').classList.remove('show'));
            document.getElementById('pg-ki').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pg-ks').click()});
            document.getElementById('pg-send').addEventListener('click',handleSend);
            document.getElementById('pg-ta').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}});
            document.getElementById('pg-ta').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});
            document.addEventListener('keydown',e=>{if(e.key==='Escape'&&isOpen)document.getElementById('pg-btn-x').click()});
        }

        // ═══ INIT ═══
        function init(){
            if(document.getElementById('pg-root'))return;
            injectCSS();build();initEvents();
            console.log('🤖 Physics Genius PRO | Personaje: '+SCIENTISTS[currentSci].full);
        }

        if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
        else setTimeout(init,100);
        })();
    </script>
</body>
