<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno Interactivo de Lógica Proposicional</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' },
    startup: { typeset: false }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>
<style>
:root{
  --bg-body:#eef2f6; --paper-color:#ffffff; --paper-line:#d4e5f7;
  --primary:#6d28d9; --primary-dark:#4c1d95; --secondary:#8b5cf6;
  --accent:#f59e0b; --success:#10b981; --warning:#ef4444;
  --text-main:#1e1b4b; --text-muted:#64748b;
  --shadow-dark:6px 6px 16px rgba(109,40,217,.18);
  --clay-shadow:8px 8px 16px rgba(109,40,217,.2),-8px -8px 16px rgba(255,255,255,.9);
  --glass-bg:rgba(255,255,255,.7); --glass-border:1px solid rgba(255,255,255,.6);
}
body.dark-mode{
  --bg-body:#0f0b1f; --paper-color:#1a1433; --paper-line:#2d1e5f;
  --text-main:#e9d5ff; --text-muted:#a78bfa;
  --shadow-dark:4px 4px 10px rgba(0,0,0,.6);
  --clay-shadow:6px 6px 12px rgba(0,0,0,.5),-6px -6px 12px rgba(60,40,100,.3);
  --glass-bg:rgba(40,30,80,.6);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg-body);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .4s}
#app-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;perspective:2000px;padding:10px;gap:15px}
.book-wrapper{width:96%;max-width:1400px;height:85vh;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
.book{width:100%;height:100%;display:flex;background:transparent;position:relative}
.page{flex:1;background:var(--paper-color);position:relative;display:flex;flex-direction:column;overflow:hidden;background-image:linear-gradient(var(--paper-line) 1px,transparent 1px),linear-gradient(90deg,var(--paper-line) 1px,transparent 1px);background-size:20px 20px}
.page-left{border-radius:12px 0 0 12px;box-shadow:inset -15px 0 25px -10px rgba(0,0,0,.1),var(--shadow-dark);border-right:1px solid rgba(0,0,0,.05)}
.page-right{border-radius:0 12px 12px 0;box-shadow:inset 15px 0 25px -10px rgba(0,0,0,.1),var(--shadow-dark);border-left:1px solid rgba(0,0,0,.05)}
.page-content{padding:30px 45px;overflow-y:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--primary) transparent}
.page-content::-webkit-scrollbar{width:6px}
.page-content::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
.binding-spine{position:absolute;left:50%;top:30px;bottom:30px;width:40px;transform:translateX(-50%);z-index:20;pointer-events:none;display:flex;flex-direction:column;justify-content:space-evenly}
.metal-ring{width:100%;height:12px;background:linear-gradient(90deg,#888 0%,#eee 40%,#ddd 60%,#555 100%);border-radius:6px;box-shadow:0 4px 6px rgba(0,0,0,.2);position:relative}
.metal-ring::before,.metal-ring::after{content:'';position:absolute;top:2px;bottom:2px;width:5px;background:#2c3e50;border-radius:50%;opacity:.9}
.metal-ring::before{left:-3px}.metal-ring::after{right:-3px}
.holes-strip{position:absolute;top:30px;bottom:30px;width:15px;display:flex;flex-direction:column;justify-content:space-evenly;z-index:15;pointer-events:none}
.page-left .holes-strip{right:6px;align-items:flex-end}
.page-right .holes-strip{left:6px;align-items:flex-start}
.paper-hole{width:10px;height:10px;background:#2c3e50;border-radius:50%;box-shadow:inset 1px 1px 2px rgba(0,0,0,.6)}
h1,h2,h3,h4{color:var(--text-main);margin-bottom:.8rem}
h2{position:relative;display:inline-block;color:var(--primary);font-weight:800;font-size:1.6rem;margin-top:0}
h2::after{content:'';position:absolute;bottom:-5px;left:0;width:60%;height:4px;background:var(--accent);border-radius:2px}
h3{color:var(--primary-dark);font-size:1.15rem;margin-top:16px}
h4{color:var(--secondary);font-size:1.02rem;margin-top:12px}
p,li{line-height:1.65;font-size:.95rem;margin-bottom:8px;text-align:justify}
strong{color:var(--primary-dark)} em{color:var(--secondary)}
.clay-card{background:var(--paper-color);border-radius:16px;padding:16px;margin:10px 0;box-shadow:var(--clay-shadow);border:1px solid rgba(255,255,255,.2);transition:transform .2s}
.clay-card:hover{transform:translateY(-2px)}
.glass-panel{background:var(--glass-bg);backdrop-filter:blur(10px);border:var(--glass-border);border-radius:12px;padding:14px;margin:10px 0}
.def-box{border-left:5px solid var(--secondary);background:rgba(139,92,246,.08);padding:14px;border-radius:0 12px 12px 0;margin:12px 0}
.def-title{font-weight:800;color:var(--secondary);display:block;margin-bottom:6px;text-transform:uppercase;font-size:.82rem;letter-spacing:1px}
.concept-box{border-left:5px solid var(--primary);background:rgba(109,40,217,.08);padding:14px;border-radius:0 12px 12px 0;margin:12px 0}
.example-box{border-left:5px solid var(--success);background:rgba(16,185,129,.08);padding:14px;border-radius:0 12px 12px 0;margin:12px 0}
.example-title{font-weight:800;color:var(--success);display:block;margin-bottom:6px;font-size:.88rem}
.warning-box{border-left:5px solid var(--warning);background:rgba(239,68,68,.08);padding:14px;border-radius:0 12px 12px 0;margin:12px 0}
.formula-box{background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(109,40,217,.12));border:2px solid var(--secondary);border-radius:12px;padding:13px;margin:12px 0;text-align:center}
table{width:100%;border-collapse:collapse;font-size:.88rem;margin:12px 0}
th{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:#fff;padding:10px;text-align:center;font-weight:700}
td{padding:8px;border-bottom:1px solid rgba(0,0,0,.08);text-align:center}
tr:nth-child(even){background:rgba(0,0,0,.02)}
tr:hover{background:rgba(109,40,217,.05)}
body.dark-mode td{border-bottom-color:rgba(255,255,255,.08)}
.nav-dock{display:flex;gap:12px;align-items:center;background:var(--glass-bg);backdrop-filter:blur(15px);padding:8px 22px;border-radius:50px;box-shadow:0 10px 30px rgba(0,0,0,.1);z-index:100;border:var(--glass-border);flex-shrink:0}
.btn-circle{width:46px;height:46px;border-radius:50%;border:none;background:var(--bg-body);color:var(--primary);font-size:1.05rem;box-shadow:var(--clay-shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-circle:hover:not(:disabled){transform:scale(1.1);color:var(--accent)}
.btn-circle:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.page-badge{font-family:'Courier New',monospace;font-weight:bold;background:var(--primary);color:#fff;padding:6px 16px;border-radius:20px;box-shadow:inset 0 2px 5px rgba(0,0,0,.2);font-size:.85rem}
.cover-page{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#0f0b1f 0%,#1e1b4b 25%,#4c1d95 50%,#6d28d9 75%,#a78bfa 100%);color:#fff;margin:-30px -45px;width:calc(100% + 90px);height:calc(100% + 60px);position:relative;overflow:hidden}
.cover-page::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(245,158,11,.1) 60deg,transparent 120deg,rgba(139,92,246,.08) 180deg,transparent 240deg,rgba(167,139,250,.08) 300deg,transparent 360deg);animation:coverRotate 20s linear infinite;pointer-events:none}
.cover-page::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(245,158,11,.18) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(167,139,250,.15) 0%,transparent 50%);pointer-events:none}
@keyframes coverRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-20px) scale(1.1);opacity:1}}
@keyframes pulse-ring{0%{transform:translate(-50%,-50%) scale(.8);opacity:.4}50%{transform:translate(-50%,-50%) scale(1.1);opacity:.15}100%{transform:translate(-50%,-50%) scale(.8);opacity:.4}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,.4)}50%{box-shadow:0 0 40px rgba(245,158,11,.8)}}
.cover-particles{position:absolute;inset:0;pointer-events:none;z-index:1}
.cover-particle{position:absolute;border-radius:50%;background:rgba(245,158,11,.6);animation:float 6s ease-in-out infinite}
.cover-particle:nth-child(1){width:4px;height:4px;top:15%;left:10%;animation-delay:0s}
.cover-particle:nth-child(2){width:6px;height:6px;top:25%;left:80%;animation-delay:1s}
.cover-particle:nth-child(3){width:3px;height:3px;top:60%;left:15%;animation-delay:2s}
.cover-particle:nth-child(4){width:5px;height:5px;top:70%;left:75%;animation-delay:.5s}
.cover-particle:nth-child(5){width:3px;height:3px;top:40%;left:90%;animation-delay:3s}
.cover-particle:nth-child(6){width:4px;height:4px;top:85%;left:45%;animation-delay:1.5s}
.cover-particle:nth-child(7){width:5px;height:5px;top:10%;left:50%;animation-delay:2.5s}
.cover-particle:nth-child(8){width:3px;height:3px;top:50%;left:30%;animation-delay:4s}
.cover-orbit{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(245,158,11,.15);animation:pulse-ring 8s ease-in-out infinite;pointer-events:none;z-index:1}
.cover-orbit:nth-child(1){width:200px;height:200px;animation-delay:0s}
.cover-orbit:nth-child(2){width:340px;height:340px;animation-delay:1.5s}
.cover-orbit:nth-child(3){width:480px;height:480px;animation-delay:3s}
.cover-symbol{position:absolute;color:rgba(245,158,11,.25);font-family:'Cinzel',serif;font-weight:800;font-size:3rem;animation:float 8s ease-in-out infinite;z-index:2}
.cover-symbol:nth-of-type(1){top:18%;left:12%;animation-delay:0s}
.cover-symbol:nth-of-type(2){top:22%;right:14%;animation-delay:1s;font-size:3.5rem}
.cover-symbol:nth-of-type(3){bottom:24%;left:16%;animation-delay:2s;font-size:2.8rem}
.cover-symbol:nth-of-type(4){bottom:18%;right:18%;animation-delay:3s;font-size:3.2rem}
.cover-symbol:nth-of-type(5){top:50%;right:8%;animation-delay:4s;font-size:2.5rem}
.cover-symbol:nth-of-type(6){top:50%;left:6%;animation-delay:1.5s;font-size:2.5rem}
.cover-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeInUp 1s ease-out}
.cover-page h1{font-family:'Cinzel',serif;font-size:3rem;font-weight:800;margin:10px 0 5px;letter-spacing:5px;text-shadow:0 4px 20px rgba(0,0,0,.4),0 0 60px rgba(245,158,11,.3);background:linear-gradient(135deg,#fff 0%,#fbbf24 50%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
.cover-page h2{font-size:1.2rem;font-weight:600;margin:4px 0;letter-spacing:2px;color:#fff}
.cover-page h2::after{display:none}
.cover-icon-wrapper{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(245,158,11,.08));backdrop-filter:blur(10px);border:1px solid rgba(245,158,11,.3);display:flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 8px 32px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15);animation:glow 3s ease-in-out infinite}
.cover-icon{font-size:2.5rem;opacity:.95;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));color:#fbbf24}
.cover-subtitle{font-size:.85rem;letter-spacing:6px;text-transform:uppercase;opacity:.75;font-weight:600;margin-top:5px}
.cover-badge{background:linear-gradient(135deg,rgba(245,158,11,.3),rgba(245,158,11,.1));backdrop-filter:blur(10px);padding:12px 30px;border-radius:50px;margin-top:18px;font-weight:700;font-size:.98rem;letter-spacing:1px;border:1px solid rgba(245,158,11,.3);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.cover-separator{width:80px;height:3px;background:linear-gradient(90deg,transparent,rgba(245,158,11,.8),transparent);border-radius:2px;margin:8px 0}
.cover-footer{margin-top:22px;font-size:.78rem;opacity:.55;letter-spacing:1px}
.footer{font-size:.72rem;color:var(--text-muted);text-align:center;font-weight:600;flex-shrink:0;padding:2px 0}
.num-page{position:absolute;bottom:8px;font-size:.75rem;color:var(--text-muted);font-weight:bold}
.page-left .num-page{left:20px}.page-right .num-page{right:20px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:300}
.modal-overlay.active{display:flex}
.modal-content{background:var(--paper-color);border-radius:16px;padding:22px;max-width:640px;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3);color:var(--text-main)}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:1.5rem;color:var(--text-muted);cursor:pointer}
.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.index-item{padding:10px 12px;background:rgba(109,40,217,.06);border-radius:8px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:.88rem}
.index-item:hover{background:rgba(109,40,217,.15);border-left-color:var(--primary);transform:translateX(5px)}
#mobile-fab{display:none}
@media (max-width:900px){
  .book-wrapper{width:100%;height:78vh}
  .page-right{display:none}
  .page-left{width:100%;border-radius:12px;border:none;box-shadow:var(--clay-shadow)}
  .binding-spine{display:none}
  .cover-page{margin:-20px -20px;width:calc(100% + 40px);height:calc(100% + 40px)}
  .cover-page h1{font-size:2rem;letter-spacing:3px}
  .cover-icon-wrapper{width:70px;height:70px}
  .cover-icon{font-size:1.8rem}
  .nav-dock{padding:6px 14px;width:95%;justify-content:space-between;gap:6px}
  .btn-circle{width:38px;height:38px;font-size:.95rem}
  .page-badge{font-size:.75rem;padding:5px 10px}
  .page-content{padding:18px}
  h2{font-size:1.3rem}
  #mobile-fab{display:flex;position:fixed;top:15px;right:15px;z-index:200;background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:30px;font-weight:bold;box-shadow:0 5px 15px rgba(0,0,0,.3);align-items:center;gap:8px;cursor:pointer}
}
.interactive-controls{background:rgba(109,40,217,.05);border-radius:12px;padding:12px;margin:10px 0}
.control-row{display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap}
.control-label{font-weight:600;font-size:.85rem;min-width:80px;color:var(--primary-dark)}
.control-slider{flex:1;min-width:100px;height:6px;-webkit-appearance:none;appearance:none;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:3px;outline:none;cursor:pointer}
.control-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#fff;border:3px solid var(--primary);border-radius:50%;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.control-value{background:var(--primary);color:#fff;padding:4px 10px;border-radius:15px;font-weight:bold;font-size:.85rem;min-width:46px;text-align:center}
.result-display{background:linear-gradient(135deg,var(--success),var(--primary));color:#fff;padding:12px 15px;border-radius:12px;margin:10px 0;text-align:center}
.result-display .result-title{font-size:.72rem;opacity:.9;text-transform:uppercase;letter-spacing:1px}
.result-display .result-value{font-size:1.3rem;font-weight:800;margin-top:4px;font-family:'Courier New',monospace}
/* Tablas de verdad */
.tv-table th, .tv-table td{padding:8px 12px;font-family:'Courier New',monospace;font-weight:bold;font-size:.95rem}
.tv-table .tv-V{background:rgba(16,185,129,.18);color:#047857}
.tv-table .tv-F{background:rgba(239,68,68,.18);color:#b91c1c}
body.dark-mode .tv-table .tv-V{background:rgba(16,185,129,.25);color:#6ee7b7}
body.dark-mode .tv-table .tv-F{background:rgba(239,68,68,.25);color:#fca5a5}
.tv-table .tv-main{background:rgba(245,158,11,.18);color:#b45309;font-weight:900}
body.dark-mode .tv-table .tv-main{background:rgba(245,158,11,.3);color:#fcd34d}
/* Switches lógicos */
.logic-switch{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:10px;background:var(--bg-body);box-shadow:var(--clay-shadow);margin:4px;cursor:pointer;transition:all .2s;font-weight:700;user-select:none}
.logic-switch.on{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.logic-switch.off{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.logic-switch:hover{transform:scale(1.05)}
.bulb{display:inline-block;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle,#fbbf24 0%,#d97706 60%,#78350f 100%);box-shadow:0 0 30px rgba(245,158,11,.8),inset 0 0 10px rgba(0,0,0,.3);transition:all .4s;margin:0 10px;vertical-align:middle}
.bulb.off{background:radial-gradient(circle,#4b5563 0%,#1f2937 80%);box-shadow:inset 0 0 8px rgba(0,0,0,.5)}
/* Linea de tiempo */
.timeline{position:relative;padding:20px 0}
.timeline::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--primary),var(--accent),var(--secondary));border-radius:2px}
.tl-item{position:relative;padding-left:70px;margin-bottom:20px;opacity:0;animation:fadeInUp .7s ease forwards}
.tl-item:nth-child(1){animation-delay:0s}.tl-item:nth-child(2){animation-delay:.1s}.tl-item:nth-child(3){animation-delay:.2s}.tl-item:nth-child(4){animation-delay:.3s}.tl-item:nth-child(5){animation-delay:.4s}.tl-item:nth-child(6){animation-delay:.5s}.tl-item:nth-child(7){animation-delay:.6s}.tl-item:nth-child(8){animation-delay:.7s}
.tl-dot{position:absolute;left:14px;top:10px;width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 0 18px rgba(109,40,217,.6),0 4px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.75rem;border:3px solid var(--paper-color);z-index:2}
.tl-year{font-size:.75rem;color:var(--accent);font-weight:800;letter-spacing:1px}
.tl-title{font-size:1rem;font-weight:800;color:var(--primary-dark);margin:4px 0}
.tl-desc{font-size:.85rem;color:var(--text-muted);line-height:1.5}
/* Mapa conceptual */
.concept-map{position:relative;width:100%;height:420px;background:linear-gradient(135deg,rgba(109,40,217,.04),rgba(139,92,246,.04));border-radius:12px;overflow:hidden}
.cm-node{position:absolute;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:10px 14px;border-radius:12px;font-weight:700;font-size:.85rem;box-shadow:0 6px 16px rgba(109,40,217,.4);transform:translate(-50%,-50%);text-align:center;cursor:pointer;transition:transform .2s;white-space:nowrap;z-index:3}
.cm-node.root{background:linear-gradient(135deg,var(--accent),#d97706);font-size:1rem;box-shadow:0 8px 20px rgba(245,158,11,.5);padding:14px 20px;animation:glow 3s ease-in-out infinite}
.cm-node.child{background:linear-gradient(135deg,var(--success),#059669);font-size:.78rem;padding:8px 12px}
.cm-node:hover{transform:translate(-50%,-50%) scale(1.12);z-index:4}
.cm-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
/* Quiz */
.quiz-option{display:block;width:100%;padding:10px 14px;margin:6px 0;background:var(--paper-color);border:2px solid var(--paper-line);border-radius:10px;cursor:pointer;text-align:left;font-size:.92rem;font-weight:600;color:var(--text-main);transition:all .2s}
.quiz-option:hover{border-color:var(--primary);background:rgba(109,40,217,.05);transform:translateX(4px)}
.quiz-option.correct{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-color:#10b981;animation:glow 1.5s ease}
.quiz-option.wrong{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border-color:#ef4444}
/* Ley card */
.law-grid{display:grid;grid-template-columns:1fr;gap:8px}
.law-card{background:linear-gradient(135deg,rgba(109,40,217,.08),rgba(139,92,246,.05));border-left:4px solid var(--primary);border-radius:8px;padding:10px 14px;display:flex;gap:12px;align-items:center;transition:all .2s}

{ title:"1. Reseña histórica", left:{ html:`
<h2>1. Reseña histórica</h2>
<div class="def-box">
<span class="def-title"><i class="fa-solid fa-scroll"></i> ¿Qué es la lógica?</span>
<p>La <strong>lógica</strong> es la ciencia formal que estudia los <em>principios del razonamiento válido</em>. Su objetivo es distinguir los argumentos correctos de los incorrectos, analizando la estructura del pensamiento independientemente de su contenido.</p>
</div>
<h3>Orígenes antiguos</h3>
<p>La lógica nace en la <strong>Antigua Grecia</strong> con <em>Aristóteles</em> (384–322 a.C.), quien en su obra <em>Organon</em> sistematiza el <strong>silogismo</strong>: un razonamiento con dos premisas y una conclusión. Por ejemplo:</p>
<div class="formula-box" style="font-size:.92rem">
<strong>Todos los hombres son mortales. <br>Sócrates es hombre. <br>∴ Sócrates es mortal.</strong>
</div>
<p>Durante más de 2000 años la lógica aristotélica fue el único sistema formal conocido en Occidente.</p>
<div class="concept-box">
<h4><i class="fas fa-feather-pointed"></i> Aportes medievales</h4>
<p>Los <strong>escolásticos</strong> (s. XII–XIV) refinaron la lógica aristotélica. Destacan <em>Guillermo de Ockham</em> y <em>Duns Scoto</em>. Surgen las <em>obligationes</em> y el estudio de paradojas (como la del mentiroso).</p>
</div>`}, right:{ html:`
<div style="text-align:center">
<img src="../imagenes/logica/GeorgeBoole.png" alt="George Boole" class="historic-img">
<p style="font-size:.78rem;font-style:italic;color:var(--text-muted);margin-top:-4px"><strong>George Boole</strong> (1815–1864), padre del álgebra moderna de la lógica.</p>
</div>
<h3>Revolución moderna</h3>
<p>En el siglo <strong>XIX</strong>, <em>George Boole</em> publica <em>An Investigation of the Laws of Thought</em> (1854), introduciendo el <strong>álgebra booleana</strong>: la lógica se vuelve matemática.</p>
<p>A finales del siglo XIX, <em>Gottlob Frege</em> revoluciona el campo con la <strong>lógica de predicados</strong> y los <strong>cuantificadores</strong> (∀, ∃), sentando las bases de la lógica matemática moderna.</p>
<div class="example-box">
<span class="example-title"><i class="fas fa-microchip"></i> Siglo XX: Computación</span>
<p>En 1937, <em>Claude Shannon</em> demuestra que los circuitos eléctricos pueden implementar el álgebra booleana. <strong>Nace la era digital</strong>: cada procesador ejecuta millones de operaciones lógicas por segundo.</p>
</div>
<div class="warning-box">
<strong><i class="fas fa-quote-left"></i> Frase célebre</strong>
<p><em>"La lógica es el arte de no equivocarse."</em> — Bertrand Russell</p>
</div>`} },

{ title:"2. Línea de tiempo", left:{ html:`
<h2>2. Línea de tiempo de la lógica</h2>
<p>Un recorrido por los grandes momentos que dieron forma al pensamiento lógico.</p>
<div class="timeline">
<div class="tl-item"><div class="tl-dot">I</div>
<div class="tl-year">384 a.C. — 322 a.C.</div>
<div class="tl-title">Aristóteles</div>
<div class="tl-desc">Funda la lógica como disciplina en el <em>Organon</em>. Desarrolla el <strong>silogismo</strong> y las categorías.</div></div>

<div class="tl-item"><div class="tl-dot">II</div>
<div class="tl-year">334 a.C. — 262 a.C.</div>
<div class="tl-title">Crisipo y los Estoicos</div>
<div class="tl-desc">Desarrollan la <strong>lógica proposicional</strong>. Estudian los condicionales y las leyes de la implicación.</div></div>

<div class="tl-item"><div class="tl-dot">III</div>
<div class="tl-year">1287 — 1347</div>
<div class="tl-title">Guillermo de Ockham</div>
<div class="tl-desc">Refinamiento escolástico. La famosa <strong>"Navaja de Ockham"</strong>: entre hipótesis equivalentes, la más simple es preferible.</div></div>

<div class="tl-item"><div class="tl-dot">IV</div>
<div class="tl-year">1646 — 1716</div>
<div class="tl-title">Gottfried W. Leibniz</div>
<div class="tl-desc">Sueña con una <em>characteristica universalis</em>: un lenguaje simbólico universal. Precursor de la <strong>lógica formal moderna</strong>.</div></div>
</div>`}, right:{ html:`
<div class="timeline">
<div class="tl-item"><div class="tl-dot">V</div>
<div class="tl-year">1815 — 1864</div>
<div class="tl-title">George Boole</div>
<div class="tl-desc">Publica <em>The Laws of Thought</em>. Crea el <strong>álgebra booleana</strong>: operaciones lógicas tratadas como matemáticas.</div></div>

<div class="tl-item"><div class="tl-dot">VI</div>
<div class="tl-year">1848 — 1925</div>

/* ============ PÁGINA 4 · PROPOSICIONES Y CONECTIVOS ============ */
{ title:"4. Proposiciones y conectivos", left:{ html:`
<h2>4. Proposiciones y conectivos</h2>
<div class="def-box">
<span class="def-title"><i class="fa-solid fa-pen-nib"></i> Proposición</span>
<p>Una <strong>proposición</strong> $p$ es un enunciado declarativo que puede ser únicamente <em>verdadero</em> (V) o <em>falso</em> (F). No ambos, no ninguno.</p>
</div>
<h3>Tipos de proposiciones</h3>
<div class="concept-box">
<p><strong>Simples (atómicas):</strong> no se pueden descomponer. Ej: $p:$ <em>"Llueve"</em>.</p>
<p><strong>Compuestas (moleculares):</strong> formadas por conectivos. Ej: $p \\wedge q$.</p>
</div>
<h3>Los cinco conectivos fundamentales</h3>
<table class="tv-table">
<thead><tr><th>Símbolo</th><th>Nombre</th><th>Se lee</th></tr></thead>
<tbody>
<tr><td><strong>¬ p</strong></td><td>Negación</td><td>"no p"</td></tr>
<tr><td><strong>p ∧ q</strong></td><td>Conjunción</td><td>"p y q"</td></tr>
<tr><td><strong>p ∨ q</strong></td><td>Disyunción</td><td>"p o q"</td></tr>
<tr><td><strong>p → q</strong></td><td>Condicional</td><td>"si p entonces q"</td></tr>
<tr><td><strong>p ↔ q</strong></td><td>Bicondicional</td><td>"p si y solo si q"</td></tr>
</tbody></table>`}, right:{ html:`
<h3>Laboratorio de conectivos <i class="fas fa-flask"></i></h3>
<div class="interactive-controls">
<p style="text-align:center;font-size:.9rem;margin-bottom:10px">Haz clic en los interruptores para cambiar el valor de p y q:</p>
<div style="text-align:center;margin:12px 0">
<span class="logic-switch on" id="sw-p" onclick="togglePQ('p')">p = V</span>
<span class="logic-switch on" id="sw-q" onclick="togglePQ('q')">q = V</span>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
<div class="glass-panel" style="text-align:center"><div style="font-size:.75rem;color:var(--text-muted);font-weight:700">¬p</div><div id="r-not" class="bulb"></div></div>
<div class="glass-panel" style="text-align:center"><div style="font-size:.75rem;color:var(--text-muted);font-weight:700">p ∧ q</div><div id="r-and" class="bulb"></div></div>
<div class="glass-panel" style="text-align:center"><div style="font-size:.75rem;color:var(--text-muted);font-weight:700">p ∨ q</div><div id="r-or" class="bulb"></div></div>
<div class="glass-panel" style="text-align:center"><div style="font-size:.75rem;color:var(--text-muted);font-weight:700">p → q</div><div id="r-imp" class="bulb"></div></div>
<div class="glass-panel" style="text-align:center;grid-column:1/3"><div style="font-size:.75rem;color:var(--text-muted);font-weight:700">p ↔ q</div><div id="r-iff" class="bulb"></div></div>
</div>
</div>
<div class="warning-box" style="margin-top:8px">
<strong><i class="fas fa-info-circle"></i> Recuerda</strong>
<p>💡 = proposición verdadera. 🌑 = proposición falsa. Observa cómo cambia cada conectivo cuando cambias $p$ o $q$.</p>
</div>`} },

/* ============ PÁGINA 5 · TABLAS DE VERDAD BÁSICAS ============ */
{ title:"5. Tablas de verdad básicas", left:{ html:`
<h2>5. Tablas de verdad</h2>
<div class="def-box">
<span class="def-title"><i class="fa-solid fa-table"></i> Definición</span>
<p>Una <strong>tabla de verdad</strong> enumera <em>todos los valores posibles</em> de las proposiciones atómicas y muestra el valor resultante de la fórmula.</p>
</div>
<p>Con $n$ proposiciones hay $2^n$ filas. Por ejemplo, con $p$ y $q$ hay $2^2 = 4$ combinaciones.</p>

<h3><i class="fas fa-not-equal"></i> Negación ¬p</h3>
<table class="tv-table"><thead><tr><th>p</th><th>¬p</th></tr></thead><tbody>
<tr><td class="tv-V">V</td><td class="tv-F tv-main">F</td></tr>
<tr><td class="tv-F">F</td><td class="tv-V tv-main">V</td></tr>
</tbody></table>

<h3>Conjunción p ∧ q</h3>
<p style="font-size:.85rem">Verdadera solo cuando <strong>ambas</strong> son verdaderas.</p>
<table class="tv-table"><thead><tr><th>p</th><th>q</th><th>p ∧ q</th></tr></thead><tbody>
<tr><td class="tv-V">V</td><td class="tv-V">V</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-V">V</td><td class="tv-F">F</td><td class="tv-F tv-main">F</td></tr>
<tr><td class="tv-F">F</td><td class="tv-V">V</td><td class="tv-F tv-main">F</td></tr>
<tr><td class="tv-F">F</td><td class="tv-F">F</td><td class="tv-F tv-main">F</td></tr>
</tbody></table>

<h3>Disyunción p ∨ q</h3>
<p style="font-size:.85rem">Verdadera cuando <strong>al menos una</strong> es verdadera (inclusiva).</p>
<table class="tv-table"><thead><tr><th>p</th><th>q</th><th>p ∨ q</th></tr></thead><tbody>
<tr><td class="tv-V">V</td><td class="tv-V">V</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-V">V</td><td class="tv-F">F</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-F">F</td><td class="tv-V">V</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-F">F</td><td class="tv-F">F</td><td class="tv-F tv-main">F</td></tr>
</tbody></table>`}, right:{ html:`
<h3><i class="fas fa-arrow-right-long"></i> Condicional p → q</h3>
<p style="font-size:.85rem"><strong>Falsa solo</strong> cuando el antecedente es V y el consecuente F.</p>
<table class="tv-table"><thead><tr><th>p</th><th>q</th><th>p → q</th></tr></thead><tbody>
<tr><td class="tv-V">V</td><td class="tv-V">V</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-V">V</td><td class="tv-F">F</td><td class="tv-F tv-main">F</td></tr>
<tr><td class="tv-F">F</td><td class="tv-V">V</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-F">F</td><td class="tv-F">F</td><td class="tv-V tv-main">V</td></tr>
</tbody></table>

<h3><i class="fas fa-right-left"></i> Bicondicional p ↔ q</h3>
<p style="font-size:.85rem">Verdadera cuando ambas tienen el <strong>mismo valor</strong>.</p>
<table class="tv-table"><thead><tr><th>p</th><th>q</th><th>p ↔ q</th></tr></thead><tbody>
<tr><td class="tv-V">V</td><td class="tv-V">V</td><td class="tv-V tv-main">V</td></tr>
<tr><td class="tv-V">V</td><td class="tv-F">F</td><td class="tv-F tv-main">F</td></tr>
<tr><td class="tv-F">F</td><td class="tv-V">V</td><td class="tv-F tv-main">F</td></tr>
<tr><td class="tv-F">F</td><td class="tv-F">F</td><td class="tv-V tv-main">V</td></tr>
</tbody></table>

<div class="example-box">
<span class="example-title"><i class="fas fa-star"></i> Curiosidad</span>
<p>El condicional <strong>p → q</strong> también se llama <em>implicación material</em>. Cuando el antecedente es falso, la implicación es <strong>trivialmente verdadera</strong> ("ex falso quodlibet").</p>
</div>

<div class="warning-box">
<strong><i class="fas fa-brain"></i> Pregúntate:</strong>
<p>¿Puedes construir la tabla de verdad de $(p \\wedge q) \\to r$ sin ayuda? Tendrá $2^3 = 8$ filas. ¡En la siguiente página podrás verificarlo con el generador!</p>
</div>`} },

</div>`}, right:{ html:`

/* ============ PÁGINA 7 · LEYES (I) ============ */
{ title:"7. Leyes de la lógica (I)", left:{ html:`
<h2>7. Leyes de la lógica <span style="font-size:.6em;color:var(--accent)">Parte I</span></h2>
<div class="def-box">
<span class="def-title"><i class="fa-solid fa-scroll"></i> Equivalencias lógicas</span>
<p>Dos proposiciones son <strong>equivalentes</strong> ($\\Leftrightarrow$) si tienen la misma tabla de verdad. Las <em>leyes de la lógica</em> son equivalencias fundamentales que permiten simplificar fórmulas.</p>
</div>
<div class="law-grid">
<div class="law-card"><div class="law-num">1</div><div class="law-body"><div class="law-name">Doble negación</div><div class="law-formula">$\\neg\\neg p \\Leftrightarrow p$</div></div></div>
<div class="law-card"><div class="law-num">2</div><div class="law-body"><div class="law-name">Conmutativa</div>
<div class="law-formula">$p \\lor q \\Leftrightarrow q \\lor p$<br>$p \\land q \\Leftrightarrow q \\land p$<br>$p \\leftrightarrow q \\Leftrightarrow q \\leftrightarrow p$</div></div></div>
<div class="law-card"><div class="law-num">3</div><div class="law-body"><div class="law-name">Asociativa</div>
<div class="law-formula">$(p \\lor q) \\lor r \\Leftrightarrow p \\lor (q \\lor r)$<br>$(p \\land q) \\land r \\Leftrightarrow p \\land (q \\land r)$</div></div></div>
<div class="law-card"><div class="law-num">4</div><div class="law-body"><div class="law-name">Distributiva</div>
<div class="law-formula">$p \\lor (q \\land r) \\Leftrightarrow (p \\lor q) \\land (p \\lor r)$<br>$p \\land (q \\lor r) \\Leftrightarrow (p \\land q) \\lor (p \\land r)$</div></div></div>
<div class="law-card"><div class="law-num">5</div><div class="law-body"><div class="law-name">Idempotencia</div>
<div class="law-formula">$p \\lor p \\Leftrightarrow p$ &nbsp;·&nbsp; $p \\land p \\Leftrightarrow p$</div></div></div>
</div>`}, right:{ html:`
<div class="law-grid">
<div class="law-card"><div class="law-num">6</div><div class="law-body"><div class="law-name">Leyes de De Morgan</div>
<div class="law-formula">$\\neg(p \\lor q) \\Leftrightarrow \\neg p \\land \\neg q$<br>$\\neg(p \\land q) \\Leftrightarrow \\neg p \\lor \\neg q$</div></div></div>
<div class="law-card"><div class="law-num">7</div><div class="law-body"><div class="law-name">Implicación</div>
<div class="law-formula">$p \\to q \\Leftrightarrow \\neg p \\lor q$<br>$p \\to q \\Leftrightarrow \\neg(p \\land \\neg q)$</div></div></div>
<div class="law-card"><div class="law-num">8</div><div class="law-body"><div class="law-name">Contrarrecíproco</div>
<div class="law-formula">$p \\to q \\Leftrightarrow \\neg q \\to \\neg p$</div></div></div>
<div class="law-card"><div class="law-num">9</div><div class="law-body"><div class="law-name">Bicondicional</div>
<div class="law-formula">$p \\leftrightarrow q \\Leftrightarrow (p \\to q) \\land (q \\to p)$</div></div></div>
<div class="law-card"><div class="law-num">10</div><div class="law-body"><div class="law-name">Identidad</div>
<div class="law-formula">$p \\lor F \\Leftrightarrow p$ &nbsp;·&nbsp; $p \\land V \\Leftrightarrow p$</div></div></div>
<div class="law-card"><div class="law-num">11</div><div class="law-body"><div class="law-name">Dominación</div>
<div class="law-formula">$p \\lor V \\Leftrightarrow V$ &nbsp;·&nbsp; $p \\land F \\Leftrightarrow F$</div></div></div>
<div class="law-card"><div class="law-num">12</div><div class="law-body"><div class="law-name">Complemento</div>
<div class="law-formula">$p \\lor \\neg p \\Leftrightarrow V$ &nbsp;·&nbsp; $p \\land \\neg p \\Leftrightarrow F$</div></div></div>
</div>
<div class="example-box" style="margin-top:10px;font-size:.88rem">
<span class="example-title"><i class="fas fa-star"></i> Ejemplo: De Morgan</span>
<p>Niega: <em>"Voy al cine y estudio"</em>.</p>
<p>$\\neg(p \\land q) \\equiv \\neg p \\lor \\neg q$</p>
<p>→ <em>"No voy al cine o no estudio"</em>.</p>
</div>`} },

/* ============ PÁGINA 8 · LEYES (II) ============ */
{ title:"8. Leyes de la lógica (II)", left:{ html:`
<h2>8. Leyes de la lógica <span style="font-size:.6em;color:var(--accent)">Parte II</span></h2>
<p>Continuamos con las equivalencias e <strong>implicaciones lógicas</strong> más usadas en demostraciones:</p>
<div class="law-grid">
<div class="law-card"><div class="law-num">13</div><div class="law-body"><div class="law-name">Absorción</div>
<div class="law-formula">$p \\lor (p \\land q) \\Leftrightarrow p$<br>$p \\land (p \\lor q) \\Leftrightarrow p$</div></div></div>
<div class="law-card"><div class="law-num">14</div><div class="law-body"><div class="law-name">Exportación</div>
<div class="law-formula">$(p \\land q) \\to r \\Leftrightarrow p \\to (q \\to r)$</div></div></div>
<div class="law-card"><div class="law-num">15</div><div class="law-body"><div class="law-name">Reducción al absurdo</div>
<div class="law-formula">$p \\to q \\Leftrightarrow (p \\land \\neg q) \\to F$</div></div></div>
<div class="law-card"><div class="law-num">16</div><div class="law-body"><div class="law-name">Adición</div>
<div class="law-formula">$p \\Rightarrow p \\lor q$</div></div></div>
<div class="law-card"><div class="law-num">17</div><div class="law-body"><div class="law-name">Simplificación</div>
<div class="law-formula">$p \\land q \\Rightarrow p$ &nbsp;·&nbsp; $p \\land q \\Rightarrow q$</div></div></div>
<div class="law-card"><div class="law-num">18</div><div class="law-body"><div class="law-name">Adjunción</div>
<div class="law-formula">$p, \\; q \\Rightarrow p \\land q$</div></div></div>
</div>`}, right:{ html:`
<div class="law-grid">
<div class="law-card"><div class="law-num">19</div><div class="law-body"><div class="law-name">Modus Ponens</div>
<div class="law-formula">$[p \\land (p \\to q)] \\Rightarrow q$</div></div></div>
<div class="law-card"><div class="law-num">20</div><div class="law-body"><div class="law-name">Modus Tollens</div>
<div class="law-formula">$[(p \\to q) \\land \\neg q] \\Rightarrow \\neg p$</div></div></div>
<div class="law-card"><div class="law-num">21</div><div class="law-body"><div class="law-name">Silogismo disyuntivo</div>
<div class="law-formula">$[(p \\lor q) \\land \\neg p] \\Rightarrow q$</div></div></div>
<div class="law-card"><div class="law-num">22</div><div class="law-body"><div class="law-name">Silogismo hipotético</div>
<div class="law-formula">$[(p \\to q) \\land (q \\to r)] \\Rightarrow (p \\to r)$</div></div></div>
<div class="law-card"><div class="law-num">23</div><div class="law-body"><div class="law-name">Dilema constructivo</div>
<div class="law-formula">$[(p \\to q) \\land (r \\to s)] \\land (p \\lor r) \\Rightarrow (q \\lor s)$</div></div></div>
<div class="law-card"><div class="law-num">24</div><div class="law-body"><div class="law-name">Dilema destructivo</div>
<div class="law-formula">$[(p \\to q) \\land (r \\to s)] \\land (\\neg q \\lor \\neg s) \\Rightarrow (\\neg p \\lor \\neg r)$</div></div></div>
<div class="law-card"><div class="law-num">25</div><div class="law-body"><div class="law-name">Transitividad ↔</div>
<div class="law-formula">$[(p \\leftrightarrow q) \\land (q \\leftrightarrow r)] \\Rightarrow (p \\leftrightarrow r)$</div></div></div>
</div>
<div class="warning-box" style="margin-top:10px;font-size:.85rem">
<strong><i class="fas fa-triangle-exclamation"></i> Distinción importante</strong>
<p><strong>⇔</strong> (equivalencia): es una <em>tautología</em> bidireccional.<br><strong>⇒</strong> (implicación): solo garantiza que si la premisa es V, la conclusión es V.</p>
</div>`} },

/* ============ PÁGINA 9 · REGLAS DE INFERENCIA ============ */
{ title:"9. Reglas de inferencia", left:{ html:`
<h2>9. Reglas de inferencia</h2>
<div class="def-box">
<span class="def-title"><i class="fa-solid fa-magnifying-glass-arrow-right"></i> ¿Qué es inferir?</span>
<p>Una <strong>regla de inferencia</strong> permite obtener nuevas proposiciones (<em>conclusiones</em>) a partir de otras dadas (<em>premisas</em>), garantizando que <em>si las premisas son verdaderas, la conclusión también</em>.</p>
</div>

<h3>Modus Ponendo Ponens (PP)</h3>
<div class="formula-box">
<p>Premisa 1: $p \\to q$</p>
<p>Premisa 2: $p$</p>
<p style="border-top:2px solid var(--primary);padding-top:8px;margin-top:8px"><strong>Conclusión: $q$</strong></p>
</div>
<p style="font-size:.85rem"><em>"Si afirmamos el antecedente, podemos afirmar el consecuente."</em></p>

<h3>Modus Tollendo Tollens (TT)</h3>
<div class="formula-box">
<p>Premisa 1: $p \\to q$</p>
<p>Premisa 2: $\\neg q$</p>
<p style="border-top:2px solid var(--primary);padding-top:8px;margin-top:8px"><strong>Conclusión: $\\neg p$</strong></p>
</div>
<p style="font-size:.85rem"><em>"Si negamos el consecuente, podemos negar el antecedente."</em></p>

<h3>Silogismo Hipotético (SH)</h3>
<div class="formula-box">
<p>Premisa 1: $p \\to q$</p>
<p>Premisa 2: $q \\to r$</p>
<p style="border-top:2px solid var(--primary);padding-top:8px;margin-top:8px"><strong>Conclusión: $p \\to r$</strong></p>
</div>`}, right:{ html:`
<h3>Tollendo Ponens (TP)</h3>
<div class="formula-box">
<p>Premisa 1: $p \\lor q$</p>
<p>Premisa 2: $\\neg p$</p>
<p style="border-top:2px solid var(--primary);padding-top:8px;margin-top:8px"><strong>Conclusión: $q$</strong></p>
</div>

<h3>Adjunción (A) y Simplificación (S)</h3>
<div class="formula-box" style="font-size:.95rem">
<p><strong>Adjunción:</strong> $p, q \\; \\vdash \\; p \\land q$</p>
<p><strong>Simplificación:</strong> $p \\land q \\; \\vdash \\; p$</p>
</div>

<h3>Ley de Adición (LA)</h3>
<div class="formula-box">
<p>Premisa: $p$</p>
<p style="border-top:2px solid var(--primary);padding-top:8px;margin-top:8px"><strong>Conclusión: $p \\lor q$</strong></p>
</div>

<div class="concept-box">
<h4><i class="fas fa-list-check"></i> Resumen de reglas</h4>
<ul style="font-size:.85rem">
<li><strong>PP</strong> — Modus Ponens</li>
<li><strong>TT</strong> — Modus Tollens</li>
<li><strong>SH</strong> — Silogismo Hipotético</li>
<li><strong>TP</strong> — Tollendo Ponens</li>
<li><strong>DN</strong> — Doble Negación</li>
<li><strong>A / S</strong> — Adjunción / Simplificación</li>
<li><strong>LA</strong> — Ley de Adición</li>
<li><strong>DS / SD</strong> — Silogismo disyuntivo / Simplificación disyuntiva</li>
<li><strong>Abs</strong> — Absorción</li>
<li><strong>LE</strong> — Ley de Exportación</li>
<li><strong>DM</strong> — Leyes de De Morgan</li>
<li><strong>LC / LA / LD</strong> — Conmutativa / Asociativa / Distributiva</li>
</ul>
</div>`} },

/* ============ PÁGINA 10 · EJEMPLOS RESUELTOS ============ */
{ title:"10. Ejemplos resueltos", left:{ html:`
<h2>10. Ejemplos resueltos</h2>

<div class="def-box">
<span class="def-title"><i class="fa-solid fa-fish"></i> Ejemplo 1 · La ballena</span>
<p><em>Si la ballena es un mamífero, entonces toma oxígeno del aire. Si toma su oxígeno del aire, entonces no necesita branquias. La ballena es un mamífero y vive en el océano. ∴ no necesita branquias.</em></p>
</div>

<h4>Simbolización</h4>
<div class="concept-box" style="font-size:.9rem">
<p>$p$: la ballena es un mamífero<br>$q$: toma oxígeno del aire<br>$r$: necesita branquias<br>$s$: habita en el océano</p>
</div>

<h4>Desarrollo</h4>
<table class="tv-table" style="font-size:.82rem">
<thead><tr><th>#</th><th>Fórmula</th><th>Regla</th></tr></thead>
<tbody>
<tr><td>P.1</td><td style="text-align:left">$p \\to q$</td><td>Premisa</td></tr>
<tr><td>P.2</td><td style="text-align:left">$q \\to \\neg r$</td><td>Premisa</td></tr>
<tr><td>P.3</td><td style="text-align:left">$p \\land s$</td><td>Premisa</td></tr>
<tr><td>C.4</td><td style="text-align:left">$p$</td><td>(P.3) Simp.</td></tr>
<tr><td>C.5</td><td style="text-align:left">$q$</td><td>(P.1, C.4) PP</td></tr>
<tr><td>C.6</td><td style="text-align:left">$\\neg r$</td><td>(P.2, C.5) PP</td></tr>
</tbody>
</table>
<div class="example-box">
<strong><i class="fas fa-circle-check"></i> Conclusión:</strong>
<p>La ballena <strong>no necesita branquias</strong>. ✓</p>
</div>`}, right:{ html:`
<div class="def-box">
<span class="def-title"><i class="fa-solid fa-cloud-rain"></i> Ejemplo 2 · Los ingenieros</span>
<p style="font-size:.88rem"><em>Si sigue lloviendo el río crece. Si sigue lloviendo y el río crece, el puente será arrastrado. Si la continuación de la lluvia hace que el puente sea arrastrado, no será suficiente un solo camino. O bien un solo camino es suficiente, o bien los ingenieros han cometido un error. ∴ los ingenieros han cometido un error.</em></p>
</div>

<h4>Simbolización</h4>
<div class="concept-box" style="font-size:.88rem">
$p$: continúa lloviendo · $q$: el río crece · $r$: el puente es arrastrado · $s$: un solo camino es suficiente · $t$: los ingenieros cometieron un error
</div>

<h4>Desarrollo</h4>
<table class="tv-table" style="font-size:.78rem">
<thead><tr><th>#</th><th>Fórmula</th><th>Regla</th></tr></thead>
<tbody>
<tr><td>P.1</td><td style="text-align:left">$p \\to q$</td><td>Premisa</td></tr>
<tr><td>P.2</td><td style="text-align:left">$(p \\land q) \\to r$</td><td>Premisa</td></tr>
<tr><td>P.3</td><td style="text-align:left">$r \\to \\neg s$</td><td>Premisa</td></tr>
<tr><td>P.4</td><td style="text-align:left">$s \\lor t$</td><td>Premisa</td></tr>
<tr><td>P.5</td><td style="text-align:left">$p$</td><td>Premisa adic.</td></tr>
<tr><td>C.6</td><td style="text-align:left">$q$</td><td>(1,5) PP</td></tr>
<tr><td>C.7</td><td style="text-align:left">$p \\land q$</td><td>(5,6) Adj.</td></tr>
<tr><td>C.8</td><td style="text-align:left">$r$</td><td>(2,7) PP</td></tr>
<tr><td>C.9</td><td style="text-align:left">$\\neg s$</td><td>(3,8) PP</td></tr>
<tr><td>C.10</td><td style="text-align:left">$t$</td><td>(4,9) TP</td></tr>
</tbody></table>
<div class="example-box">
<strong><i class="fas fa-circle-check"></i> Conclusión:</strong>
<p>Los <strong>ingenieros han cometido un error</strong>. ✓</p>
</div>`} },

/* ============ PÁGINA 11 · EVALUADOR Y QUIZ ============ */
{ title:"11. Evaluador y Quiz", left:{ html:`
<h2>11. Evaluador de proposiciones</h2>
<div class="concept-box">
<p>Asigna valores de verdad a $p, q, r$ y evalúa cualquier fórmula compuesta:</p>
</div>
<div class="interactive-controls">
<div style="text-align:center;margin:8px 0">
<span class="logic-switch on" id="ev-p" onclick="toggleEv('p')">p = V</span>
<span class="logic-switch on" id="ev-q" onclick="toggleEv('q')">q = V</span>
<span class="logic-switch on" id="ev-r" onclick="toggleEv('r')">r = V</span>
</div>
<div style="text-align:center">
<input type="text" id="ev-formula" class="lg-input" value="(p > q) & (q > r)" style="width:85%">
</div>
<div style="text-align:center;margin-top:6px">
<button class="lg-btn" onclick="evaluateFormula()"><i class="fas fa-play"></i> Evaluar</button>
</div>
</div>
<div id="ev-result" class="result-display">
<div class="result-title">Resultado</div>
<div class="result-value" id="ev-value">—</div>
</div>
<div class="warning-box" style="font-size:.85rem">
<strong><i class="fas fa-info-circle"></i> Sintaxis:</strong> usa <code>&amp;</code> (∧), <code>|</code> (∨), <code>~</code> (¬), <code>&gt;</code> (→), <code>=</code> (↔).
</div>`}, right:{ html:`
<h2 style="margin-top:0">Quiz interactivo</h2>
<div id="quiz-container"></div>
<div style="text-align:center;margin-top:10px">
<button class="lg-btn" onclick="nextQuestion()"><i class="fas fa-forward"></i> Siguiente</button>

// ══════════════════════════════════════════════════════════
// MOTOR DE TABLAS DE VERDAD Y EVALUADOR
// ══════════════════════════════════════════════════════════
function tokenize(s){
  s = s.replace(/\s+/g,'');
  const toks = [];
  let i = 0;
  while(i < s.length){
    const c = s[i];
    if('pqrs'.includes(c)){ toks.push({t:'var', v:c}); i++; }
    else if(c==='~'){ toks.push({t:'not'}); i++; }
    else if(c==='&'){ toks.push({t:'and'}); i++; }
    else if(c==='|'){ toks.push({t:'or'}); i++; }
    else if(c==='>'){ toks.push({t:'imp'}); i++; }
    else if(c==='='){ toks.push({t:'iff'}); i++; }
    else if(c==='('){ toks.push({t:'lp'}); i++; }
    else if(c===')'){ toks.push({t:'rp'}); i++; }
    else throw new Error('Símbolo no reconocido: '+c);
  }
  return toks;
}
// Parser descendente: iff → imp → or → and → not → atom
function parse(tokens){
  let pos = 0;
  function peek(){ return tokens[pos]; }
  function eat(t){ if(peek() && peek().t===t){ return tokens[pos++]; } return null; }
  function parseIff(){
    let left = parseImp();
    while(peek() && peek().t==='iff'){ eat('iff'); const right = parseImp(); left = {op:'iff', l:left, r:right}; }
    return left;
  }
  function parseImp(){
    let left = parseOr();
    if(peek() && peek().t==='imp'){ eat('imp'); const right = parseImp(); return {op:'imp', l:left, r:right}; }
    return left;
  }
  function parseOr(){
    let left = parseAnd();
    while(peek() && peek().t==='or'){ eat('or'); const right = parseAnd(); left = {op:'or', l:left, r:right}; }
    return left;
  }
  function parseAnd(){
    let left = parseNot();
    while(peek() && peek().t==='and'){ eat('and'); const right = parseNot(); left = {op:'and', l:left, r:right}; }
    return left;
  }
  function parseNot(){
    if(peek() && peek().t==='not'){ eat('not'); return {op:'not', x:parseNot()}; }
    return parseAtom();
  }
  function parseAtom(){
    if(peek() && peek().t==='lp'){ eat('lp'); const e = parseIff(); if(!eat('rp')) throw new Error('Falta ")"'); return e; }
    if(peek() && peek().t==='var'){ return {op:'var', name:tokens[pos++].v}; }
    throw new Error('Token inesperado');
  }
  const e = parseIff();
  if(pos<tokens.length) throw new Error('Tokens sobrantes');
  return e;
}
function evalAST(ast, env){
  switch(ast.op){
    case 'var': return env[ast.name];
    case 'not': return !evalAST(ast.x, env);
    case 'and': return evalAST(ast.l, env) && evalAST(ast.r, env);
    case 'or':  return evalAST(ast.l, env) || evalAST(ast.r, env);
    case 'imp': return !evalAST(ast.l, env) || evalAST(ast.r, env);
    case 'iff': return evalAST(ast.l, env) === evalAST(ast.r, env);
  }
}
function collectVars(ast, set){
  if(ast.op==='var'){ set.add(ast.name); return; }
  if(ast.op==='not'){ collectVars(ast.x, set); return; }
  if(ast.l) collectVars(ast.l, set);
  if(ast.r) collectVars(ast.r, set);
}
function prettyFormula(s){
  return s.replace(/&/g,' ∧ ').replace(/\|/g,' ∨ ').replace(/~/g,'¬').replace(/>/g,' → ').replace(/=/g,' ↔ ');
}

window.generateTV = function(){
  const inp = document.getElementById('tv-formula').value.trim();
  const resEl = document.getElementById('tv-result');
  const classEl = document.getElementById('tv-classify');
  if(!inp){ resEl.innerHTML=''; classEl.innerHTML=''; return; }
  try{
    const ast = parse(tokenize(inp));
    const vset = new Set(); collectVars(ast, vset);
    const vars = [...vset].sort();
    const n = vars.length;
    const rows = 1<<n;
    let html = `<h4 style="margin-top:12px">Tabla de: <code>${prettyFormula(inp)}</code></h4><table class="tv-table"><thead><tr>`;
    vars.forEach(v => html += `<th>${v}</th>`);
    html += `<th style="background:linear-gradient(135deg,#f59e0b,#d97706)">resultado</th></tr></thead><tbody>`;
    let countV = 0, countF = 0;
    for(let i=rows-1;i>=0;i--){
      const env = {};
      vars.forEach((v,k) => env[v] = !!((i>>(n-1-k))&1));
      const r = evalAST(ast, env);
      if(r) countV++; else countF++;
      html += '<tr>';
      vars.forEach(v => html += `<td class="tv-${env[v]?'V':'F'}">${env[v]?'V':'F'}</td>`);
      html += `<td class="tv-${r?'V':'F'} tv-main">${r?'V':'F'}</td></tr>`;
    }
    html += '</tbody></table>';
    resEl.innerHTML = html;
    let cls, icon, col;
    if(countF===0){ cls='TAUTOLOGÍA'; icon='fa-circle-check'; col='var(--success)'; }
    else if(countV===0){ cls='CONTRADICCIÓN'; icon='fa-circle-xmark'; col='var(--warning)'; }
    else { cls='CONTINGENCIA'; icon='fa-circle-question'; col='var(--accent)'; }
    classEl.innerHTML = `<div class="result-display" style="background:linear-gradient(135deg,${col},var(--primary))"><div class="result-title">Clasificación</div><div class="result-value"><i class="fas ${icon}"></i> ${cls}</div><div style="font-size:.78rem;margin-top:6px;opacity:.92">V: ${countV} · F: ${countF} · Total: ${rows}</div></div>`;
  } catch(e){
    resEl.innerHTML = `<div class="warning-box"><strong><i class="fas fa-bug"></i> Error:</strong> ${e.message}. Revisa paréntesis y símbolos.</div>`;
    classEl.innerHTML = '';
  }
};
window.insertOp = function(op){
  const f = document.getElementById('tv-formula');
  const p = f.selectionStart; f.value = f.value.slice(0,p)+op+f.value.slice(p); f.focus(); f.selectionStart = f.selectionEnd = p+op.length;
};
window.loadExample = function(n){
  const f = document.getElementById('tv-formula');
  const examples = { 1:'~(p & q) = (~p | ~q)', 2:'(p > q) & (q > r) > (p > r)' };
  f.value = examples[n]; generateTV();
};

// Evaluador página 11
const evVals = {p:true, q:true, r:true};
window.toggleEv = function(v){
  evVals[v] = !evVals[v];
  const el = document.getElementById('ev-'+v);
  el.textContent = `${v} = ${evVals[v]?'V':'F'}`;
  el.classList.toggle('on', evVals[v]); el.classList.toggle('off', !evVals[v]);
};
window.evaluateFormula = function(){
  const f = document.getElementById('ev-formula').value.trim();
  const out = document.getElementById('ev-value');
  try{
    const ast = parse(tokenize(f));
    const env = {p:evVals.p, q:evVals.q, r:evVals.r, s:true};
    const r = evalAST(ast, env);
    out.textContent = r ? 'VERDADERO ✓' : 'FALSO ✗';
    document.getElementById('ev-result').style.background = r ? 'linear-gradient(135deg,#10b981,#059669)' : 'linear-gradient(135deg,#ef4444,#dc2626)';
  } catch(e){ out.textContent = 'ERROR'; }
};

// Lab de conectivos (página 4)
const pqVals = {p:true, q:true};
window.togglePQ = function(v){
  pqVals[v] = !pqVals[v];
  const el = document.getElementById('sw-'+v);
  el.textContent = `${v} = ${pqVals[v]?'V':'F'}`;
  el.classList.toggle('on', pqVals[v]); el.classList.toggle('off', !pqVals[v]);
  updateBulbs();
};
function updateBulbs(){
  const {p,q} = pqVals;
  const set = (id,val) => { const el = document.getElementById(id); if(el) el.classList.toggle('off', !val); };
  set('r-not', !p);
  set('r-and', p && q);
  set('r-or', p || q);
  set('r-imp', !p || q);
  set('r-iff', p === q);
}

// QUIZ
const QUIZ = [
  { q:"¿Cuál es la tabla de verdad de p → q cuando p = V y q = F?", options:["Verdadera","Falsa","Indeterminada"], answer:1, explain:"La implicación solo es falsa cuando V → F." },
  { q:"¿p ∧ ¬p es una...?", options:["Tautología","Contradicción","Contingencia"], answer:1, explain:"No puede ser V y F al mismo tiempo → siempre F." },
  { q:"¿Cuál es la negación de (p ∨ q)?", options:["¬p ∨ ¬q", "¬p ∧ ¬q", "p ∧ q"], answer:1, explain:"Por ley de De Morgan: ¬(p ∨ q) ≡ ¬p ∧ ¬q." },
  { q:"Si (p → q) y tenemos p, entonces por Modus Ponens concluimos:", options:["¬q","q","p ∧ q"], answer:1, explain:"El Modus Ponens nos permite afirmar el consecuente." },
  { q:"¿Cuál es el contrarrecíproco de p → q?", options:["q → p","¬p → ¬q","¬q → ¬p"], answer:2, explain:"El contrarrecíproco niega ambos y los invierte." },
  { q:"¿Cuántas filas tiene la tabla de verdad de una fórmula con 4 variables?", options:["8","16","32"], answer:1, explain:"2⁴ = 16 combinaciones." },
  { q:"¿p ∨ ¬p es una...?", options:["Tautología","Contradicción","Contingencia"], answer:0, explain:"Principio del tercero excluido: siempre V." }
];
let quizIdx = 0, quizScore = 0, quizAnswered = false;
function renderQuiz(){
  const c = document.getElementById('quiz-container'); if(!c) return;
  if(quizIdx >= QUIZ.length){
    c.innerHTML = `<div class="example-box" style="text-align:center"><span class="example-title"><i class="fas fa-trophy"></i> ¡Quiz terminado!</span><p style="font-size:1.1rem">Puntaje final: <strong>${quizScore} / ${QUIZ.length}</strong></p><p>${quizScore===QUIZ.length?'¡Perfecto! 🎉':quizScore>=QUIZ.length*0.7?'¡Muy bien! 👏':'Sigue practicando 💪'}</p></div>`;
    return;
  }
  const q = QUIZ[quizIdx];
  c.innerHTML = `<div class="concept-box"><h4>Pregunta ${quizIdx+1} de ${QUIZ.length}</h4><p style="font-size:.95rem">${q.q}</p></div>` +
    q.options.map((o,i)=>`<button class="quiz-option" data-i="${i}">${String.fromCharCode(65+i)}) ${o}</button>`).join('');
  c.querySelectorAll('.quiz-option').forEach(btn=>{
    btn.onclick = () => {
      if(quizAnswered) return;
      quizAnswered = true;
      const i = +btn.dataset.i;
      const correct = i===q.answer;
      if(correct){ btn.classList.add('correct'); quizScore++; }
      else{
        btn.classList.add('wrong');
        c.querySelectorAll('.quiz-option')[q.answer].classList.add('correct');
      }
      document.getElementById('score-value').textContent = `${quizScore} / ${quizIdx+1}`;
      const exp = document.createElement('div');
      exp.className = 'warning-box'; exp.style.marginTop = '10px';
      exp.innerHTML = `<strong><i class="fas fa-lightbulb"></i> Explicación:</strong><p>${q.explain}</p>`;
      c.appendChild(exp);
    };
  });
}
window.nextQuestion = function(){ if(!quizAnswered && quizIdx<QUIZ.length) return; quizIdx++; quizAnswered=false; renderQuiz(); };
window.restartQuiz = function(){ quizIdx=0; quizScore=0; quizAnswered=false; document.getElementById('score-value').textContent='0 / 0'; renderQuiz(); };

// Mapa conceptual - SVG conectores
function drawConceptMap(){
  const svg = document.getElementById('cm-svg');
  if(!svg) return;
  const lines = [
    [50,15,22,40],[50,15,50,40],[50,15,78,40],
    [22,40,10,72],[22,40,30,72],
    [50,40,44,72],[50,40,58,72],
    [78,40,75,72],[78,40,90,72]
  ];
  svg.innerHTML = lines.map(([x1,y1,x2,y2])=>`<line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%" stroke="rgba(109,40,217,0.45)" stroke-width="2" stroke-dasharray="4,4"/>`).join('');
}

window.currentPage = 0;
let mobileView = 'left';

document.addEventListener('DOMContentLoaded', () => {
  initSpine(); render(); handleResize();
  window.addEventListener('resize', handleResize);
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') nextPage();
    if (e.key === 'ArrowLeft') prevPage();
    if (e.key === 'Escape') hideIndex();
  });
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('theme-icon').className = 'fas fa-sun';
  }
});

function initSpine() {
  const s = document.getElementById('spine');
  const hL = document.getElementById('holes-l'); const hR = document.getElementById('holes-r');
  s.innerHTML=''; hL.innerHTML=''; hR.innerHTML='';
  for(let i=0;i<15;i++){
    s.innerHTML += '<div class="metal-ring"></div>';
    hL.innerHTML += '<div class="paper-hole"></div>';
    hR.innerHTML += '<div class="paper-hole"></div>';
  }
}

function render() {
  const d = BOOK_DATA[window.currentPage];
  document.getElementById('c-left').innerHTML = d.left.html;
  document.getElementById('c-right').innerHTML = d.right.html;
  document.getElementById('page-num').innerText = window.currentPage===0?"PORTADA":`HOJA ${window.currentPage} / ${BOOK_DATA.length-1}`;
  document.getElementById('btn-prev').disabled = window.currentPage===0;
  document.getElementById('btn-next').disabled = window.currentPage===BOOK_DATA.length-1;
  document.getElementById('num-left').innerText = window.currentPage>0 ? window.currentPage*2 : '';
  document.getElementById('num-right').innerText = window.currentPage*2+1;
  if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise().catch(()=>{});
  handleResize();
  setTimeout(()=>initDiagrams(),100);
}
window.nextPage = function(){ if(window.currentPage<BOOK_DATA.length-1){ window.currentPage++; animatePage(1); } };
window.prevPage = function(){ if(window.currentPage>0){ window.currentPage--; animatePage(-1); } };
window.goToPage = n => { window.currentPage = n; render(); };
function animatePage(dir){
  const b = document.getElementById('book-el');
  b.style.transform = `rotateY(${dir*-4}deg) scale(0.98)`;
  setTimeout(()=>{ render(); b.style.transform = 'rotateY(0) scale(1)'; },250);
}
window.showIndex = () => {
  const m = document.getElementById('index-modal'); const l = document.getElementById('index-list');
  l.innerHTML='';
  BOOK_DATA.forEach((p,i) => {
    const it = document.createElement('div'); it.className='index-item';
    it.innerHTML = `<strong>${i}.</strong> ${p.title}`;
    it.onclick = () => { goToPage(i); hideIndex(); };
    l.appendChild(it);
  });
  m.classList.add('active');
};
window.hideIndex = () => document.getElementById('index-modal').classList.remove('active');
window.toggleTheme = () => {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark?'dark':'light');
  document.getElementById('theme-icon').className = isDark?'fas fa-sun':'fas fa-moon';
};
function handleResize(){
  const isMob = window.innerWidth<=900;
  const l = document.getElementById('p-left'); const r = document.getElementById('p-right');
  if(isMob){
    if(mobileView==='left'){ l.style.display='flex'; r.style.display='none'; document.getElementById('fab-text').textContent='Ver Der.'; }
    else { l.style.display='none'; r.style.display='flex'; document.getElementById('fab-text').textContent='Ver Izq.'; }
  } else { l.style.display='flex'; r.style.display='flex'; }
}
window.toggleMobileSide = () => { mobileView = mobileView==='left'?'right':'left'; handleResize(); };

function initDiagrams(){
  if(document.getElementById('concept-map')) drawConceptMap();
  if(document.getElementById('r-and')) updateBulbs();
  if(document.getElementById('quiz-container') && !document.querySelector('.quiz-option')) renderQuiz();
  if(document.getElementById('tv-formula') && !document.getElementById('tv-result').innerHTML) generateTV();
}
