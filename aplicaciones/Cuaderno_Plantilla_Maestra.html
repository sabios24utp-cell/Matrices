        function drawGrid(ctx, w, h, ox, oy, scale = 30) {
            ctx.strokeStyle = '#e8e8e8';
            ctx.lineWidth = 0.5;
            for (let i = ox % scale; i < w; i += scale) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
            for (let i = oy % scale; i < h; i += scale) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(w, oy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, h); ctx.stroke();
            ctx.fillStyle = '#666';
            ctx.beginPath(); ctx.moveTo(w - 10, oy - 5); ctx.lineTo(w, oy); ctx.lineTo(w - 10, oy + 5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(ox - 5, 10); ctx.lineTo(ox, 0); ctx.lineTo(ox + 5, 10); ctx.fill();
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('X', w - 15, oy + 18);
            ctx.fillText('Y', ox + 10, 15);
        }

        // ========== GeoGebra-like Canvas System ==========
        const canvasStates = {};

        function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

        function ensureCanvasSize(canvas, container) {
            const rect = container.getBoundingClientRect();
            const w = rect.width || 300;
            const h = rect.height || 240;
            if (canvas.width !== w || canvas.height !== h) {
                canvas.width = w;
                canvas.height = h;
                return true;
            }
            return false;
        }

        function createGeoGebraCanvas(containerId, options = {}) {
            const container = document.getElementById(containerId);
            if (!container) return null;

            // Check if state exists
            let state = canvasStates[containerId];

            // If state exists, BUT container is empty (DOM was wiped), we need to re-init DOM
            const needsDomInit = !container.querySelector('.ggb-wrapper');

            // Initialize state if it doesn't exist
            if (!state) {
                // Scales can be independent. Default to isotropic 30.
                const baseScale = options.scale ?? 30;
                state = {
                    scaleX: options.scaleX ?? baseScale,
                    scaleY: options.scaleY ?? baseScale,
                    offsetX: options.offsetX ?? 0,
                    offsetY: options.offsetY ?? 0,
                    forceStep: options.forceStep,
                    isDragging: false,
                    hasUserInteracted: false, // Track if user has moved the view
                    lastX: 0,
                    lastY: 0,
                    minScale: 0.1,
                    maxScale: 200,
                    drawCallback: null,
                };
                canvasStates[containerId] = state;
            }

            // If DOM is already set up and we have state, just return existing refs (unless passed container is different, which shouldn't happen by ID)
            // Actually, querying by ID gets the current DOM node.
            // If needsDomInit is false, it means we are good.
            if (!needsDomInit && state.container === container && state.canvas) {
                return { container: state.container, canvas: state.canvas, state };
            }

            // --- DOM INITIALIZATION ---
            container.innerHTML = `
                <div class="ggb-wrapper">
                    <canvas class="ggb-canvas"></canvas>
                    <div class="ggb-toolbar">
                        <button class="ggb-btn" data-action="zoomin" title="ACERCAR (Zoom In)"><i class="fas fa-search-plus"></i></button>
                        <button class="ggb-btn" data-action="zoomout" title="ALEJAR (Zoom Out)"><i class="fas fa-search-minus"></i></button>
                        <button class="ggb-btn" data-action="drag" title="Arrastrar"><i class="fas fa-hand-paper"></i></button>
                        <button class="ggb-btn" data-action="reset" title="Restablecer"><i class="fas fa-sync-alt"></i></button>
                    </div>
                </div>`;

            const canvas = container.querySelector('.ggb-canvas');

            // Update state refs
            state.container = container;
            state.canvas = canvas;

            ensureCanvasSize(canvas, container);

            // Toolbar buttons
            container.querySelectorAll('.ggb-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    const action = btn.dataset.action;
                    if (action === 'zoomin') {
                        state.scaleX = Math.min(state.maxScale, state.scaleX * 1.2);
                        state.scaleY = Math.min(state.maxScale, state.scaleY * 1.2);
                        state.hasUserInteracted = true;
                    }
                    if (action === 'zoomout') {
                        state.scaleX = Math.max(state.minScale, state.scaleX * 0.8);
                        state.scaleY = Math.max(state.minScale, state.scaleY * 0.8);
                        state.hasUserInteracted = true;
                    }
                    if (action === 'reset') {
                        state.scaleX = options.scaleX ?? (options.scale ?? 30);
                        state.scaleY = options.scaleY ?? (options.scale ?? 30);
                        state.offsetX = 0;
                        state.offsetY = 0;
                        state.hasUserInteracted = false; // Reset interaction state
                    }
                    state.drawCallback && state.drawCallback();
                });
            });

            // Mouse drag
            const down = (e) => {
                state.isDragging = true;
                state.hasUserInteracted = true;
                state.lastX = e.clientX; state.lastY = e.clientY;
                canvas.style.cursor = 'grabbing';
            };
            const move = (e) => {
                if (!state.isDragging) return;
                const dx = e.clientX - state.lastX;
                const dy = e.clientY - state.lastY;
                state.offsetX += dx;
                state.offsetY += dy;
                state.lastX = e.clientX; state.lastY = e.clientY;
                state.drawCallback && state.drawCallback();
            };
            const up = () => { state.isDragging = false; canvas.style.cursor = 'grab'; };

            canvas.addEventListener('mousedown', down);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);

            // Touch support
            let lastTouchDist = 0;
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.hasUserInteracted = true;
                    state.lastX = e.touches[0].clientX;
                    state.lastY = e.touches[0].clientY;
                }
            }, { passive: true });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && state.isDragging) {
                    const dx = e.touches[0].clientX - state.lastX;
                    const dy = e.touches[0].clientY - state.lastY;
                    state.offsetX += dx;
                    state.offsetY += dy;
                    state.lastX = e.touches[0].clientX;
                    state.lastY = e.touches[0].clientY;
                    state.drawCallback && state.drawCallback();
                } else if (e.touches.length === 2) {
                    // Zoom with pinch
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.hypot(dx, dy);
                    if (lastTouchDist > 0) {
                        const factor = dist / lastTouchDist;
                        state.scaleX = clamp(state.scaleX * factor, state.minScale, state.maxScale);
                        state.scaleY = clamp(state.scaleY * factor, state.minScale, state.maxScale);
                        state.hasUserInteracted = true;
                        state.drawCallback && state.drawCallback();
                    }
                    lastTouchDist = dist;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => { state.isDragging = false; lastTouchDist = 0; });

            // Mouse wheel zoom
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = Math.sign(e.deltaY);
                // Exponential zoom for clearer scaling feel
                const factor = delta > 0 ? 0.9 : 1.1;
                state.scaleX = clamp(state.scaleX * factor, state.minScale, state.maxScale);
                state.scaleY = clamp(state.scaleY * factor, state.minScale, state.maxScale);
                state.hasUserInteracted = true;
                state.drawCallback && state.drawCallback();
            }, { passive: false });

            // Resize observer
            const ro = new ResizeObserver(() => {
                const changed = ensureCanvasSize(canvas, container);
                if (changed) state.drawCallback && state.drawCallback();
            });
            ro.observe(container);

            return { container, canvas, state };
        }

        function drawGeoGebraGrid(ctx, w, h, state) {
            const sx = state.scaleX ?? state.scale;
            const sy = state.scaleY ?? state.scale;
            const cx = w / 2 + state.offsetX;
            const cy = h / 2 + state.offsetY;

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            // Adaptive step calculation
            const getStep = (scale) => {
                if (state.forceStep) return state.forceStep;
                const minPixels = 50; // Balanced spacing
                const raw = minPixels / scale;
                let mag = Math.pow(10, Math.floor(Math.log10(raw)));
                let res = raw / mag;

                if (res > 5) return 10 * mag;
                if (res > 2) return 5 * mag;
                if (res > 1) return 2 * mag;
                return mag;
            };

            const stepX = getStep(sx);
            const stepY = getStep(sy);

            // Calculate Grid Ranges
            const xMin = (0 - cx) / sx;
            const xMax = (w - cx) / sx;
            const startX = Math.floor(xMin / stepX) * stepX;
            const endX = Math.ceil(xMax / stepX) * stepX;

            const yMin = (cy - h) / sy;
            const yMax = cy / sy;
            const startY = Math.floor(Math.min(yMin, yMax) / stepY) * stepY;
            const endY = Math.ceil(Math.max(yMin, yMax) / stepY) * stepY;

            // Draw Sub-Grid (Minor Lines) - Lighter
            const subStepX = stepX / 5;
            const subStepY = stepY / 5;
            // Only draw minor if enough pixel space (>5px)
            if (subStepX * sx > 6 && subStepY * sy > 6) {
                const startXSub = Math.floor(xMin / subStepX) * subStepX;
                const endXSub = Math.ceil(xMax / subStepX) * subStepX;
                const startYSub = Math.floor(Math.min(yMin, yMax) / subStepY) * subStepY;
                const endYSub = Math.ceil(Math.max(yMin, yMax) / subStepY) * subStepY;

                ctx.lineWidth = 0.5;
                ctx.strokeStyle = '#f0f0f0';
                ctx.beginPath();
                for (let x = startXSub; x <= endXSub; x += subStepX) {
                    const px = cx + x * sx;
                    ctx.moveTo(px, 0); ctx.lineTo(px, h);
                }
                for (let y = startYSub; y <= endYSub; y += subStepY) {
                    const py = cy - y * sy;
                    ctx.moveTo(0, py); ctx.lineTo(w, py);
                }
                ctx.stroke();
            }

            // Draw Major Grid Lines (Solid)
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#d3d3d3'; // Gray like millimeter paper
            ctx.setLineDash([]); // Solid

            ctx.beginPath();
            // Vertical Lines
            for (let x = startX; x <= endX; x += stepX) {
                const px = cx + x * sx;
                ctx.moveTo(px, 0);
                ctx.lineTo(px, h);
            }
            // Horizontal Lines
            for (let y = startY; y <= endY; y += stepY) {
                const py = cy - y * sy;
                ctx.moveTo(0, py);
                ctx.lineTo(w, py);
            }
            ctx.stroke();

            // Axes
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            // X Axis (y=0)
            if (cy >= -2 && cy <= h + 2) {
                ctx.moveTo(0, cy);
                ctx.lineTo(w, cy);
            }
            // Y Axis (x=0)
            if (cx >= -2 && cx <= w + 2) {
                ctx.moveTo(cx, 0);
                ctx.lineTo(cx, h);
            }
            ctx.stroke();

            // Labels
            ctx.fillStyle = '#666';
            ctx.font = 'bold 10px Nunito';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // X Labels
            for (let x = startX; x <= endX; x += stepX) {
                if (Math.abs(x) < stepX / 100) continue; // Skip origin
                const px = cx + x * sx;
                // Keep label visible near axis but constrained to canvas
                const py = Math.min(h - 15, Math.max(5, cy + 6));
                ctx.fillText(parseFloat(x.toPrecision(10)).toString(), px, py);
                // Tick mark
                ctx.beginPath(); ctx.moveTo(px, cy - 3); ctx.lineTo(px, cy + 3); ctx.stroke();
            }

            // Y Labels
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let y = startY; y <= endY; y += stepY) {
                if (Math.abs(y) < stepY / 100) continue; // Skip origin
                const py = cy - y * sy;
                const px = Math.min(w - 5, Math.max(25, cx - 8));
                ctx.fillText(parseFloat(y.toPrecision(10)).toString(), px, py);
                // Tick mark
                ctx.beginPath(); ctx.moveTo(cx - 3, py); ctx.lineTo(cx + 3, py); ctx.stroke();
            }

            // Origin Label
            if (cx > -20 && cx < w + 20 && cy > -20 && cy < h + 20) {
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                ctx.fillText("0", Math.max(10, cx - 4), Math.max(10, cy + 4));
            }

            // Arrows
            ctx.fillStyle = '#2b2d42';
            ctx.beginPath(); ctx.moveTo(w - 10, cy - 6); ctx.lineTo(w, cy); ctx.lineTo(w - 10, cy + 6); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx - 6, 10); ctx.lineTo(cx, 0); ctx.lineTo(cx + 6, 10); ctx.fill();
        }

        // Numbering
        ctx.font = '11px Nunito';



        function drawVector(ctx, x1, y1, x2, y2, color = '#0077b6', label = '', lw = 2.5) {
            const hl = 12;
            const a = Math.atan2(y2 - y1, x2 - x1);
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = lw;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - hl * Math.cos(a - Math.PI / 6), y2 - hl * Math.sin(a - Math.PI / 6));
            ctx.lineTo(x2 - hl * Math.cos(a + Math.PI / 6), y2 - hl * Math.sin(a + Math.PI / 6));
            ctx.closePath();
            ctx.fill();
            if (label) {
                ctx.font = 'bold 13px Nunito';
                const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
                ctx.fillText(label, mx + 12 * Math.cos(a + Math.PI / 2), my + 12 * Math.sin(a + Math.PI / 2));
            }
        }

        function drawReferenceSystem(ctx, w, h) {
            const ox = w / 2, oy = h / 2;
            drawGrid(ctx, w, h, ox, oy, 30);
            ctx.fillStyle = '#0077b6';
            ctx.font = 'bold 11px Nunito';
            ctx.textAlign = 'center';
            for (let i = -3; i <= 3; i++) {
                if (i !== 0) {
                    ctx.fillText(i, ox + i * 30, oy + 16);
                    ctx.fillText(i, ox - 10, oy - i * 30 + 4);
                }
            }
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(ox, oy, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.fillText('O', ox - 15, oy + 18);
        }

        function drawTrajectories(ctx, w, h) {
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, w, h);

            // Rectilinear
            ctx.strokeStyle = '#0077b6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(20, h - 40);
            ctx.lineTo(w - 20, h - 40);
            ctx.stroke();
            ctx.fillStyle = '#0077b6';
            ctx.font = '10px Nunito';
            ctx.fillText('Rectilínea', w / 2 - 25, h - 25);

            // Circular
            ctx.strokeStyle = '#00b4d8';
            ctx.beginPath();
            ctx.arc(w / 2, h / 2 - 20, 35, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = '#00b4d8';
            ctx.fillText('Circular', w / 2 - 20, h / 2 + 30);

            // Parabolic
            ctx.strokeStyle = '#2a9d8f';
            ctx.beginPath();
            for (let x = 20; x < 120; x++) {
                const y = 30 + 0.01 * Math.pow(x - 70, 2);
                if (x === 20) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.fillStyle = '#2a9d8f';
            ctx.fillText('Parabólica', 50, 70);

            // Elliptical (New)
            ctx.strokeStyle = '#9d4edd';
            ctx.beginPath();
            ctx.ellipse(w - 60, 60, 40, 25, Math.PI / 4, 0, 2 * Math.PI);
            ctx.stroke();
            ctx.fillStyle = '#9d4edd';
            ctx.fillText('Elíptica', w - 80, 100);
        }

        function drawPositionAxis(ctx, w, h) {
            const oy = h / 2;
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(20, oy);
            ctx.lineTo(w - 20, oy);
            ctx.stroke();
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.moveTo(w - 20, oy - 6);
            ctx.lineTo(w - 10, oy);
            ctx.lineTo(w - 20, oy + 6);
            ctx.fill();
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('X', w - 25, oy - 10);
            for (let i = -3; i <= 4; i++) {
                const x = w / 2 + i * 40;
                ctx.beginPath();
                ctx.moveTo(x, oy - 5);
                ctx.lineTo(x, oy + 5);
                ctx.stroke();
                ctx.fillText(i * 10, x - 8, oy + 20);
            }
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(w / 2, oy, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0077b6';
            ctx.beginPath();
            ctx.arc(w / 2 + 80, oy, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = 'bold 11px Nunito';
            ctx.fillStyle = '#e63946';
            ctx.fillText('O', w / 2 - 3, oy - 15);
            ctx.fillStyle = '#0077b6';
            ctx.fillText('P', w / 2 + 77, oy - 15);
        }

        function drawRectilinear(ctx, w, h) {
            const oy = h / 2 + 20;
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(30, oy);
            ctx.lineTo(w - 30, oy);
            ctx.stroke();
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.moveTo(w - 30, oy - 5);
            ctx.lineTo(w - 20, oy);
            ctx.lineTo(w - 30, oy + 5);
            ctx.fill();
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('X', w - 35, oy - 10);

            // Draw cars facing RIGHT using canvas transform
            ctx.font = '24px Nunito';
            const carPositions = [60, 120, 180];
            for (const carX of carPositions) {
                ctx.save();
                ctx.translate(carX + 12, oy - 5);
                ctx.scale(-1, 1);
                ctx.fillText('🚗', -12, 0);
                ctx.restore();
            }

            ctx.strokeStyle = '#0077b6';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(85, oy - 30);
            ctx.lineTo(85, oy + 20);
            ctx.moveTo(145, oy - 30);
            ctx.lineTo(145, oy + 20);
            ctx.moveTo(205, oy - 30);
            ctx.lineTo(205, oy + 20);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.font = '10px Nunito';
            ctx.fillStyle = '#666';
            ctx.fillText('t₁', 82, oy + 35);
            ctx.fillText('t₂', 142, oy + 35);
            ctx.fillText('t₃', 202, oy + 35);
        }

        function drawVelInstant(ctx, w, h, state) {
            drawGeoGebraGrid(ctx, w, h, state);

            // Trayectoria sinusoidal: y = 2*sin(0.4*x)
            ctx.strokeStyle = '#00b4d8';
            ctx.lineWidth = 3;
            ctx.beginPath();

            // Dibujar curva en coordenadas del mundo
            const sx = state.scaleX ?? state.scale;
            const sy = state.scaleY ?? state.scale;

            // Optimization: check bounds of X
            const minX = - (w / 2 + state.offsetX) / sx;
            const maxX = (w - (w / 2 + state.offsetX)) / sx;

            for (let px = 0; px < w; px += 2) {
                // Invertir transform: pixel -> mundo
                const wx = (px - (w / 2 + state.offsetX)) / sx;
                const wy = 2.5 * Math.sin(0.5 * wx); // Amplitud 2.5, Frec 0.5

                // Manually toCanvas to mix independent scales
                const cx = w / 2 + state.offsetX + wx * sx;
                const cy = h / 2 + state.offsetY - wy * sy;

                if (px === 0) ctx.moveTo(cx, cy);
                else ctx.lineTo(cx, cy);
            }
            ctx.stroke();

            // Etiqueta
            const lblPos = toCanvas(4, -1, state, w, h);
            ctx.font = 'italic 12px Nunito';
            ctx.fillStyle = '#00b4d8';
            ctx.fillText('Trayectoria', lblPos.x, lblPos.y);

            // Punto P en x = 1.5
            const px_world = 1.5;
            const py_world = 2.5 * Math.sin(0.5 * px_world);
            const pCanvas = toCanvas(px_world, py_world, state, w, h);

            // Derivada: y' = 2.5 * 0.5 * cos(0.5 * x) = 1.25 * cos(0.5 * x)
            // Note: Slope in world coordinates!
            const slope = 1.25 * Math.cos(0.5 * px_world);
            const angle = Math.atan(slope); // Ángulo matemático

            // Vector tangente
            const vLen = 2.5; // Longitud en unidades mundo
            const vx = vLen * Math.cos(angle);
            const vy = vLen * Math.sin(angle);
            // Caution: visual slope depends on aspect ratio if sx != sy! 
            // But 'tangent vector' usually means physical velocity if axes are physical x, y. 
            // If it's a graph x vs t, the visual tangent is different. 
            // Assuming this is spatial trajectory y(x), then tangent is properly directed.
            // However, with anisotropic scaling, the visual angle changes.
            // We draw the vector (vx, vy) in world coords relative to P
            const vEndCanvas = toCanvas(px_world + vx, py_world + vy, state, w, h);

            // Línea tangente punteada extendida
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            const tStart = toCanvas(px_world - 3, py_world - 3 * slope, state, w, h);
            const tEnd = toCanvas(px_world + 3, py_world + 3 * slope, state, w, h);
            ctx.moveTo(tStart.x, tStart.y);
            ctx.lineTo(tEnd.x, tEnd.y);
            ctx.stroke();
            ctx.setLineDash([]);

            // Dibujar vector
            drawArrow(ctx, pCanvas.x, pCanvas.y, vEndCanvas.x, vEndCanvas.y, '#e63946', 3);

            // Etiqueta vector
            ctx.font = 'bold 14px Nunito';
            ctx.fillStyle = '#e63946';
            ctx.fillText('v⃗', vEndCanvas.x + 8, vEndCanvas.y - 5);

            // Punto P
            ctx.fillStyle = '#0077b6';
            ctx.beginPath();
            ctx.arc(pCanvas.x, pCanvas.y, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = 'bold 12px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('P', pCanvas.x - 18, pCanvas.y + 15);
        }

        function drawArrow(ctx, x1, y1, x2, y2, color, width) {
            const headlen = 12;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        function drawAcceleration(ctx, w, h) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, w, h);

            // Center origin with more space
            const ox = w / 2 - 30, oy = h / 2 + 10;

            // Title
            ctx.font = 'bold 13px Nunito';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.fillText('Cambio vectorial de velocidad', w / 2, 18);
            ctx.textAlign = 'left';

            // Draw v1 vector (initial velocity) - LARGER
            const v1Len = 70;
            const v1Angle = -Math.PI / 4; // 45 degrees up
            const v1x = ox + v1Len * Math.cos(v1Angle);
            const v1y = oy + v1Len * Math.sin(v1Angle);
            drawVector(ctx, ox, oy, v1x, v1y, '#0077b6', '', 3);
            ctx.font = 'bold 14px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('v⃗₁', v1x + 8, v1y - 5);

            // Draw v2 vector (final velocity) - from same origin LARGER
            const v2Len = 90;
            const v2Angle = Math.PI / 8; // slight angle down
            const v2x = ox + v2Len * Math.cos(v2Angle);
            const v2y = oy + v2Len * Math.sin(v2Angle);
            drawVector(ctx, ox, oy, v2x, v2y, '#00b4d8', '', 3);
            ctx.fillStyle = '#00b4d8';
            ctx.fillText('v⃗₂', v2x + 8, v2y + 15);

            // Draw Δv = v2 - v1 (from tip of v1 to tip of v2) - LARGER
            drawVector(ctx, v1x, v1y, v2x, v2y, '#e63946', '', 3);
            ctx.fillStyle = '#e63946';
            ctx.font = 'bold 13px Nunito';
            const labelX = (v1x + v2x) / 2;
            const labelY = (v1y + v2y) / 2;
            ctx.fillText('Δv⃗ = v⃗₂ - v⃗₁', labelX + 15, labelY - 5);

            // Draw origin point
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(ox, oy, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('O', ox - 18, oy + 5);

            // Add time labels with better visibility
            ctx.font = '11px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('en t₁', v1x - 25, v1y - 15);
            ctx.fillStyle = '#00b4d8';
            ctx.fillText('en t₂', v2x + 10, v2y + 5);

            // Formula note - larger
            ctx.font = 'bold 12px Nunito';
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            ctx.fillText('a⃗ₘ = Δv⃗ / Δt', w / 2, h - 12);
            ctx.textAlign = 'left';
        }

        function drawMRUBasic(ctx, w, h) {
            const oy = h / 2 + 10;
            const x0 = 60, xf = w - 80;

            // Draw axis line with arrow
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(20, oy);
            ctx.lineTo(w - 20, oy);
            ctx.stroke();
            // Arrow at end
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.moveTo(w - 20, oy);
            ctx.lineTo(w - 30, oy - 5);
            ctx.lineTo(w - 30, oy + 5);
            ctx.closePath();
            ctx.fill();
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('x', w - 18, oy - 10);

            // Initial position marker
            ctx.strokeStyle = '#0077b6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x0, oy - 15);
            ctx.lineTo(x0, oy + 15);
            ctx.stroke();
            ctx.font = 'bold 11px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('x₀', x0 - 7, oy + 30);

            // Final position marker
            ctx.strokeStyle = '#00b4d8';
            ctx.beginPath();
            ctx.moveTo(xf, oy - 15);
            ctx.lineTo(xf, oy + 15);
            ctx.stroke();
            ctx.fillStyle = '#00b4d8';
            ctx.fillText('x', xf - 5, oy + 30);

            // Draw displacement vector (Δx)
            drawVector(ctx, x0, oy - 30, xf, oy - 30, '#e63946', '', 2.5);
            ctx.font = 'bold 12px Nunito';
            ctx.fillStyle = '#e63946';
            ctx.fillText('Δx = x - x₀', (x0 + xf) / 2 - 30, oy - 40);

            // Car emoji at initial position - FLIPPED to face right
            ctx.save();
            ctx.translate(x0 + 30, oy - 3);
            ctx.scale(-1, 1);
            ctx.font = '22px Nunito';
            ctx.fillText('🚗', -12, 0);
            ctx.restore();

            // Velocity vector above car
            drawVector(ctx, x0 + 50, oy - 8, x0 + 95, oy - 8, '#0077b6', '', 2);
            ctx.font = 'bold 11px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('v⃗ = cte', x0 + 100, oy - 5);

            // Note about acceleration
            ctx.font = '11px Nunito';
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            ctx.fillText('a = 0 (velocidad constante)', w / 2, h - 12);
            ctx.textAlign = 'left';
        }

        // ============ INTERACTIVE DIAGRAMS ============
        function initPositionVectorInteractive() {
            // Use the GeoGebra factory to create canvas and controls
            const ggb = createGeoGebraCanvas('posvec-diagram', { scale: 22, offsetX: -20, offsetY: 20, forceStep: 1 });
            if (!ggb) return;

            // Get references to sliders
            const inputX = document.getElementById('pos-x');
            const inputY = document.getElementById('pos-y');
            const valX = document.getElementById('pos-x-val');
            const valY = document.getElementById('pos-y-val');
            const valMod = document.getElementById('pos-mod');

            // Define the draw function that will be called by GGB + inputs
            ggb.state.drawCallback = () => {
                const ctx = ggb.canvas.getContext('2d');
                const w = ggb.canvas.width;
                const h = ggb.canvas.height;
                const state = ggb.state;

                // Read values
                const x = parseFloat(inputX?.value || 3);
                const y = parseFloat(inputY?.value || 4);

                // Update UI text
                if (valX) valX.textContent = x;
                if (valY) valY.textContent = y;
                const mod = Math.sqrt(x * x + y * y);
                if (valMod) valMod.textContent = mod.toFixed(2);

                // Draw background grid
                drawGeoGebraGrid(ctx, w, h, state);

                const p0 = toCanvas(0, 0, state, w, h);
                const p1 = toCanvas(x, y, state, w, h);

                // Draw Point (First, so vector covers it if they overlap, or user request 'vector por encima')
                // User asked "vector se dibuje por encima del punto P" -> Vector ON TOP OF Point.
                // Current order was Vector then Point (Point on top).
                // So I will draw Point first.
                // Adjustable point radius: "mas pequeño" -> 4
                ctx.fillStyle = '#e63946';
                ctx.beginPath();
                ctx.arc(p1.x, p1.y, 4, 0, Math.PI * 2);
                ctx.fill();

                // Draw Vector (On top)
                drawVector(ctx, p0.x, p0.y, p1.x, p1.y, '#0077b6', 'r⃗', 3);

                // Label
                ctx.font = 'bold 12px Nunito';
                ctx.fillStyle = '#333';
                ctx.fillText(`(${x}, ${y})`, p1.x + 10, p1.y - 10);
            };

            // Initial draw
            ggb.state.drawCallback();

            // Attach listeners to sliders
            [inputX, inputY].forEach(el => {
                el?.addEventListener('input', () => {
                    ggb.state.drawCallback();
                });
            });
        }

        function initDisplacementInteractive() {
            // Use GeoGebra factory with forced step of 1 unit
            const ggb = createGeoGebraCanvas('desp-diagram', { scale: 30, forceStep: 1 });
            if (!ggb) return;

            // Get inputs
            const inputs = ['desp-x0', 'desp-y0', 'desp-xf', 'desp-yf'].map(id => document.getElementById(id));

            ggb.state.drawCallback = () => {
                const ctx = ggb.canvas.getContext('2d');
                const w = ggb.canvas.width;
                const h = ggb.canvas.height;
                const state = ggb.state;

                const x0 = parseFloat(document.getElementById('desp-x0')?.value || -2);
                const y0 = parseFloat(document.getElementById('desp-y0')?.value || 1);
                const xf = parseFloat(document.getElementById('desp-xf')?.value || 3);
                const yf = parseFloat(document.getElementById('desp-yf')?.value || 4);

                // Update UI Labels
                if (document.getElementById('desp-x0-val')) document.getElementById('desp-x0-val').textContent = x0;
                if (document.getElementById('desp-y0-val')) document.getElementById('desp-y0-val').textContent = y0;
                if (document.getElementById('desp-xf-val')) document.getElementById('desp-xf-val').textContent = xf;
                if (document.getElementById('desp-yf-val')) document.getElementById('desp-yf-val').textContent = yf;

                const dx = xf - x0, dy = yf - y0;
                const mod = Math.sqrt(dx * dx + dy * dy);
                if (document.getElementById('desp-dx')) document.getElementById('desp-dx').textContent = dx.toFixed(1);
                if (document.getElementById('desp-dy')) document.getElementById('desp-dy').textContent = dy.toFixed(1);
                if (document.getElementById('desp-mod')) document.getElementById('desp-mod').textContent = mod.toFixed(2);

                // Draw GGB Grid
                drawGeoGebraGrid(ctx, w, h, state);

                // Transform points
                const p0 = toCanvas(0, 0, state, w, h);
                const pStart = toCanvas(x0, y0, state, w, h);
                const pEnd = toCanvas(xf, yf, state, w, h);

                // Draw vectors
                // r_i (Origin -> Start)
                drawVector(ctx, p0.x, p0.y, pStart.x, pStart.y, '#666', 'r⃗ᵢ', 2);
                // r_f (Origin -> End)
                drawVector(ctx, p0.x, p0.y, pEnd.x, pEnd.y, '#00b4d8', 'r⃗ᶠ', 2);
                // Delta r (Start -> End)
                drawVector(ctx, pStart.x, pStart.y, pEnd.x, pEnd.y, '#e63946', 'Δr⃗', 3);

                // Points circles
                ctx.fillStyle = '#0077b6';
                ctx.beginPath(); ctx.arc(pStart.x, pStart.y, 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#2a9d8f';
                ctx.beginPath(); ctx.arc(pEnd.x, pEnd.y, 4, 0, Math.PI * 2); ctx.fill();

                // Labels
                ctx.font = 'bold 11px Nunito';
                ctx.fillStyle = '#0077b6';
                ctx.fillText('Inicio', pStart.x - 20, pStart.y - 12);
                ctx.fillStyle = '#2a9d8f';
                ctx.fillText('Fin', pEnd.x + 10, pEnd.y - 5);
            };

            // Initial draw
            ggb.state.drawCallback();

            // Listeners
            inputs.forEach(el => el?.addEventListener('input', ggb.state.drawCallback));
        }

        function initMRUGraphInteractive() {
            // Wait for DOM
            setTimeout(() => {
                const ggb = createGeoGebraCanvas('mrugraph-diagram', { scale: 20 });
                if (!ggb) return;

                // Adjust initial view to show quadrants nicely
                ggb.state.offsetX = -100;
                ggb.state.offsetY = 100;

                function draw(ctx, w, h, state) {
                    const x0 = parseFloat(document.getElementById('mru-x0')?.value || 10);
                    const v = parseFloat(document.getElementById('mru-v')?.value || 5);

                    if (document.getElementById('mru-x0-val')) document.getElementById('mru-x0-val').textContent = x0;
                    if (document.getElementById('mru-v-val')) document.getElementById('mru-v-val').textContent = v;
                    if (document.getElementById('mru-eq')) document.getElementById('mru-eq').textContent = `${x0} + ${v} t`;

                    drawGeoGebraGrid(ctx, w, h, state);

                    // Draw Line: x = x0 + v*t
                    // We plot t on X-axis (horizontal), x on Y-axis (vertical)
                    ctx.strokeStyle = '#0077b6';
                    ctx.lineWidth = 3;
                    ctx.beginPath();

                    // Draw from t = -10 to t = 20 (in world coords)
                    const tStart = -20;
                    const tEnd = 40;

                    const pStart = toCanvas(tStart, x0 + v * tStart, state, w, h);
                    const pEnd = toCanvas(tEnd, x0 + v * tEnd, state, w, h);

                    ctx.moveTo(pStart.x, pStart.y);
                    ctx.lineTo(pEnd.x, pEnd.y);
                    ctx.stroke();

                    // Draw intercept point (0, x0)
                    const pInt = toCanvas(0, x0, state, w, h);
                    ctx.fillStyle = '#e63946';
                    ctx.beginPath();
                    ctx.arc(pInt.x, pInt.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#333';
                    ctx.font = 'bold 12px Nunito';
                    ctx.fillText(`x₀`, pInt.x + 8, pInt.y - 5);

                    // Label the line
                    ctx.fillStyle = '#0077b6';
                    const pLabel = toCanvas(5, x0 + v * 5, state, w, h);
                    ctx.fillText(`v = ${v} m / s`, pLabel.x + 5, pLabel.y - 10);
                }

                ggb.state.drawCallback = () => draw(ggb.canvas.getContext('2d'), ggb.canvas.width, ggb.canvas.height, ggb.state);
                ggb.state.drawCallback();

                ['mru-x0', 'mru-v'].forEach(id => {
                    document.getElementById(id)?.addEventListener('input', ggb.state.drawCallback);
                });
            }, 200);
        }

        function initMobilesInteractive() {
            setTimeout(() => {
                // Initialize with placeholders; will auto-fit immediately
                const ggb = createGeoGebraCanvas('mobiles-diagram', { scaleX: 15, scaleY: 1 });
                if (!ggb) return;

                function draw(ctx, w, h, state) {
                    const x0a = parseFloat(document.getElementById('mob-x0a')?.value || 0);
                    const va = parseFloat(document.getElementById('mob-va')?.value || 20);
                    const x0b = parseFloat(document.getElementById('mob-x0b')?.value || 300);
                    const vb = parseFloat(document.getElementById('mob-vb')?.value || -10);

                    // Update UI labels
                    if (document.getElementById('mob-x0a-val')) document.getElementById('mob-x0a-val').textContent = x0a + ' km';
                    if (document.getElementById('mob-va-val')) document.getElementById('mob-va-val').textContent = va + ' km/h';
                    if (document.getElementById('mob-x0b-val')) document.getElementById('mob-x0b-val').textContent = x0b + ' km';
                    if (document.getElementById('mob-vb-val')) document.getElementById('mob-vb-val').textContent = vb + ' km/h';

                    const t_meet = (x0b - x0a) / (va - vb);
                    const x_meet = x0a + va * t_meet;

                    // Update UI results
                    if (document.getElementById('mob-t')) document.getElementById('mob-t').textContent = isFinite(t_meet) ? t_meet.toFixed(1) : '---';
                    if (document.getElementById('mob-x')) document.getElementById('mob-x').textContent = isFinite(x_meet) ? x_meet.toFixed(1) : '---';
                    if (document.getElementById('mob-eqA')) document.getElementById('mob-eqA').textContent = `${x0a} + ${va} t`;
                    if (document.getElementById('mob-eqB')) document.getElementById('mob-eqB').textContent = `${x0b} + (${vb}) t`;

                    // --- Auto-Fit Logic ---
                    // We want to ensure (0,0), (t_meet, x_meet), (0, x0a), (0, x0b) are somewhat visible.
                    // Important points:
                    const pointsT = [0, isFinite(t_meet) ? t_meet : 0];
                    const pointsX = [x0a, x0b, isFinite(x_meet) ? x_meet : 0];

                    // Add some margin (e.g. 10%)
                    const minT = Math.min(...pointsT);
                    const maxT = Math.max(...pointsT);
                    const minX = Math.min(...pointsX);
                    const maxX = Math.max(...pointsX);

                    // Calculate desired range size
                    const rangeT = (maxT - minT) || 10;
                    const rangeX = (maxX - minX) || 100;

                    // Only auto-scale if not currently dragging (to allow manual inspection)
                    // Or we could enforce it only on parameter change. 
                    // For better UX during parameter tuning, we'll soft-adjust if points go out of view, 
                    // or just set a good reset. For this "Auto-Fit" requirement, we'll aggressively 
                    // fit on each draw if it significantly changes, or simple approach: 
                    // Just set optimal scales.

                    // Let's set 'optimal' viewport centered roughly on the action
                    // Center roughly at meeting point/2
                    const centerT = (minT + maxT) / 2;
                    const centerX = (minX + maxX) / 2;

                    // Calculate scales to fit this range in the canvas (w, h)
                    // We want rangeT to take up ~80% of width
                    const desiredScaleX = (w * 0.8) / (rangeT || 1);
                    const desiredScaleY = (h * 0.8) / (rangeX || 1);

                    // We can update state if this is the first draw or significant change?
                    if (!state.hasUserInteracted && !state.isInitialized) {
                        // Initial fit
                        // Calculate desired range size
                        const rangeT = 20; // Show slightly more than interaction (10h)
                        const rangeX = 450; // 400m

                        // Scales
                        state.scaleX = (w * 0.8) / rangeT;
                        state.scaleY = (h * 0.8) / rangeX;

                        // Center
                        const centerT = 10; // Midpoint of 0-20
                        const centerX = 225; // Midpoint 0-450

                        state.offsetX = -centerT * state.scaleX;
                        state.offsetY = centerX * state.scaleY;

                        state.isInitialized = true;
                    }

                    // Explicitly draw grid with CURRENT state (no auto-fit per frame)
                    drawGeoGebraGrid(ctx, w, h, state);

                    // Mobile A
                    ctx.strokeStyle = '#0077b6';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    // Draw a bit beyond the meeting point
                    const tStart = minT - rangeT * 0.2;
                    const tEnd = maxT + rangeT * 0.2;

                    const pA1 = toCanvas(tStart, x0a + va * tStart, state, w, h);
                    const pA2 = toCanvas(tEnd, x0a + va * tEnd, state, w, h);
                    ctx.moveTo(pA1.x, pA1.y);
                    ctx.lineTo(pA2.x, pA2.y);
                    ctx.stroke();

                    // Mobile B
                    ctx.strokeStyle = '#2a9d8f';
                    ctx.beginPath();
                    const pB1 = toCanvas(tStart, x0b + vb * tStart, state, w, h);
                    const pB2 = toCanvas(tEnd, x0b + vb * tEnd, state, w, h);
                    ctx.moveTo(pB1.x, pB1.y);
                    ctx.lineTo(pB2.x, pB2.y);
                    ctx.stroke();

                    // Meeting Point
                    if (isFinite(t_meet) && isFinite(x_meet)) {
                        const pMeet = toCanvas(t_meet, x_meet, state, w, h);
                        ctx.fillStyle = '#e63946';
                        ctx.beginPath();
                        ctx.arc(pMeet.x, pMeet.y, 8, 0, Math.PI * 2);
                        ctx.fill();

                        // Label
                        ctx.fillStyle = '#333';
                        ctx.font = 'bold 12px Nunito';
                        ctx.fillText(`(${t_meet.toFixed(1)}h, ${x_meet.toFixed(0)}km)`, pMeet.x + 10, pMeet.y - 10);
                    }
                }

                ggb.state.drawCallback = () => draw(ggb.canvas.getContext('2d'), ggb.canvas.width, ggb.canvas.height, ggb.state);
                // Trigger initial draw
                ggb.state.drawCallback();

                ['mob-x0a', 'mob-va', 'mob-x0b', 'mob-vb'].forEach(id => {
                    document.getElementById(id)?.addEventListener('input', () => {
                        // On input change, we want to auto-fit again. 
                        // The draw loop handles auto-calculation of scale if !isDragging.
                        ggb.state.drawCallback();
                    });
                });
            }, 200);
        }

        function drawEj313Graph(ctx, w, h, state) {
            // Auto-fit scales if not manually set (simple heuristic for this specific problem)
            // We know the action is around t=[0, 15], x=[0, 300]. Meeting at (10, 200).
            // Let's set scales to fit this comfortably if not dragging
            if (!state.isDragging && !state.hasUserInteracted) {
                // Fits t=0..20, x=0..350 roughly
                state.scaleX = Math.min(state.scaleX, w / 25);
                state.scaleY = Math.min(state.scaleY, h / 350);
                state.offsetX = -w / 3; // Shift to show t=0 on left
                state.offsetY = h / 3;  // Shift to show x=0 on bottom
            }

            drawGeoGebraGrid(ctx, w, h, state);

            // Train A: x = 20t
            ctx.strokeStyle = '#e63946';
            ctx.lineWidth = 3;
            ctx.beginPath();
            const pA1 = toCanvas(0, 0, state, w, h);
            const pA2 = toCanvas(15, 300, state, w, h); // 20*15 = 300
            ctx.moveTo(pA1.x, pA1.y);
            ctx.lineTo(pA2.x, pA2.y);
            ctx.stroke();

            // Train B: x = 300 - 10t
            ctx.strokeStyle = '#0077b6';
            ctx.beginPath();
            const pB1 = toCanvas(0, 300, state, w, h);
            const pB2 = toCanvas(15, 150, state, w, h); // 300 - 10*15 = 150
            ctx.moveTo(pB1.x, pB1.y);
            ctx.lineTo(pB2.x, pB2.y);
            ctx.stroke();

            // Meeting Point: t=10, x=200
            const pMeet = toCanvas(10, 200, state, w, h);
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(pMeet.x, pMeet.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('P (10h, 200km)', pMeet.x + 10, pMeet.y - 10);

            // Labels
            ctx.fillStyle = '#e63946';
            const lblA = toCanvas(2, 60, state, w, h);
            ctx.fillText('Tren A', lblA.x, lblA.y);

            ctx.fillStyle = '#0077b6';
            const lblB = toCanvas(2, 260, state, w, h);
            ctx.fillText('Tren B', lblB.x, lblB.y);
        }

        function drawEjSalidaGraph(ctx, w, h, state) {
            // Auto-fit scales if not dragging
            if (!state.isDragging && !state.hasUserInteracted) {
                // Fits t=0..25, x=0..500
                state.scaleX = Math.min(state.scaleX, w / 30);
                state.scaleY = Math.min(state.scaleY, h / 550);
                state.offsetX = -w / 3;
                state.offsetY = h / 3;
            }

            drawGeoGebraGrid(ctx, w, h, state);

            // Car A: x = 20t
            ctx.strokeStyle = '#0077b6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            const pA1 = toCanvas(0, 0, state, w, h);
            const pA2 = toCanvas(25, 500, state, w, h);
            ctx.moveTo(pA1.x, pA1.y);
            ctx.lineTo(pA2.x, pA2.y);
            ctx.stroke();

            // Car B: x = 200 + 10t
            ctx.strokeStyle = '#2a9d8f';
            ctx.beginPath();
            const pB1 = toCanvas(0, 200, state, w, h);
            const pB2 = toCanvas(25, 450, state, w, h);
            ctx.moveTo(pB1.x, pB1.y);
            ctx.lineTo(pB2.x, pB2.y);
            ctx.stroke();

            // Meeting: t=20, x=400
            const pMeet = toCanvas(20, 400, state, w, h);
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(pMeet.x, pMeet.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('Encuentro (20h, 400km)', pMeet.x - 140, pMeet.y + 25);
        }
