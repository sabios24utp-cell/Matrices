<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno Interactivo de Matemáticas · Plantilla Maestra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>
    <style>
        :root {
            --bg-body: #eef2f6;
            --paper-color: #ffffff;
            --paper-line: #d4e5f7;
            --primary: #0077b6;
            --primary-dark: #023e8a;
            --secondary: #00b4d8;
            --accent: #f77f00;
            --success: #2a9d8f;
            --warning: #e63946;
            --text-main: #1d3557;
            --text-muted: #457b9d;
            --shadow-dark: 6px 6px 16px rgba(163, 177, 198, 0.3);
            --clay-shadow: 8px 8px 16px rgba(163, 177, 198, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6);
        }

        body.dark-mode {
            --bg-body: #1a1a2e;
            --paper-color: #16213e;
            --paper-line: #1f4068;
            --text-main: #e2e2e2;
            --text-muted: #94a3b8;
            --shadow-dark: 4px 4px 10px rgba(0, 0, 0, 0.5);
            --clay-shadow: 6px 6px 12px rgba(0, 0, 0, 0.4), -6px -6px 12px rgba(50, 50, 70, 0.3);
            --glass-bg: rgba(40, 40, 60, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.4s;
        }

        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            padding: 10px;
            gap: 15px;
        }

        .book-wrapper {
            width: 96%;
            max-width: 1400px;
            height: 85vh;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .book {
            width: 100%;
            height: 100%;
            display: flex;
            background: transparent;
            position: relative;
        }

        .page {
            flex: 1;
            background: var(--paper-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: linear-gradient(var(--paper-line) 1px, transparent 1px), linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .page-left {
            border-radius: 12px 0 0 12px;
            box-shadow: inset -15px 0 25px -10px rgba(0, 0, 0, 0.1), var(--shadow-dark);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .page-right {
            border-radius: 0 12px 12px 0;
            box-shadow: inset 15px 0 25px -10px rgba(0, 0, 0, 0.1), var(--shadow-dark);
            border-left: 1px solid rgba(0, 0, 0, 0.05);
        }

        .page-content {
            padding: 35px 45px;
            overflow-y: auto;
            height: 100%;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .page-content::-webkit-scrollbar {
            width: 6px;
        }

        .page-content::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .binding-spine {
            position: absolute;
            left: 50%;
            top: 30px;
            bottom: 30px;
            width: 40px;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }

        .metal-ring {
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, #888 0%, #eee 40%, #ddd 60%, #555 100%);
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .metal-ring::before,
        .metal-ring::after {
            content: '';
            position: absolute;
            top: 2px;
            bottom: 2px;
            width: 5px;
            background: #2c3e50;
            border-radius: 50%;
            opacity: 0.9;
        }

        .metal-ring::before {
            left: -3px;
        }

        .metal-ring::after {
            right: -3px;
        }

        .holes-strip {
            position: absolute;
            top: 30px;
            bottom: 30px;
            width: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            z-index: 15;
            pointer-events: none;
        }

        .page-left .holes-strip {
            right: 6px;
            align-items: flex-end;
        }

        .page-right .holes-strip {
            left: 6px;
            align-items: flex-start;
        }

        .paper-hole {
            width: 10px;
            height: 10px;
            background: #2c3e50;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.6);
        }

        h1,
        h2,
        h3,
        h4 {
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        h2 {
            position: relative;
            display: inline-block;
            color: var(--primary);
            font-weight: 800;
            font-size: 1.6rem;
            margin-top: 0;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60%;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
        }

        h3 {
            color: var(--primary-dark);
            font-size: 1.2rem;
            margin-top: 20px;
        }

        h4 {
            color: var(--secondary);
            font-size: 1.05rem;
            margin-top: 15px;
        }

        p,
        li {
            line-height: 1.7;
            font-size: 0.98rem;
            margin-bottom: 10px;
            text-align: justify;
        }

        strong {
            color: var(--primary-dark);
        }

        em {
            color: var(--secondary);
        }

        .clay-card {
            background: var(--paper-color);
            border-radius: 16px;
            padding: 18px;
            margin: 12px 0;
            box-shadow: var(--clay-shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }

        .clay-card:hover {
            transform: translateY(-2px);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin: 12px 0;
        }

        .def-box {
            border-left: 5px solid var(--secondary);
            background: rgba(0, 180, 216, 0.08);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin: 15px 0;
        }

        .def-title {
            font-weight: 800;
            color: var(--secondary);
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .concept-box {
            border-left: 5px solid var(--primary);
            background: rgba(0, 119, 182, 0.08);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin: 15px 0;
        }

        .example-box {
            border-left: 5px solid var(--success);
            background: rgba(42, 157, 143, 0.08);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin: 15px 0;
        }

        .example-title {
            font-weight: 800;
            color: var(--success);
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .warning-box {
            border-left: 5px solid var(--warning);
            background: rgba(230, 57, 70, 0.08);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin: 15px 0;
        }

        .formula-box {
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.1), rgba(0, 119, 182, 0.1));
            border: 2px solid var(--secondary);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            margin: 15px 0;
        }

        th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.02);
        }

        tr:hover {
            background: rgba(0, 119, 182, 0.05);
        }

        .nav-dock {
            display: flex;
            gap: 15px;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 100;
            border: var(--glass-border);
            flex-shrink: 0;
        }

        .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--bg-body);
            color: var(--primary);
            font-size: 1.1rem;
            box-shadow: var(--clay-shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-circle:hover:not(:disabled) {
            transform: scale(1.1);
            color: var(--accent);
        }

        .btn-circle:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .page-badge {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: var(--primary);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
        }

        .cover-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 25%, #0b3d5c 50%, #0077b6 75%, #00a8cc 100%);
            color: white;
            margin: -35px -45px;
            width: calc(100% + 90px);
            height: calc(100% + 70px);
            position: relative;
            overflow: hidden;
        }

        .cover-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(0, 180, 216, 0.08) 60deg, transparent 120deg, rgba(72, 202, 228, 0.06) 180deg, transparent 240deg, rgba(0, 119, 182, 0.08) 300deg, transparent 360deg);
            animation: coverRotate 20s linear infinite;
            pointer-events: none;
        }

        .cover-page::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 180, 216, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(72, 202, 228, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        @keyframes coverRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translateY(-20px) scale(1.1);
                opacity: 1;
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.4;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.15;
            }

            100% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.4;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cover-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .cover-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            animation: float 6s ease-in-out infinite;
        }

        .cover-particle:nth-child(1) {
            width: 4px;
            height: 4px;
            top: 15%;
            left: 10%;
            animation-delay: 0s;
            animation-duration: 5s;
        }

        .cover-particle:nth-child(2) {
            width: 6px;
            height: 6px;
            top: 25%;
            left: 80%;
            animation-delay: 1s;
            animation-duration: 7s;
        }

        .cover-particle:nth-child(3) {
            width: 3px;
            height: 3px;
            top: 60%;
            left: 15%;
            animation-delay: 2s;
            animation-duration: 6s;
        }

        .cover-particle:nth-child(4) {
            width: 5px;
            height: 5px;
            top: 70%;
            left: 75%;
            animation-delay: 0.5s;
            animation-duration: 8s;
        }

        .cover-particle:nth-child(5) {
            width: 3px;
            height: 3px;
            top: 40%;
            left: 90%;
            animation-delay: 3s;
            animation-duration: 5.5s;
        }

        .cover-particle:nth-child(6) {
            width: 4px;
            height: 4px;
            top: 85%;
            left: 45%;
            animation-delay: 1.5s;
            animation-duration: 6.5s;
        }

        .cover-particle:nth-child(7) {
            width: 5px;
            height: 5px;
            top: 10%;
            left: 50%;
            animation-delay: 2.5s;
            animation-duration: 7.5s;
        }

        .cover-particle:nth-child(8) {
            width: 3px;
            height: 3px;
            top: 50%;
            left: 30%;
            animation-delay: 4s;
            animation-duration: 5s;
        }

        .cover-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            animation: pulse-ring 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        .cover-orbit:nth-child(1) {
            width: 200px;
            height: 200px;
            animation-delay: 0s;
        }

        .cover-orbit:nth-child(2) {
            width: 340px;
            height: 340px;
            animation-delay: 1.5s;
        }

        .cover-orbit:nth-child(3) {
            width: 480px;
            height: 480px;
            animation-delay: 3s;
        }

        .cover-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 1s ease-out;
        }

        .cover-page h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 10px 0 5px;
            letter-spacing: 6px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), 0 0 60px rgba(0, 180, 216, 0.3);
            background: linear-gradient(135deg, #ffffff 0%, #48cae4 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
        }

        .cover-page h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 5px 0;
            letter-spacing: 2px;
            color: white;
        }

        .cover-page h2::after {
            display: none;
        }

        .cover-icon-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .cover-icon {
            font-size: 2.5rem;
            opacity: 0.95;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .cover-subtitle {
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.7;
            font-weight: 600;
            margin-top: 5px;
        }

        .cover-badge {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(10px);
            padding: 12px 32px;
            border-radius: 50px;
            margin-top: 20px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cover-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        .cover-separator {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            border-radius: 2px;
            margin: 10px 0;
        }

        .cover-footer {
            margin-top: 25px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            font-weight: 600;
            flex-shrink: 0;
            padding: 2px 0;
        }

        .num-page {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .page-left .num-page {
            left: 20px;
        }

        .page-right .num-page {
            right: 20px;
        }

        .icon-list {
            list-style: none;
            padding-left: 0;
        }

        .icon-list li {
            padding: 8px 0;
            padding-left: 28px;
            position: relative;
        }

        .icon-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: bold;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--paper-color);
            border-radius: 16px;
            padding: 25px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        .index-item {
            padding: 10px 12px;
            background: rgba(0, 119, 182, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.9rem;
        }

        .index-item:hover {
            background: rgba(0, 119, 182, 0.15);
            border-left-color: var(--primary);
            transform: translateX(5px);
        }

        .ggb-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
            border-radius: 8px;
        }

        .ggb-canvas {
            flex: 1;
            width: 100%;
            height: 100%;
            touch-action: none;
            display: block;
        }

        .ggb-toolbar {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .ggb-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .ggb-btn:hover {
            background: #f0f0f0;
            color: var(--primary);
            border-color: var(--primary);
        }

        .ggb-info {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #666;
            pointer-events: none;
            z-index: 10;
        }

        #mobile-fab {
            display: none;
        }

        @media (max-width: 900px) {
            .book-wrapper {
                width: 100%;
                height: 75vh;
            }

            .page-right {
                display: none;
            }

            .page-left {
                width: 100%;
                border-radius: 12px;
                border: none;
                box-shadow: var(--clay-shadow);
            }

            .binding-spine {
                display: none;
            }

            .cover-page {
                margin: -20px -20px;
                width: calc(100% + 40px);

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // 📘 PLANTILLA MAESTRA — Cuaderno Interactivo de Matemáticas
        // ═══════════════════════════════════════════════════════════════════════
        // Esta plantilla contiene 6 páginas DEMO que ejemplifican cada tipo de
        // componente reutilizable:
        //   0. Portada (cover)
        //   1. Concepto + tabla
        //   2. Definición + fórmula (MathJax) + ejemplo
        //   3. Interactivo con sliders (placeholder)

        //   5. Créditos
        //
        // 🎨 Reemplaza el contenido HTML de cada `left.html` y `right.html`
        //     manteniendo las clases CSS: def-box, concept-box, formula-box,
        //     example-box, warning-box, glass-panel, clay-card, interactive-controls,
        //     result-display, matrix-container, resizable-diagram.
        //
        // 📐 MathJax soporta $...$ inline y $$...$$ display. Escapa \\ en JS strings.
        // ═══════════════════════════════════════════════════════════════════════
        const BOOK_DATA = [
            { title: "Portada", left: { type: 'cover', html: '<div class="cover-page"><div class="cover-particles"><div class="cover-particle"></div><div class="cover-particle"></div><div class="cover-particle"></div><div class="cover-particle"></div><div class="cover-particle"></div><div class="cover-particle"></div><div class="cover-particle"></div><div class="cover-particle"></div></div><div class="cover-orbit"></div><div class="cover-orbit"></div><div class="cover-orbit"></div><div class="cover-content"><div class="cover-icon-wrapper"><div class="cover-icon"><i class="fa-solid fa-square-root-variable"></i></div></div><div class="cover-subtitle">Cuaderno Interactivo de</div><h1>MATEMÁTICAS</h1><div class="cover-separator"></div><div class="cover-badge"><i class="fas fa-infinity" style="margin-right:8px;"></i>Plantilla Maestra</div><p class="cover-footer">Álgebra · Geometría · Cálculo · Estadística</p></div></div>' }, right: { html: '<h2 style="text-align:center;margin-bottom:15px;"><i class="fas fa-list-ol"></i> Índice de Contenidos</h2><div class="concept-box" style="padding:10px;font-size:0.85rem;"><p><strong>1.</strong> Introducción al tema</p><p><strong>2.</strong> Definiciones y notación</p><p><strong>3.</strong> Simulador interactivo</p><p><strong>4.</strong> Ejemplo paso a paso</p><p><strong>5.</strong> Créditos</p></div><div class="warning-box" style="margin-top:10px"><strong><i class="fa-solid fa-wand-magic-sparkles"></i> Plantilla reutilizable</strong><p>Duplica este archivo y reemplaza cada página con tu contenido matemático específico: álgebra, trigonometría, cálculo, estadística, etc.</p></div><div class="glass-panel" style="text-align:center;margin-top:10px;"><p style="font-style:italic;font-size:0.9rem;">"Las matemáticas son el alfabeto con el cual Dios ha escrito el universo."</p><p style="font-size:0.8rem;">— Aristóteles</p></div>' } },

            { title: "1. Introducción al tema", left: { html: '<h2>1. Introducción al tema</h2><div class="def-box"><span class="def-title"><i class="fa-solid fa-lightbulb"></i> ¿De qué trata este cuaderno?</span><p>Reemplaza este párrafo con una <strong>introducción motivadora</strong> al tema matemático que estás desarrollando: un contexto histórico, una pregunta problematizadora o una aplicación real del conocimiento.</p></div><h3>Objetivos de aprendizaje</h3><ul><li><strong>Comprender</strong> el concepto central.</li><li><strong>Aplicar</strong> la notación y las propiedades básicas.</li><li><strong>Resolver</strong> ejercicios tipo.</li><li><strong>Conectar</strong> el tema con otras áreas (ciencias, tecnología, arte).</li></ul><div class="warning-box"><strong><i class="fa-solid fa-seedling"></i> Consejo pedagógico:</strong><p>Inicia con un ejemplo concreto antes de formalizar. La intuición precede al rigor.</p></div>' }, right: { html: '<h3>Contexto histórico</h3><div class="clay-card" style="font-size:0.9rem;"><p>Utiliza este panel para contar la <strong>historia del tema</strong>: ¿quién lo inventó o descubrió?, ¿qué problema resolvía?, ¿cómo se relaciona con otras ramas de las matemáticas?</p><p>Los estudiantes recuerdan mejor los conceptos cuando los asocian con historias y personas.</p></div><div class="glass-panel" style="text-align:center;margin-top:10px;"><p style="font-style:italic;"><i class="fa-solid fa-quote-left"></i> La matemática es la reina de las ciencias, y la teoría de los números es la reina de las matemáticas.</p><p style="font-size:0.8rem;">— Carl Friedrich Gauss</p></div>' } },

            { title: "2. Definición y notación", left: { html: '<h2>2. Definición formal</h2><div class="def-box"><span class="def-title"><i class="fa-solid fa-pen-nib"></i> Definición</span><p>Escribe aquí la <strong>definición rigurosa</strong> del objeto matemático principal: función, ecuación, transformación, distribución, etc.</p></div><h3>Notación estándar</h3><div class="formula-box">$f : A \\longrightarrow B,\\quad x \\longmapsto f(x)$</div><div class="concept-box"><h4>Símbolos que se usarán en este cuaderno</h4><table><thead><tr><th>Símbolo</th><th>Significado</th></tr></thead><tbody><tr><td>$\\mathbb{N}$</td><td>Naturales</td></tr><tr><td>$\\mathbb{Z}$</td><td>Enteros</td></tr><tr><td>$\\mathbb{Q}$</td><td>Racionales</td></tr><tr><td>$\\mathbb{R}$</td><td>Reales</td></tr><tr><td>$\\mathbb{C}$</td><td>Complejos</td></tr></tbody></table></div>' }, right: { html: '<h3>Ejemplo introductorio</h3><div class="example-box"><span class="example-title"><i class="fa-solid fa-star"></i> Ejemplo 2.1</span><p>Aquí va un ejemplo <strong>corto y claro</strong> que ilustre la definición.</p><p>Datos: $a = 3$, $b = 5$.</p><p>Aplicación:</p><p>$$f(a, b) = a^2 + b^2 = 9 + 25 = 34$$</p></div><div class="warning-box"><strong><i class="fa-solid fa-triangle-exclamation"></i> Errores comunes:</strong><ul><li>Confundir la notación de función con la de conjunto.</li><li>Olvidar el dominio de definición.</li><li>No verificar condiciones de validez.</li></ul></div>' } },

            { title: "3. Simulador interactivo", left: { html: '<h2>3. Simulador interactivo</h2><div class="concept-box"><p>Usa los deslizadores para <strong>explorar</strong> cómo cambian los parámetros del objeto matemático.</p></div><div class="interactive-controls"><div class="control-row"><span class="control-label">a =</span><input type="range" class="control-slider" id="plt-a" min="-5" max="5" value="1" step="0.1"><span class="control-value" id="plt-a-val">1</span></div><div class="control-row"><span class="control-label">b =</span><input type="range" class="control-slider" id="plt-b" min="-5" max="5" value="0" step="0.1"><span class="control-value" id="plt-b-val">0</span></div><div class="control-row"><span class="control-label">c =</span><input type="range" class="control-slider" id="plt-c" min="-5" max="5" value="0" step="0.1"><span class="control-value" id="plt-c-val">0</span></div></div><div class="result-display"><div class="result-title">Expresión resultante</div><div class="result-value">y = <span id="plt-expr">x</span></div></div><div class="warning-box" style="margin-top:8px"><strong><i class="fa-solid fa-code"></i> Para docentes:</strong><p>Enlaza estos deslizadores a una gráfica en Canvas/SVG o incrusta un <code>&lt;iframe&gt;</code> de GeoGebra/Desmos. La plantilla deja el contenedor <code>#plot-area</code> listo a la derecha.</p></div>' }, right: { html: '<div class="resizable-diagram"><div id="plot-area" class="glass-panel" style="width:100%;height:100%;min-height:280px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);"><div style="text-align:center"><i class="fa-solid fa-chart-line" style="font-size:3rem;opacity:0.4"></i><p style="margin-top:10px;font-style:italic">Área reservada para el gráfico interactivo</p><p style="font-size:0.8rem">Coloca aquí tu canvas, SVG o iframe de GeoGebra/Desmos</p></div></div></div><div class="concept-box"><h4>Observaciones dirigidas</h4><ol><li>¿Qué ocurre si $a = 0$?</li><li>¿Cómo afecta $b$ a la gráfica?</li><li>¿Qué valor de $c$ la hace tangente al eje X?</li></ol></div>' } },

            { title: "4. Ejemplo paso a paso", left: { html: '<h2>4. Ejemplo resuelto</h2><div class="def-box"><span class="def-title"><i class="fa-solid fa-clipboard-list"></i> Problema</span><p>Plantea aquí un <strong>problema tipo ICFES / Saber 11 / PreUniversitario</strong>. Debe ser claro, con datos numéricos concretos y una pregunta específica.</p></div><h3>Paso 1 — Identificar los datos</h3><div class="concept-box"><ul><li>Dato 1: <strong>valor</strong></li><li>Dato 2: <strong>valor</strong></li><li>Incógnita: <em>lo que se quiere calcular</em></li></ul></div><h3>Paso 2 — Plantear el modelo matemático</h3><div class="formula-box">$\\text{modelo} : \\quad y = m x + b$</div>' }, right: { html: '<h3>Paso 3 — Sustituir y despejar</h3><div class="formula-box">$y = 2(5) + 3 = 13$</div><h3>Paso 4 — Verificar</h3><div class="concept-box"><p>Reemplaza en la ecuación original y comprueba consistencia dimensional/lógica.</p></div><div class="example-box" style="border-left:5px solid var(--primary)"><strong><i class="fa-solid fa-circle-check"></i> Respuesta:</strong><p style="font-size:1.3rem;text-align:center;color:var(--primary);margin-top:8px"><strong>$y = 13$</strong></p></div><div class="warning-box"><strong><i class="fa-solid fa-graduation-cap"></i> Competencia evaluada:</strong><p>Interpretación, modelación y resolución de problemas (matriz ICFES: <em>comunicación, razonamiento, resolución</em>).</p></div>' } },

            { title: "Créditos", left: { html: '<h2><i class="fa-solid fa-book"></i> Referencias</h2><div class="clay-card"><ul><li>Stewart, J. — <em>Cálculo de una variable</em></li><li>Leithold, L. — <em>El Cálculo</em></li><li>Spivak, M. — <em>Calculus</em></li><li>Apostol, T. — <em>Calculus</em></li><li>Zill, D. — <em>Ecuaciones diferenciales</em></li><li>Grossman, S. — <em>Álgebra lineal</em></li><li>Khan Academy, GeoGebra, Desmos, WolframAlpha</li></ul></div><div class="glass-panel"><p><strong>Msc. Néstor Fabio Montoya Palacios</strong></p><p style="font-size:0.85rem;color:var(--text-muted)">Magíster en Enseñanza de la Física · Docente de Matemáticas y Física<br>Colegio María Auxiliadora · Cartago, Valle del Cauca, Colombia</p></div>' }, right: { html: '<div style="display:flex;flex-direction:column;justify-content:center;height:100%;text-align:center;"><div style="font-size:4rem;color:var(--primary);"><i class="fa-solid fa-infinity"></i></div><h2 style="border:none;color:var(--primary);">¡Gracias por estudiar!</h2><p style="font-style:italic;max-width:320px;margin:0 auto">"La matemática es el arte de dar el mismo nombre a cosas distintas."<br>— Henri Poincaré</p><div class="warning-box" style="margin-top:18px;text-align:left"><strong><i class="fa-solid fa-wand-magic-sparkles"></i> Para crear un cuaderno nuevo:</strong><ol style="font-size:0.85rem;margin-left:14px"><li>Duplica este archivo con un nombre descriptivo.</li><li>Reemplaza cada página del array <code>BOOK_DATA</code>.</li><li>Añade el enlace en <code>js/config.js</code>, categoría correspondiente.</li><li>Sube versión <code>SITE_VERSION</code> en <code>index.html</code>.</li></ol></div></div>' } }
        ];

        window.currentPage = 0;
        let mobileView = 'left';

        document.addEventListener('DOMContentLoaded', () => {
            initSpine();
            render();
            handleResize();
            window.addEventListener('resize', handleResize);
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowRight') nextPage();
                if (e.key === 'ArrowLeft') prevPage();
                if (e.key === 'Escape') hideIndex();
            });
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').className = 'fas fa-sun';
            }
        });

        function initSpine() {
            const s = document.getElementById('spine');
            const hL = document.getElementById('holes-l');
            const hR = document.getElementById('holes-r');
            if (!s) return;
            s.innerHTML = '';
            hL.innerHTML = '';
            hR.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                s.innerHTML += '<div class="metal-ring"></div>';
                hL.innerHTML += '<div class="paper-hole"></div>';
                hR.innerHTML += '<div class="paper-hole"></div>';
            }
        }

        function render() {
            const d = BOOK_DATA[window.currentPage];
            document.getElementById('c-left').innerHTML = d.left.html;
            document.getElementById('c-right').innerHTML = d.right.html;
            document.getElementById('page-num').innerText = window.currentPage === 0 ? "PORTADA" : `HOJA ${window.currentPage} / ${BOOK_DATA.length - 1}`;
            document.getElementById('btn-prev').disabled = window.currentPage === 0;
            document.getElementById('btn-next').disabled = window.currentPage === BOOK_DATA.length - 1;
            document.getElementById('num-left').innerText = window.currentPage > 0 ? window.currentPage * 2 : '';
            document.getElementById('num-right').innerText = window.currentPage * 2 + 1;
            if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise().catch(() => { });
            handleResize();
            setTimeout(() => initDiagrams(), 100);
        }

        window.nextPage = function () { if (window.currentPage < BOOK_DATA.length - 1) { window.currentPage++; animatePage(1); } };
        window.prevPage = function () { if (window.currentPage > 0) { window.currentPage--; animatePage(-1); } };
        window.goToPage = n => { window.currentPage = n; render(); };

        function animatePage(dir) {
            const b = document.getElementById('book-el');
            b.style.transform = `rotateY(${dir * -4}deg) scale(0.98)`;
            setTimeout(() => { render(); b.style.transform = 'rotateY(0) scale(1)'; }, 250);
        }

        window.showIndex = () => {
            const m = document.getElementById('index-modal');
            const l = document.getElementById('index-list');
            l.innerHTML = '';
            BOOK_DATA.forEach((p, i) => {
                const it = document.createElement('div');
                it.className = 'index-item';
                it.innerHTML = `<strong>${i}.</strong> ${p.title}`;
                it.onclick = () => { goToPage(i); hideIndex(); };
                l.appendChild(it);
            });
            m.classList.add('active');
        };

        window.hideIndex = () => document.getElementById('index-modal').classList.remove('active');

        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        };

        function handleResize() {
            const isMob = window.innerWidth <= 900;
            const l = document.getElementById('p-left');
            const r = document.getElementById('p-right');
            if (isMob) {
                if (mobileView === 'left') {
                    l.style.display = 'flex'; r.style.display = 'none';
                    document.getElementById('fab-text').textContent = 'Ver Der.';
                } else {
                    l.style.display = 'none'; r.style.display = 'flex';
                    document.getElementById('fab-text').textContent = 'Ver Izq.';
                }
            } else {
                l.style.display = 'flex'; r.style.display = 'flex';
            }
        }

        // ============ EXAMPLE DIAGRAM FUNCTIONS ============
        function drawEj313Graph(ctx, w, h, state) {
            // Draw Grid
            drawGeoGebraGrid(ctx, w, h, state);

            // Origin in canvas coords
            // We need to define functions x(t)
            // But we work in CANVAS coords for drawing lines
            // Let's use world coords loop for plotting or simpler logic for lines

            const sx = state.scaleX;
            const sy = state.scaleY;
            const cx = w / 2 + state.offsetX;
            const cy = h / 2 + state.offsetY;

            // Helper to get canvas point from (t, x)
            const getPt = (t, x) => ({
                x: cx + t * sx,
                y: cy - x * sy
            });

            // Train A: x = 20t. t in [0, 12]
            const pA_start = getPt(0, 0);
            const pA_end = getPt(12, 240);

            ctx.beginPath();
            ctx.moveTo(pA_start.x, pA_start.y);
            // Plot points? No, it's linear. Just strict lines.
            ctx.lineTo(pA_end.x, pA_end.y);
            ctx.strokeStyle = '#0077b6';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Train B: x = 300 - 10t. t in [0, 12]
            const pB_start = getPt(0, 300);
            const pB_end = getPt(12, 300 - 120); // 180

            ctx.beginPath();
            ctx.moveTo(pB_start.x, pB_start.y);
            ctx.lineTo(pB_end.x, pB_end.y);
            ctx.strokeStyle = '#2a9d8f';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Intersection: t=10, x=200
            const pInt = getPt(10, 200);
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(pInt.x, pInt.y, 6, 0, Math.PI * 2);
            ctx.fill();

            // Labels
            ctx.font = 'bold 12px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('xA = 20t', pInt.x - 60, pInt.y + 30);

            ctx.fillStyle = '#2a9d8f';
            ctx.fillText('xB = 300 - 10t', pInt.x + 10, pInt.y - 15);

            ctx.fillStyle = '#e63946';
            ctx.fillText('P (10h, 200km)', pInt.x + 10, pInt.y + 5);

            // Axis Labels override
            ctx.fillStyle = '#333';
            ctx.textAlign = 'right';
            ctx.fillText('Tiempo (h)', w - 10, cy - 8);
            ctx.textAlign = 'left';
            ctx.fillText('Posición (km)', cx + 8, 15);
        }

        function drawEjSalidaGraph(ctx, w, h, state) {
            drawGeoGebraGrid(ctx, w, h, state);

            const sx = state.scaleX;
            const sy = state.scaleY;
            const cx = w / 2 + state.offsetX;
            const cy = h / 2 + state.offsetY;
            const getPt = (t, x) => ({ x: cx + t * sx, y: cy - x * sy });

            // Movil A: x = 20t (Starts t=0). Plot up to t=25
            const pA0 = getPt(0, 0);
            const pAf = getPt(22, 440);

            ctx.strokeStyle = '#0077b6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(pA0.x, pA0.y);
            ctx.lineTo(pAf.x, pAf.y);
            ctx.stroke();

            // Movil B: x = 200 + 10t.
            const pB0 = getPt(0, 200);
            const pBf = getPt(22, 200 + 220); // 420

            ctx.strokeStyle = '#2a9d8f';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(pB0.x, pB0.y);
            ctx.lineTo(pBf.x, pBf.y);
            ctx.stroke();

            // Intersection: t=20, x=400
            const pInt = getPt(20, 400);
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(pInt.x, pInt.y, 6, 0, Math.PI * 2);
            ctx.fill();

            // Labels
            ctx.font = 'bold 12px Nunito';
            ctx.fillStyle = '#0077b6';
            ctx.fillText('xA = 20t', pInt.x - 80, pInt.y + 40);

            ctx.fillStyle = '#2a9d8f';
            ctx.fillText('xB = 200 + 10t', pA0.x + 10, pB0.y - 10); // near start

            ctx.fillStyle = '#e63946';
            ctx.fillText('P (20h, 400km)', pInt.x - 100, pInt.y - 10);

            // Axis Labels override
            ctx.fillStyle = '#333';
            ctx.textAlign = 'right';
            ctx.fillText('Tiempo (h)', w - 10, cy - 8);
            ctx.textAlign = 'left';
            ctx.fillText('Posición (km)', cx + 8, 15);
        }

        function initSolarSystemAnimation(id) {
            const c = document.getElementById(id);
            if (!c) return;
            c.innerHTML = '';
            const cv = document.createElement('canvas');
            const r = c.getBoundingClientRect();
            cv.width = r.width || 300;
            cv.height = r.height || 220;
            cv.style.width = '100%';
            cv.style.height = '100%';
            c.appendChild(cv);
            const ctx = cv.getContext('2d');

            let angleEarth = 0;
            let angleMoon = 0;
            const w = cv.width, h = cv.height;
            const sunX = w / 2, sunY = h / 2;
            const earthOrbitR = Math.min(w, h) * 0.35;
            const moonOrbitR = 25;

            // Generate stars once
            const stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.5,
                    alpha: Math.random()
                });
            }

            function animate() {
                if (!document.getElementById(id)) return; // Stop if removed

                ctx.fillStyle = '#1a1a2e'; // Deep space blue
                ctx.fillRect(0, 0, w, h);

                // Draw Stars
                ctx.fillStyle = '#ffffff';
                stars.forEach(s => {
                    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() * 0.005 + s.x);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1.0;

                // Sun Glow
                const grd = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 50);
                grd.addColorStop(0, '#fca311');
                grd.addColorStop(0.4, 'rgba(252, 163, 17, 0.4)');
                grd.addColorStop(1, 'rgba(252, 163, 17, 0)');
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 50, 0, Math.PI * 2);
                ctx.fill();

                // Sun Body
                ctx.fillStyle = '#ffb703';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fb8500';
                ctx.beginPath();
                ctx.arc(sunX, sunY, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Orbit path (faint)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(sunX, sunY, earthOrbitR, 0, Math.PI * 2);
                ctx.stroke();

                // Earth Position
                const ex = sunX + earthOrbitR * Math.cos(angleEarth);
                const ey = sunY + earthOrbitR * Math.sin(angleEarth);

                // Earth Orbit Path (Moon's path around Earth)
                /*
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.beginPath();
                ctx.arc(ex, ey, moonOrbitR, 0, Math.PI*2);
                ctx.stroke();
                */

                // Moon Position
                const mx = ex + moonOrbitR * Math.cos(angleMoon);
                const my = ey + moonOrbitR * Math.sin(angleMoon);

                // Draw Moon
                ctx.fillStyle = '#e5e5e5';
                ctx.beginPath();
                ctx.arc(mx, my, 3, 0, Math.PI * 2);
                ctx.fill();

                // Draw Earth
                ctx.fillStyle = '#4cc9f0'; // Ocean
                ctx.beginPath();
                ctx.arc(ex, ey, 8, 0, Math.PI * 2);
                ctx.fill();
                // Continents (simple)
                ctx.fillStyle = '#48cae4';
                ctx.beginPath();
                ctx.arc(ex - 2, ey - 2, 3, 0, Math.PI * 2);
                ctx.fill();

                // Labels
                ctx.fillStyle = '#fff';
                ctx.font = '10px Nunito';
                ctx.textAlign = 'center';
                ctx.fillText('Sol', sunX, sunY + 30);
                ctx.fillText('Tierra', ex, ey + 20);

                // Update angles
                angleEarth += 0.005; // Slow earth orbit
                angleMoon += 0.03;   // Faster moon orbit

                requestAnimationFrame(animate);
            }

            animate();
        }

        // ============ CONSTELLATION DRAWING FUNCTIONS ============
        function drawOsaMayor(ctx, w, h) {
            // Dark sky background
            ctx.fillStyle = '#0d1b2a';
            ctx.fillRect(0, 0, w, h);

            // Star positions (scaled to canvas)
            const scale = Math.min(w / 600, h / 400);
            const ox = (w - 400 * scale) / 2;
            const oy = (h - 250 * scale) / 2;

            const estrellas = {
                alkaid: { x: ox + 380 * scale, y: oy + 100 * scale, nombre: "Alkaid" },
                mizar: { x: ox + 320 * scale, y: oy + 85 * scale, nombre: "Mizar" },
                alioth: { x: ox + 265 * scale, y: oy + 95 * scale, nombre: "Alioth" },
                megrez: { x: ox + 210 * scale, y: oy + 105 * scale, nombre: "Megrez" },
                phecda: { x: ox + 210 * scale, y: oy + 170 * scale, nombre: "Phecda" },
                merak: { x: ox + 110 * scale, y: oy + 170 * scale, nombre: "Merak" },
                dubhe: { x: ox + 110 * scale, y: oy + 90 * scale, nombre: "Dubhe" },
                polaris: { x: ox + 30 * scale, y: oy + 30 * scale, nombre: "★ Polaris" }
            };

            // Connect stars
            function conectar(est1, est2, alpha = 0.5) {
                ctx.beginPath();
                ctx.moveTo(est1.x, est1.y);
                ctx.lineTo(est2.x, est2.y);
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // Draw constellation lines
            conectar(estrellas.alkaid, estrellas.mizar);
            conectar(estrellas.mizar, estrellas.alioth);
            conectar(estrellas.alioth, estrellas.megrez);
            conectar(estrellas.megrez, estrellas.phecda);
            conectar(estrellas.phecda, estrellas.merak);
            conectar(estrellas.merak, estrellas.dubhe);
            conectar(estrellas.dubhe, estrellas.megrez);

            // Arrow from Merak-Dubhe to Polaris (dashed)
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.7)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(estrellas.dubhe.x, estrellas.dubhe.y);
            ctx.lineTo(estrellas.polaris.x, estrellas.polaris.y);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw stars
            function dibujarEstrella(estrella, radio = 4, color = "#ffffff") {
                ctx.beginPath();
                ctx.arc(estrella.x, estrella.y, radio, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#8a9ab0";
                ctx.font = '10px Nunito';
                ctx.fillText(estrella.nombre, estrella.x + 8, estrella.y - 6);
            }

            for (let key in estrellas) {
                if (key === 'polaris') {
                    dibujarEstrella(estrellas[key], 6, '#ffd700'); // Golden for Polaris
                } else {
                    dibujarEstrella(estrellas[key], 4);
                }
            }

            // Label
            ctx.font = 'bold 11px Nunito';
            ctx.fillStyle = '#4a90d9';
            ctx.fillText('→ Norte', estrellas.polaris.x - 10, estrellas.polaris.y - 20);
        }

        function drawCruzDelSur(ctx, w, h) {
            // Dark sky background with gradient
            const grd = ctx.createRadialGradient(w / 2, h, 0, w / 2, h, h);
            grd.addColorStop(0, '#1b2735');
            grd.addColorStop(1, '#050510');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            // Star positions
            const cx = w / 2;
            const scale = Math.min(w / 500, h / 500);

            const cruz = {
                gacrux: { x: cx, y: 50 * scale, r: 6, color: "#ffcc99", nombre: "Gacrux" },
                acrux: { x: cx, y: h - 60 * scale, r: 7, color: "#ccffff", nombre: "Acrux" },
                mimosa: { x: cx - 80 * scale, y: h / 2 - 20, r: 6, color: "#ddeeff", nombre: "Mimosa" },
                imai: { x: cx + 70 * scale, y: h / 2 - 40, r: 5, color: "#ffffff", nombre: "Imai" },
                ginan: { x: cx + 30 * scale, y: h - 100 * scale, r: 3, color: "#aaaaaa", nombre: "Ginan" }
            };

            // Connect stars
            ctx.beginPath();
            ctx.moveTo(cruz.gacrux.x, cruz.gacrux.y);
            ctx.lineTo(cruz.acrux.x, cruz.acrux.y);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(cruz.mimosa.x, cruz.mimosa.y);
            ctx.lineTo(cruz.imai.x, cruz.imai.y);
            ctx.stroke();

            // Draw stars
            for (let key in cruz) {
                const est = cruz[key];
                ctx.beginPath();
                ctx.arc(est.x, est.y, est.r, 0, Math.PI * 2);
                ctx.fillStyle = est.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = est.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#8888aa';
                ctx.font = '10px Nunito';
                ctx.fillText(est.nombre, est.x + 12, est.y + 4);
            }

            // Arrow to South Pole
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(255, 100, 100, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(cruz.acrux.x, cruz.acrux.y);
            ctx.lineTo(cx, h - 20);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.font = 'bold 10px Nunito';
            ctx.fillStyle = '#ff6666';
            ctx.fillText('↓ Polo Sur', cx - 25, h - 8);
        }

        // Reference system with GeoGebra-style grid
        function drawReferenceSystemGGB(ctx, w, h) {
            const state = { scale: 30, offsetX: 0, offsetY: 0 };
            drawGeoGebraGrid(ctx, w, h, state);

            const cx = w / 2, cy = h / 2;

            // Origin marker
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, Math.PI * 2);

        function initInteractiveGGB(id, drawFn, options = {}) {
            // Delay slightly to ensure DOM is ready
            setTimeout(() => {
                const ggb = createGeoGebraCanvas(id, { scale: 30, ...options });
                if (ggb) {
                    ggb.state.drawCallback = () => drawFn(ggb.canvas.getContext('2d'), ggb.canvas.width, ggb.canvas.height, ggb.state);
                    ggb.state.drawCallback();
                }
            }, 100);
        }

        function toCanvas(x, y, state, w, h) {
            const cx = w / 2 + state.offsetX;
            const cy = h / 2 + state.offsetY;
            return {
                x: cx + x * state.scaleX,
                y: cy - y * state.scaleY
            };
        }

        function drawSimpleDiagram(id, fn) {
            const c = document.getElementById(id);
            if (!c) return;
            c.innerHTML = '';
            const cv = document.createElement('canvas');
            const r = c.getBoundingClientRect();
