<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno Interactivo · Función Lineal y Geometría Analítica</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Cinzel:wght@600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'],['\\(','\\)']] },
    svg: { fontCache: 'global' },
    startup: { typeset: false }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>
<style>
:root{
  --bg-body:#eef4ff; --paper-color:#ffffff; --paper-line:#dce7f7;
  --primary:#1d4ed8; --primary-dark:#1e3a8a; --secondary:#0ea5e9;
  --accent:#f59e0b; --success:#10b981; --warning:#ef4444;
  --cyan:#06b6d4; --purple:#8b5cf6; --pink:#ec4899;
  --text-main:#0f172a; --text-muted:#475569;
  --shadow-dark:6px 6px 16px rgba(29,78,216,.18);
  --clay-shadow:8px 8px 16px rgba(29,78,216,.18),-8px -8px 16px rgba(255,255,255,.9);
  --glass-bg:rgba(255,255,255,.75); --glass-border:1px solid rgba(255,255,255,.6);
  --ggrid-major:#94a3b8; --ggrid-minor:#e2e8f0; --ggrid-axis:#0f172a;
}
body.dark-mode{
  --bg-body:#04081a; --paper-color:#0d1330; --paper-line:#1e3a8a;
  --text-main:#e0e7ff; --text-muted:#94a3b8;
  --shadow-dark:4px 4px 10px rgba(0,0,0,.6);
  --clay-shadow:6px 6px 12px rgba(0,0,0,.5),-6px -6px 12px rgba(45,65,140,.25);
  --glass-bg:rgba(20,30,70,.55);
  --ggrid-major:#475569; --ggrid-minor:#1e293b; --ggrid-axis:#e0e7ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg-body);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .4s}
#app-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;perspective:2000px;padding:10px;gap:15px}
.book-wrapper{width:96%;max-width:1400px;height:85vh;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
.book{width:100%;height:100%;display:flex;background:transparent;position:relative}
.page{flex:1;background:var(--paper-color);position:relative;display:flex;flex-direction:column;overflow:hidden;background-image:linear-gradient(var(--paper-line) 1px,transparent 1px),linear-gradient(90deg,var(--paper-line) 1px,transparent 1px);background-size:22px 22px}
.page-left{border-radius:12px 0 0 12px;box-shadow:inset -15px 0 25px -10px rgba(0,0,0,.1),var(--shadow-dark);border-right:1px solid rgba(0,0,0,.05)}
.page-right{border-radius:0 12px 12px 0;box-shadow:inset 15px 0 25px -10px rgba(0,0,0,.1),var(--shadow-dark);border-left:1px solid rgba(0,0,0,.05)}
.page-content{padding:28px 42px;overflow-y:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--primary) transparent}
.page-content::-webkit-scrollbar{width:6px}
.page-content::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
.binding-spine{position:absolute;left:50%;top:30px;bottom:30px;width:40px;transform:translateX(-50%);z-index:20;pointer-events:none;display:flex;flex-direction:column;justify-content:space-evenly}
.metal-ring{width:100%;height:12px;background:linear-gradient(90deg,#888 0%,#eee 40%,#ddd 60%,#555 100%);border-radius:6px;box-shadow:0 4px 6px rgba(0,0,0,.2);position:relative}
.metal-ring::before,.metal-ring::after{content:'';position:absolute;top:2px;bottom:2px;width:5px;background:#2c3e50;border-radius:50%;opacity:.9}
.metal-ring::before{left:-3px}.metal-ring::after{right:-3px}
.holes-strip{position:absolute;top:30px;bottom:30px;width:15px;display:flex;flex-direction:column;justify-content:space-evenly;z-index:15;pointer-events:none}
.page-left .holes-strip{right:6px;align-items:flex-end}
.page-right .holes-strip{left:6px;align-items:flex-start}
.paper-hole{width:10px;height:10px;background:#2c3e50;border-radius:50%;box-shadow:inset 1px 1px 2px rgba(0,0,0,.6)}
h1,h2,h3,h4{color:var(--text-main);margin-bottom:.7rem}
h2{position:relative;display:inline-block;color:var(--primary);font-weight:800;font-size:1.55rem;margin-top:0}
h2::after{content:'';position:absolute;bottom:-5px;left:0;width:60%;height:4px;background:var(--accent);border-radius:2px}
h3{color:var(--primary-dark);font-size:1.12rem;margin-top:14px}
h4{color:var(--secondary);font-size:1rem;margin-top:10px}
p,li{line-height:1.6;font-size:.92rem;margin-bottom:7px;text-align:justify}
strong{color:var(--primary-dark)} em{color:var(--secondary)}
code{font-family:'JetBrains Mono',monospace;background:rgba(30,58,138,.08);padding:2px 6px;border-radius:4px;font-size:.85em;color:var(--primary)}
.clay-card{background:var(--paper-color);border-radius:16px;padding:14px;margin:10px 0;box-shadow:var(--clay-shadow);border:1px solid rgba(255,255,255,.2);transition:transform .2s}
.clay-card:hover{transform:translateY(-2px)}
.glass-panel{background:var(--glass-bg);backdrop-filter:blur(10px);border:var(--glass-border);border-radius:12px;padding:13px;margin:10px 0}
.def-box{border-left:5px solid var(--secondary);background:rgba(14,165,233,.08);padding:12px 14px;border-radius:0 12px 12px 0;margin:11px 0}
.def-title{font-weight:800;color:var(--secondary);display:block;margin-bottom:5px;text-transform:uppercase;font-size:.78rem;letter-spacing:1px}
.concept-box{border-left:5px solid var(--primary);background:rgba(29,78,216,.08);padding:12px 14px;border-radius:0 12px 12px 0;margin:11px 0}
.example-box{border-left:5px solid var(--success);background:rgba(16,185,129,.08);padding:12px 14px;border-radius:0 12px 12px 0;margin:11px 0}
.example-title{font-weight:800;color:var(--success);display:block;margin-bottom:5px;font-size:.85rem}
.warning-box{border-left:5px solid var(--warning);background:rgba(239,68,68,.08);padding:12px 14px;border-radius:0 12px 12px 0;margin:11px 0}
.formula-box{background:linear-gradient(135deg,rgba(14,165,233,.12),rgba(29,78,216,.12));border:2px solid var(--secondary);border-radius:12px;padding:11px;margin:11px 0;text-align:center}
.app-box{border-left:5px solid var(--purple);background:rgba(139,92,246,.08);padding:12px 14px;border-radius:0 12px 12px 0;margin:11px 0}
.app-title{font-weight:800;color:var(--purple);display:block;margin-bottom:5px;font-size:.85rem}
table{width:100%;border-collapse:collapse;font-size:.85rem;margin:10px 0}
th{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:#fff;padding:8px;text-align:center;font-weight:700}
td{padding:7px;border-bottom:1px solid rgba(0,0,0,.08);text-align:center}
tr:nth-child(even){background:rgba(0,0,0,.02)}
tr:hover{background:rgba(29,78,216,.05)}
body.dark-mode td{border-bottom-color:rgba(255,255,255,.08)}
ul,ol{padding-left:22px}
ul li,ol li{margin-bottom:4px}

.nav-dock{display:flex;gap:10px;align-items:center;background:var(--glass-bg);backdrop-filter:blur(15px);padding:8px 20px;border-radius:50px;box-shadow:0 10px 30px rgba(0,0,0,.1);z-index:100;border:var(--glass-border);flex-shrink:0}
.btn-circle{width:44px;height:44px;border-radius:50%;border:none;background:var(--bg-body);color:var(--primary);font-size:1rem;box-shadow:var(--clay-shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-circle:hover:not(:disabled){transform:scale(1.1);color:var(--accent)}
.btn-circle:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.page-badge{font-family:'JetBrains Mono',monospace;font-weight:bold;background:var(--primary);color:#fff;padding:6px 14px;border-radius:20px;box-shadow:inset 0 2px 5px rgba(0,0,0,.2);font-size:.8rem}
.num-page{position:absolute;bottom:10px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-muted);opacity:.6}
.page-left .num-page{left:20px}.page-right .num-page{right:20px}
.footer{text-align:center;color:var(--text-muted);font-size:.72rem;font-style:italic;opacity:.85}

/* PORTADA */
.cover-page{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#0a1a3e 0%,#1e3a8a 25%,#1d4ed8 50%,#2563eb 75%,#60a5fa 100%);color:#fff;margin:-28px -42px;width:calc(100% + 84px);height:calc(100% + 56px);position:relative;overflow:hidden}
.cover-page::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(245,158,11,.1) 60deg,transparent 120deg,rgba(96,165,250,.08) 180deg,transparent 240deg,rgba(14,165,233,.08) 300deg,transparent 360deg);animation:coverRotate 22s linear infinite;pointer-events:none}
.cover-page::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(245,158,11,.2) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(14,165,233,.18) 0%,transparent 50%);pointer-events:none}
@keyframes coverRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-18px) scale(1.1);opacity:1}}
@keyframes pulse-ring{0%{transform:translate(-50%,-50%) scale(.8);opacity:.4}50%{transform:translate(-50%,-50%) scale(1.1);opacity:.15}100%{transform:translate(-50%,-50%) scale(.8);opacity:.4}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.cover-particles{position:absolute;inset:0;pointer-events:none;z-index:1}
.cover-particle{position:absolute;border-radius:50%;background:rgba(245,158,11,.6);animation:float 6s ease-in-out infinite}
.cover-particle:nth-child(1){width:4px;height:4px;top:15%;left:10%;animation-delay:0s}
.cover-particle:nth-child(2){width:6px;height:6px;top:25%;left:80%;animation-delay:1s}
.cover-particle:nth-child(3){width:3px;height:3px;top:60%;left:15%;animation-delay:2s}
.cover-particle:nth-child(4){width:5px;height:5px;top:70%;left:75%;animation-delay:.5s}
.cover-particle:nth-child(5){width:3px;height:3px;top:40%;left:90%;animation-delay:3s}
.cover-particle:nth-child(6){width:4px;height:4px;top:85%;left:45%;animation-delay:1.5s}
.cover-particle:nth-child(7){width:5px;height:5px;top:10%;left:50%;animation-delay:2.5s}
.cover-particle:nth-child(8){width:3px;height:3px;top:50%;left:30%;animation-delay:4s}
.cover-orbit{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(245,158,11,.15);animation:pulse-ring 8s ease-in-out infinite;pointer-events:none;z-index:1}
.cover-orbit:nth-of-type(1){width:460px;height:460px}
.cover-orbit:nth-of-type(2){width:340px;height:340px;animation-delay:1s}
.cover-orbit:nth-of-type(3){width:220px;height:220px;animation-delay:2s}
.cover-symbol{position:absolute;font-family:'Cinzel',serif;font-size:2.2rem;color:rgba(245,158,11,.35);z-index:1;pointer-events:none;animation:fadeInUp 2s ease}
.cover-symbol:nth-of-type(1){top:18%;left:12%;font-size:2.8rem}
.cover-symbol:nth-of-type(2){top:22%;right:10%;font-size:2.4rem}
.cover-symbol:nth-of-type(3){bottom:18%;left:14%;font-size:2.6rem}
.cover-symbol:nth-of-type(4){bottom:22%;right:12%;font-size:2.2rem}
.cover-symbol:nth-of-type(5){top:48%;left:6%;font-size:2rem}
.cover-symbol:nth-of-type(6){top:45%;right:8%;font-size:2.2rem}
.cover-content{position:relative;z-index:5;animation:fadeInUp 1s ease;padding:20px}
.cover-icon-wrapper{margin-bottom:16px}
.cover-icon{width:86px;height:86px;border-radius:50%;background:rgba(245,158,11,.18);display:inline-flex;align-items:center;justify-content:center;font-size:2.3rem;color:#f59e0b;box-shadow:0 0 60px rgba(245,158,11,.5),inset 0 0 30px rgba(255,255,255,.1);border:2px solid rgba(245,158,11,.5)}
.cover-subtitle{font-size:.95rem;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:10px;font-weight:300}
.cover-page h1{font-family:'Cinzel',serif;font-size:3.2rem;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,#fff 20%,#fbbf24 50%,#fff 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0 0 10px;text-shadow:0 0 40px rgba(251,191,36,.4)}
.cover-page h2{color:#fde68a;font-size:1rem;font-weight:300;letter-spacing:2px;text-align:center;border:none;margin:0 0 20px}
.cover-page h2::after{display:none}
.cover-separator{width:160px;height:2px;background:linear-gradient(90deg,transparent,#f59e0b 50%,transparent);margin:16px auto}
.cover-badge{display:inline-block;padding:8px 22px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.5);border-radius:30px;color:#fde68a;font-family:'JetBrains Mono',monospace;font-size:.9rem;margin-top:8px;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(245,158,11,.3)}
.cover-footer{font-size:.82rem;opacity:.65;margin-top:22px;letter-spacing:2px}

/* LÍNEA DE TIEMPO */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--secondary),var(--primary));border-radius:2px}
.tl-item{position:relative;padding:8px 0 14px 18px;animation:fadeInUp .6s ease}
.tl-dot{position:absolute;left:-26px;top:6px;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem;box-shadow:0 0 0 3px var(--paper-color),0 0 0 5px var(--secondary)}
.tl-year{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--accent);font-size:.78rem}
.tl-title{font-weight:800;color:var(--primary);margin:3px 0;font-size:.95rem}
.tl-desc{font-size:.84rem;color:var(--text-main)}

/* MAPA CONCEPTUAL */
.concept-map{position:relative;width:100%;height:420px;margin:10px 0}
.cm-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cm-node{position:absolute;transform:translate(-50%,-50%);padding:8px 14px;border-radius:12px;font-weight:800;font-size:.78rem;text-align:center;box-shadow:var(--shadow-dark);background:var(--paper-color);border:2px solid var(--primary);color:var(--primary);max-width:150px;z-index:2}
.cm-node.root{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:.95rem;padding:10px 18px;border:none;box-shadow:0 10px 24px rgba(29,78,216,.4)}
.cm-node.sub{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.cm-node.leaf{background:rgba(14,165,233,.12);font-size:.72rem;padding:5px 10px}

/* PLANO CARTESIANO ESTILO GEOGEBRA */
.cart-frame{position:relative;width:100%;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-dark);border:1px solid rgba(148,163,184,.35);margin:10px 0}
body.dark-mode .cart-frame{background:#0b1228;border-color:rgba(71,85,105,.4)}
.cart-canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
.cart-canvas:active{cursor:grabbing}
.cart-toolbar{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);padding:8px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.14);border:1px solid rgba(29,78,216,.18);z-index:4}
body.dark-mode .cart-toolbar{background:rgba(13,19,48,.94);border-color:rgba(96,165,250,.22)}
.cart-btn{width:36px;height:36px;border:none;border-radius:10px;background:linear-gradient(145deg,#fff,#eef4ff);color:var(--primary);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 6px rgba(148,163,184,.35),-2px -2px 6px rgba(255,255,255,.85);transition:all .2s}
body.dark-mode .cart-btn{background:linear-gradient(145deg,#1e3a8a,#0f1a3e);color:#93c5fd;box-shadow:2px 2px 6px rgba(0,0,0,.55),-2px -2px 6px rgba(60,90,160,.2)}
.cart-btn:hover{transform:scale(1.08);color:var(--accent)}
.cart-btn:active{transform:scale(.94)}
.cart-btn.on{background:linear-gradient(145deg,var(--accent),#d97706);color:#fff}
.cart-info{position:absolute;bottom:8px;left:10px;font-size:.72rem;background:rgba(255,255,255,.82);padding:3px 9px;border-radius:6px;color:#475569;pointer-events:none;font-family:'JetBrains Mono',monospace;z-index:4}
body.dark-mode .cart-info{background:rgba(13,19,48,.82);color:#94a3b8}
.cart-title{position:absolute;top:10px;left:12px;font-size:.78rem;font-weight:800;color:var(--primary);background:rgba(255,255,255,.85);padding:4px 10px;border-radius:8px;z-index:3;border:1px solid rgba(29,78,216,.2)}
body.dark-mode .cart-title{background:rgba(13,19,48,.85);color:#93c5fd;border-color:rgba(96,165,250,.25)}

/* SLIDERS Y CONTROLES INTERACTIVOS */
.interactive-controls{background:var(--glass-bg);backdrop-filter:blur(10px);border:var(--glass-border);border-radius:12px;padding:12px;margin:10px 0}
.control-row{display:flex;align-items:center;gap:10px;margin:6px 0;flex-wrap:wrap}
.control-label{font-weight:800;color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:.9rem;min-width:45px}
.control-slider{flex:1;min-width:120px;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--secondary));-webkit-appearance:none;appearance:none;cursor:pointer}
.control-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 2px 6px rgba(245,158,11,.5);cursor:pointer;transition:transform .2s}
.control-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.control-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 2px 6px rgba(245,158,11,.5);cursor:pointer}
.control-value{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--accent);background:rgba(245,158,11,.1);padding:3px 8px;border-radius:6px;min-width:52px;text-align:center;font-size:.85rem}
.result-display{background:linear-gradient(135deg,var(--success),var(--primary));color:#fff;padding:10px 14px;border-radius:12px;margin:8px 0;text-align:center;box-shadow:var(--shadow-dark)}
.result-display .result-title{font-size:.72rem;opacity:.9;text-transform:uppercase;letter-spacing:1.5px}
.result-display .result-value{font-size:1.15rem;font-weight:800;margin-top:3px;font-family:'JetBrains Mono',monospace}

/* INPUTS Y BOTONES LAB */
.lab-input{padding:7px 11px;border-radius:10px;border:2px solid var(--paper-line);background:var(--paper-color);color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;margin:3px;width:70px;text-align:center}
.lab-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.2)}
.lab-btn{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;padding:8px 16px;border-radius:10px;font-weight:700;cursor:pointer;box-shadow:0 4px 10px rgba(29,78,216,.3);transition:all .2s;font-size:.86rem;margin:3px;font-family:'Nunito',sans-serif}
.lab-btn:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(29,78,216,.4)}
.lab-btn.accent{background:linear-gradient(135deg,var(--accent),#d97706)}
.lab-btn.success{background:linear-gradient(135deg,var(--success),#047857)}
.lab-btn.warn{background:linear-gradient(135deg,var(--warning),#b91c1c)}

/* QUIZ */
.quiz-option{display:block;width:100%;padding:9px 13px;margin:5px 0;border-radius:10px;background:var(--paper-color);border:2px solid var(--paper-line);cursor:pointer;text-align:left;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--text-main);transition:all .2s}
.quiz-option:hover{border-color:var(--primary);background:rgba(29,78,216,.05);transform:translateX(4px)}
.quiz-option.correct{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-color:#047857}
.quiz-option.wrong{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;border-color:#991b1b}
.quiz-score{display:inline-block;padding:5px 13px;background:var(--accent);color:#fff;border-radius:20px;font-weight:800;font-family:'JetBrains Mono',monospace;font-size:.85rem}

/* HISTÓRICO / IMÁGENES */
.historic-img{width:100%;max-width:340px;border-radius:14px;box-shadow:0 10px 28px rgba(29,78,216,.3);margin:8px auto;display:block;border:3px solid rgba(245,158,11,.35)}
.caption{font-size:.74rem;font-style:italic;color:var(--text-muted);text-align:center;margin-top:-2px;margin-bottom:10px}

/* MODAL ÍNDICE */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:300}
.modal-overlay.active{display:flex}
.modal-content{background:var(--paper-color);border-radius:16px;padding:22px;max-width:640px;max-height:82vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:1.4rem;color:var(--text-muted);cursor:pointer}
.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.index-item{padding:9px 11px;background:rgba(29,78,216,.05);border-radius:8px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:.84rem}
.index-item:hover{background:rgba(29,78,216,.14);border-left-color:var(--primary);transform:translateX(4px)}

#mobile-fab{display:none;position:fixed;bottom:80px;right:12px;z-index:210;padding:9px 14px;border-radius:30px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;box-shadow:0 4px 14px rgba(29,78,216,.4);font-weight:700;font-size:.82rem;cursor:pointer;display:none;align-items:center;gap:6px}
@media (max-width:900px){
  .book-wrapper{width:100%;height:75vh}
  .page-right{display:none}
  .page-left{width:100%;border-radius:12px;border:none;box-shadow:var(--clay-shadow)}

  .cover-page{margin:-20px -20px;width:calc(100% + 40px);height:calc(100% + 40px)}
  .cover-page h1{font-size:2rem}
  #mobile-fab{display:flex}
  .page-content{padding:18px 20px}

  .btn-circle{width:38px;height:38px}

}

.sw-chip.off{background:linear-gradient(135deg,var(--warning),#b91c1c);color:#fff;border-color:var(--warning)}

<script>
/* ══════════════════════════════════════════════════════════════════════════
   🎨 MOTOR CartPlot — PLANO CARTESIANO ESTILO GEOGEBRA (Canvas puro)
   ══════════════════════════════════════════════════════════════════════════
   Dibuja: cuadrícula menor (subdivisiones) + mayor (unidades) + ejes con
   flechas y números tradicionales, reglas con marcas mayores/menores,
   puntos, segmentos, líneas, polígonos, círculos, triángulos rellenos,
   texto LaTeX sencillo y etiquetas. Soporta pan con mouse/touch, zoom con
   rueda (preservando el punto bajo el cursor), y tiene un panel flotante
   con botones: zoom+, zoom-, arrastre, restablecer vista, pantalla completa.
   ══════════════════════════════════════════════════════════════════════════ */

class CartPlot {
  constructor(canvas, opts = {}) {
    this.cv   = canvas;
    this.ctx  = canvas.getContext('2d');
    this.opts = Object.assign({
      xMin: -10, xMax: 10, yMin: -7, yMax: 7,
      scale: 32,         // px por unidad (automático si null)
      minorDiv: 5,       // subdivisiones por unidad mayor
      showAxes: true, showNumbers: true, showGrid: true, showTicks: true,
      title: '',
      objects: []        // lista de {kind, ...params}
    }, opts);
    this.state = { ox: 0, oy: 0, scale: this.opts.scale, dragging: false, lx: 0, ly: 0, panMode: false };
    this._fit();
    this._bind();
    this.draw();
  }
  _fit() {
    // Ajusta resolución al DPR y al tamaño físico del contenedor.
    const dpr = window.devicePixelRatio || 1;
    const r = this.cv.getBoundingClientRect();
    this.cv.width  = Math.max(200, Math.round(r.width  * dpr));
    this.cv.height = Math.max(160, Math.round(r.height * dpr));
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // Centrar la vista respecto a los límites pedidos
    const cw = r.width, ch = r.height;
    const autoScale = Math.min(cw / (this.opts.xMax - this.opts.xMin), ch / (this.opts.yMax - this.opts.yMin));
    if (!this.opts.scale) this.state.scale = autoScale;
    this.state.ox = cw / 2 - (this.opts.xMin + this.opts.xMax) / 2 * this.state.scale;
    this.state.oy = ch / 2 + (this.opts.yMin + this.opts.yMax) / 2 * this.state.scale;
  }
  // Transformaciones
  X(x) { return this.state.ox + x * this.state.scale; }
  Y(y) { return this.state.oy - y * this.state.scale; }
  invX(px){ return (px - this.state.ox) / this.state.scale; }
  invY(py){ return (this.state.oy - py) / this.state.scale; }

  _bind() {
    // Zoom con rueda (conservando el punto bajo el cursor)
    this.cv.addEventListener('wheel', e => {
      e.preventDefault();
      const r = this.cv.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const wx = this.invX(mx), wy = this.invY(my);
      const k = e.deltaY < 0 ? 1.15 : 1/1.15;
      this.state.scale = Math.max(4, Math.min(400, this.state.scale * k));
      this.state.ox = mx - wx * this.state.scale;
      this.state.oy = my + wy * this.state.scale;
      this.draw();
    }, { passive:false });

    const down = (x, y) => { this.state.dragging = true; this.state.lx = x; this.state.ly = y; this.cv.style.cursor = 'grabbing'; };
    const move = (x, y) => {
      if (!this.state.dragging) return;
      this.state.ox += x - this.state.lx;
      this.state.oy += y - this.state.ly;
      this.state.lx = x; this.state.ly = y;
      this.draw();
    };
    const up = () => { this.state.dragging = false; this.cv.style.cursor = 'grab'; };

    this.cv.addEventListener('mousedown', e => { const r = this.cv.getBoundingClientRect(); down(e.clientX - r.left, e.clientY - r.top); });
    window.addEventListener('mousemove', e => { const r = this.cv.getBoundingClientRect(); move(e.clientX - r.left, e.clientY - r.top); });
    window.addEventListener('mouseup', up);

    this.cv.addEventListener('touchstart', e => {
      if (e.touches.length === 1) { e.preventDefault(); const r = this.cv.getBoundingClientRect(); const t = e.touches[0]; down(t.clientX - r.left, t.clientY - r.top); }
    }, { passive:false });
    this.cv.addEventListener('touchmove', e => {
      if (e.touches.length === 1) { e.preventDefault(); const r = this.cv.getBoundingClientRect(); const t = e.touches[0]; move(t.clientX - r.left, t.clientY - r.top); }
    }, { passive:false });
    this.cv.addEventListener('touchend', up);

    window.addEventListener('resize', () => { this._fit(); this.draw(); });
  }
  // CONTROLES EXTERNOS
  zoom(k){
    const r = this.cv.getBoundingClientRect();
    const cx = r.width/2, cy = r.height/2;
    const wx = this.invX(cx), wy = this.invY(cy);
    this.state.scale = Math.max(4, Math.min(400, this.state.scale * k));
    this.state.ox = cx - wx * this.state.scale;
    this.state.oy = cy + wy * this.state.scale;
    this.draw();
  }
  reset(){ this.state.scale = this.opts.scale || 32; this._fit(); this.draw(); }

  // Decidir paso de unidad mayor según el zoom (1, 2, 5, 10, 20, 50 ...)
  _niceStep(){
    const target = 60; // px deseados entre marcas mayores
    const raw = target / this.state.scale;
    const pow = Math.pow(10, Math.floor(Math.log10(raw)));
    const frac = raw / pow;
    let m;
    if (frac < 1.5)      m = 1;
    else if (frac < 3.5) m = 2;
    else if (frac < 7.5) m = 5;
    else                 m = 10;
    return m * pow;
  }

  draw() {
    const ctx = this.ctx;
    const r = this.cv.getBoundingClientRect();
    const W = r.width, H = r.height;
    // Fondo
    const bg = getComputedStyle(document.body).getPropertyValue('--paper-color').trim() || '#fff';
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    const gMinor = getComputedStyle(document.body).getPropertyValue('--ggrid-minor').trim() || '#e5e7eb';
    const gMajor = getComputedStyle(document.body).getPropertyValue('--ggrid-major').trim() || '#94a3b8';
    const axisC  = getComputedStyle(document.body).getPropertyValue('--ggrid-axis').trim()  || '#0f172a';

    const step = this._niceStep();
    const sub  = step / this.opts.minorDiv;
    const xMinW = this.invX(0), xMaxW = this.invX(W);
    const yMinW = this.invY(H), yMaxW = this.invY(0);

    // -- CUADRÍCULA MENOR --
    if (this.opts.showGrid) {
      ctx.strokeStyle = gMinor; ctx.lineWidth = 1;
      const x0 = Math.ceil(xMinW / sub) * sub;
      for (let x = x0; x <= xMaxW; x += sub) {
        const px = this.X(x);
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
      }
      const y0 = Math.ceil(yMinW / sub) * sub;
      for (let y = y0; y <= yMaxW; y += sub) {
        const py = this.Y(y);
        ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
      }
      // -- CUADRÍCULA MAYOR --
      ctx.strokeStyle = gMajor; ctx.lineWidth = 1.1;
      const X0 = Math.ceil(xMinW / step) * step;
      for (let x = X0; x <= xMaxW; x += step) {
        const px = this.X(x);
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
      }
      const Y0 = Math.ceil(yMinW / step) * step;
      for (let y = Y0; y <= yMaxW; y += step) {
        const py = this.Y(y);
        ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
      }
    }

    // -- EJES --
    if (this.opts.showAxes) {
      ctx.strokeStyle = axisC; ctx.fillStyle = axisC; ctx.lineWidth = 1.6;
      const oxP = this.X(0), oyP = this.Y(0);
      // Eje X
      ctx.beginPath(); ctx.moveTo(0, oyP); ctx.lineTo(W, oyP); ctx.stroke();
      // Flecha derecha
      ctx.beginPath(); ctx.moveTo(W - 1, oyP); ctx.lineTo(W - 11, oyP - 5); ctx.lineTo(W - 11, oyP + 5); ctx.closePath(); ctx.fill();
      // Eje Y
      ctx.beginPath(); ctx.moveTo(oxP, 0); ctx.lineTo(oxP, H); ctx.stroke();
      // Flecha arriba
      ctx.beginPath(); ctx.moveTo(oxP, 1); ctx.lineTo(oxP - 5, 11); ctx.lineTo(oxP + 5, 11); ctx.closePath(); ctx.fill();
      // Etiquetas X e Y
      ctx.font = 'bold 12px "Nunito", sans-serif';
      ctx.fillText('X', W - 14, oyP + 16);
      ctx.fillText('Y', oxP + 8, 14);

      // -- MARCAS (ticks) --
      if (this.opts.showTicks) {
        ctx.lineWidth = 1;
        // Menores en X
        const x0 = Math.ceil(xMinW / sub) * sub;
        for (let x = x0; x <= xMaxW; x += sub) {
          const px = this.X(x);
          ctx.beginPath(); ctx.moveTo(px, oyP - 3); ctx.lineTo(px, oyP + 3); ctx.stroke();
        }
        const y0 = Math.ceil(yMinW / sub) * sub;
        for (let y = y0; y <= yMaxW; y += sub) {
          const py = this.Y(y);
          ctx.beginPath(); ctx.moveTo(oxP - 3, py); ctx.lineTo(oxP + 3, py); ctx.stroke();
        }
        // Mayores en X
        ctx.lineWidth = 1.4;
        const X0 = Math.ceil(xMinW / step) * step;
        for (let x = X0; x <= xMaxW; x += step) {
          if (Math.abs(x) < 1e-9) continue;
          const px = this.X(x);
          ctx.beginPath(); ctx.moveTo(px, oyP - 6); ctx.lineTo(px, oyP + 6); ctx.stroke();
        }
        const Y0 = Math.ceil(yMinW / step) * step;
        for (let y = Y0; y <= yMaxW; y += step) {
          if (Math.abs(y) < 1e-9) continue;
          const py = this.Y(y);
          ctx.beginPath(); ctx.moveTo(oxP - 6, py); ctx.lineTo(oxP + 6, py); ctx.stroke();
        }
      }

      // -- NÚMEROS --
      if (this.opts.showNumbers) {
        ctx.font = '11px "JetBrains Mono", monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        const X0 = Math.ceil(xMinW / step) * step;
        for (let x = X0; x <= xMaxW; x += step) {
          if (Math.abs(x) < 1e-9) continue;
          const lbl = Math.abs(x) < 1e-6 ? '0' : (+x.toFixed(4)).toString();
          const px = this.X(x);
          ctx.fillText(lbl, px, oyP + 6);
        }
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        const Y0 = Math.ceil(yMinW / step) * step;
        for (let y = Y0; y <= yMaxW; y += step) {
          if (Math.abs(y) < 1e-9) continue;
          const lbl = Math.abs(y) < 1e-6 ? '0' : (+y.toFixed(4)).toString();
          const py = this.Y(y);
          ctx.fillText(lbl, oxP - 7, py);
        }
        // Origen
        ctx.textAlign = 'right'; ctx.textBaseline = 'top';
        ctx.fillText('O', oxP - 6, oyP + 4);
      }
    }

    // -- OBJETOS --
    (this.opts.objects || []).forEach(o => this._drawObj(o));
  }

  _drawObj(o) {
    const ctx = this.ctx;
    const c = o.color || '#1d4ed8';
    const lw = o.lineWidth || 2;
    switch (o.kind) {
      case 'point': {
        const px = this.X(o.x), py = this.Y(o.y);
        ctx.fillStyle = c; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, o.r || 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        if (o.label) {
          ctx.fillStyle = c;
          ctx.font = 'bold 12px "Nunito", sans-serif';
          ctx.textAlign = o.labelAlign || 'left'; ctx.textBaseline = o.labelBase || 'bottom';
          const dx = o.labelDx ?? 8, dy = o.labelDy ?? -8;
          ctx.fillText(o.label, px + dx, py + dy);
        }
        break;
      }
      case 'segment': {
        ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.setLineDash(o.dashed ? [6,4] : []);
        ctx.beginPath(); ctx.moveTo(this.X(o.x1), this.Y(o.y1)); ctx.lineTo(this.X(o.x2), this.Y(o.y2)); ctx.stroke();
        ctx.setLineDash([]);
        if (o.label) {
          const mx = (this.X(o.x1) + this.X(o.x2)) / 2;
          const my = (this.Y(o.y1) + this.Y(o.y2)) / 2;
          ctx.fillStyle = c;
          ctx.font = 'bold 12px "Nunito", sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(o.label, mx + (o.labelDx||0), my + (o.labelDy||-10));
        }
        break;
      }
      case 'line': {
        // y = m x + b, o "vertical" con x = a
        ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.setLineDash(o.dashed ? [6,4] : []);
        const r = this.cv.getBoundingClientRect();
        if (o.vertical !== undefined) {
          const px = this.X(o.vertical);
          ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, r.height); ctx.stroke();
        } else {
          const xa = this.invX(0), xb = this.invX(r.width);
          const ya = o.m * xa + o.b, yb = o.m * xb + o.b;
          ctx.beginPath(); ctx.moveTo(this.X(xa), this.Y(ya)); ctx.lineTo(this.X(xb), this.Y(yb)); ctx.stroke();
        }
        ctx.setLineDash([]);
        if (o.label) {
          // Dibuja etiqueta cerca del centro visible
          const mx = (o.labelX !== undefined) ? o.labelX : (this.invX(r.width/2));
          const my = (o.vertical !== undefined) ? this.invY(r.height/2) : (o.m * mx + o.b);
          ctx.fillStyle = c; ctx.font = 'bold 13px "Nunito", sans-serif';
          ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
          ctx.fillText(o.label, this.X(mx) + 6, this.Y(my) - 6);
        }
        break;
      }
      case 'polygon': {
        // o.pts = [[x1,y1],[x2,y2],...]
        ctx.fillStyle = o.fill || 'rgba(245,158,11,.22)';
        ctx.strokeStyle = c; ctx.lineWidth = lw;
        ctx.beginPath();
        o.pts.forEach((p, i) => { const px = this.X(p[0]), py = this.Y(p[1]); if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); });
        ctx.closePath(); ctx.fill(); ctx.stroke();
        break;
      }
      case 'circle': {
        ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.setLineDash(o.dashed ? [5,4] : []);
        ctx.beginPath(); ctx.arc(this.X(o.cx), this.Y(o.cy), o.r * this.state.scale, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        break;
      }
      case 'text': {
        ctx.fillStyle = c; ctx.font = o.font || 'bold 13px "Nunito", sans-serif';
        ctx.textAlign = o.align || 'left'; ctx.textBaseline = o.base || 'alphabetic';
        ctx.fillText(o.t, this.X(o.x), this.Y(o.y));
        break;
      }
      case 'rect': {
        ctx.strokeStyle = c; ctx.lineWidth = lw;
        ctx.fillStyle = o.fill || 'transparent';
        const px = this.X(o.x), py = this.Y(o.y + o.h);
        const w = o.w * this.state.scale, h = o.h * this.state.scale;
        ctx.fillRect(px, py, w, h); ctx.strokeRect(px, py, w, h);
        break;
      }
      case 'rightAngle': {
        // pequeño cuadrado ángulo recto en el vértice v, con lados hacia a y b
        const s = 10 / this.state.scale;
        const vx = o.v[0], vy = o.v[1];
        const ax = o.a[0] - vx, ay = o.a[1] - vy; const la = Math.hypot(ax, ay);
        const bx = o.b[0] - vx, by = o.b[1] - vy; const lb = Math.hypot(bx, by);
        const ux = ax/la*s, uy = ay/la*s;
        const wx = bx/lb*s, wy = by/lb*s;
        ctx.strokeStyle = c; ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(this.X(vx+ux), this.Y(vy+uy));
        ctx.lineTo(this.X(vx+ux+wx), this.Y(vy+uy+wy));
        ctx.lineTo(this.X(vx+wx), this.Y(vy+wy));
        ctx.stroke();
        break;
      }
    }
  }
}

/* -----------------------------------------------------------------
   Fábrica: crea un contenedor con canvas + toolbar + título.
   Luego createCartPlot(id, opts) devuelve la instancia.
----------------------------------------------------------------- */
function buildCartFrame(id, heightPx, title) {
  return `<div class="cart-frame" style="height:${heightPx}px">
    ${title?`<div class="cart-title"><i class="fa-solid fa-chart-line"></i> ${title}</div>`:''}
    <canvas class="cart-canvas" id="${id}"></canvas>
    <div class="cart-toolbar">
      <button class="cart-btn" data-act="zin"  title="Acercar (+)"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
      <button class="cart-btn" data-act="zout" title="Alejar (−)"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
      <button class="cart-btn" data-act="pan"  title="Arrastrar"><i class="fa-solid fa-up-down-left-right"></i></button>
      <button class="cart-btn" data-act="rst"  title="Restablecer vista"><i class="fa-solid fa-compress-arrows-alt"></i></button>
      <button class="cart-btn" data-act="fs"   title="Pantalla completa"><i class="fa-solid fa-expand"></i></button>
    </div>
    <div class="cart-info" id="${id}-info">x: 0.00 · y: 0.00</div>
  </div>`;
}

function createCartPlot(id, opts) {
  const cv = document.getElementById(id);
  if (!cv) return null;
  const plot = new CartPlot(cv, opts);
  // Cursor info al mover
  cv.addEventListener('mousemove', e => {
    const r = cv.getBoundingClientRect();
    const x = plot.invX(e.clientX - r.left), y = plot.invY(e.clientY - r.top);
    const info = document.getElementById(id + '-info');
    if (info) info.textContent = `x: ${x.toFixed(2)} · y: ${y.toFixed(2)}`;
  });
  // Botones de la toolbar
  const frame = cv.closest('.cart-frame');
  frame.querySelectorAll('.cart-btn').forEach(btn => {
    btn.onclick = () => {
      const a = btn.dataset.act;
      if (a === 'zin')  plot.zoom(1.25);
      else if (a === 'zout') plot.zoom(1/1.25);
      else if (a === 'rst')  plot.reset();
      else if (a === 'fs')   { if (!document.fullscreenElement) frame.requestFullscreen(); else document.exitFullscreen(); setTimeout(()=>{plot._fit(); plot.draw();}, 250); }
      else if (a === 'pan')  { btn.classList.toggle('on'); }
    };
  });
  return plot;
}
window._plots = {};
window._makePlot = (id, opts) => { window._plots[id] = createCartPlot(id, opts); };
</script>

/* ═════ 2 · RESEÑA HISTÓRICA ═════ */
{ title:"2. Reseña histórica", left:{ html:`
<h2>2. De Euclides a Descartes</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-landmark"></i> ¿Qué es la geometría analítica?</span>
  <p>Es la rama de las matemáticas que <strong>estudia las figuras geométricas mediante un sistema de coordenadas</strong> y las herramientas del álgebra. Gracias a ella, cada punto se representa con un par ordenado $(x,y)$ y cada curva con una ecuación.</p>
</div>
<h3>Los griegos: pura geometría sintética</h3>
<p>Durante más de 1900 años, la geometría se estudió al estilo de <strong>Euclides</strong> (ca. 300 a.C.): demostraciones visuales con regla y compás, sin coordenadas. Apolonio estudió las <em>cónicas</em> (elipse, parábola, hipérbola) con ese enfoque.</p>
<h3>El álgebra crece en Oriente</h3>
<p>Al-Khwarizmi (siglo IX) sistematiza el álgebra, y Viète (s. XVI) introduce los símbolos. Pero aún no existía un puente entre álgebra y geometría.</p>`}, right:{ html:`
<h3>El giro cartesiano (1637)</h3>
<div class="concept-box">
  <p>Descartes publica <em>La Géométrie</em> como apéndice del <em>Discurso del método</em>. Allí expone la idea revolucionaria: <strong>toda curva puede describirse por una ecuación entre dos variables</strong> $x$ e $y$.</p>
  <p>Simultáneamente, <strong>Pierre de Fermat</strong> llegaba a conclusiones similares (<em>Ad locos planos et solidos isagoge</em>, 1636). Fermat es coinventor, aunque su obra se publicó póstumamente.</p>
</div>
<h3>Consecuencias inmediatas</h3>
<ul style="font-size:.88rem">
  <li>Newton y Leibniz pueden desarrollar el <strong>cálculo infinitesimal</strong> (1670s) usando coordenadas.</li>
  <li>La mecánica celeste de <strong>Kepler y Newton</strong> se formula con ecuaciones de cónicas.</li>
  <li>Euler define formalmente la noción de <strong>función</strong> (s. XVIII).</li>
</ul>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-rocket"></i> Aplicaciones modernas</span>
  <p>Hoy, toda simulación por computadora (videojuegos, GPS, robótica, impresión 3D, aprendizaje automático) se sustenta en la idea cartesiana: <strong>representar objetos geométricos con números</strong>.</p>
</div>`} },

/* ═════ 5 · PLANO CARTESIANO ═════ */
{ title:"5. Plano cartesiano", left:{ html:`
<h2>5. El plano cartesiano</h2>
<div style="text-align:center;margin:6px 0">
  <img src="../imagenes/FuncionLineal/PlanoCuadrantes.png"

</div>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-grip"></i> Definición</span>
  <p>Un <strong>sistema coordenado rectangular</strong> se forma con dos rectas numéricas perpendiculares (forman un ángulo recto 90°) que se cruzan en un punto <strong>O</strong> llamado <em>origen</em>. La recta horizontal (<strong>abscisas</strong>) y la vertical (<strong>ordenadas</strong>) se representan con las letras <strong>X</strong> y <strong>Y</strong>.</p>
</div>
<h3>Los cuatro cuadrantes</h3>
<p>Los ejes X e Y dividen el plano en cuatro regiones llamadas <strong>cuadrantes</strong>, numeradas en sentido antihorario:</p>
<table>
  <thead><tr><th>Cuadrante</th><th>Signo x</th><th>Signo y</th><th>Región</th></tr></thead>
  <tbody>
    <tr><td><strong>I</strong></td><td>+</td><td>+</td><td>Superior derecha</td></tr>
    <tr><td><strong>II</strong></td><td>−</td><td>+</td><td>Superior izquierda</td></tr>
    <tr><td><strong>III</strong></td><td>−</td><td>−</td><td>Inferior izquierda</td></tr>
    <tr><td><strong>IV</strong></td><td>+</td><td>−</td><td>Inferior derecha</td></tr>
  </tbody>
</table>
<div class="warning-box">
  <strong><i class="fa-solid fa-exclamation"></i> Cuidado</strong>
  <p>Los puntos sobre los ejes (donde $x=0$ ó $y=0$) <em>no pertenecen a ningún cuadrante</em>.</p>

{ title:"6. Coordenadas", left:{ html:`

/* ═════ 7 · DISTANCIA ENTRE DOS PUNTOS ═════ */
{ title:"7. Distancia entre dos puntos", left:{ html:`
<h2>7. Distancia entre dos puntos</h2>
<div style="text-align:center;margin:6px 0">
  <img src="../imagenes/FuncionLineal/PitagorasHipotenusa.png"
       alt="Triángulo rectángulo con catetos Δx y Δy e hipotenusa d"
       class="historic-img"
       style="max-width:100%;width:360px;border-color:rgba(245,158,11,.45)"
       loading="lazy" onerror="this.style.display='none'">
  <p class="caption">Teorema de Pitágoras: la distancia $d$ es la hipotenusa del triángulo formado por $\\Delta x$ y $\\Delta y$.</p>
</div>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-ruler"></i> Fórmula</span>
  <p>La distancia entre $P_1(x_1,y_1)$ y $P_2(x_2,y_2)$ se obtiene mediante el <strong>teorema de Pitágoras</strong>:</p>
</div>
<div class="formula-box">$d = \\sqrt{\\Delta x^2 + \\Delta y^2} = \\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}$</div>
<h3>El símbolo Δ (delta)</h3>
<p>Δ es la letra griega <em>delta</em> mayúscula. Representa <strong>variaciones</strong> o restas:</p>
<div class="formula-box" style="font-size:.9rem">
  $\\Delta x = x_2 - x_1$ <br> $\\Delta y = y_2 - y_1$
</div>
<h3>Ejemplo resuelto</h3>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-pencil"></i> $P_1(-4,2)$ y $P_2(3,5)$</span>
  <p>
    $\\Delta x = 3-(-4) = 7$<br>
    $\\Delta y = 5-2 = 3$<br>
    $d = \\sqrt{7^2 + 3^2} = \\sqrt{49+9} = \\sqrt{58} \\approx 7{,}62$
  </p>
</div>`}, right:{ html:`
<h3>Visualización</h3>
${buildCartFrame('plot-7', 380, 'Triángulo rectángulo de Pitágoras')}
<div class="glass-panel">
  <p style="font-size:.86rem"><strong>Interpretación geométrica:</strong> al trazar los catetos horizontales y verticales entre los dos puntos, formamos un <strong>triángulo rectángulo</strong> cuya hipotenusa es precisamente la distancia $d$.</p>
</div>
<div class="concept-box">
  <h4>Procedimiento paso a paso</h4>
  <ol style="font-size:.86rem">
    <li>Identifica $x_1, y_1, x_2, y_2$.</li>
    <li>Calcula $\\Delta x$ y $\\Delta y$.</li>
    <li>Eleva al cuadrado (<em>los signos desaparecen</em>).</li>
    <li>Suma y saca raíz cuadrada.</li>
    <li>Escribe la respuesta con unidades.</li>
  </ol>
</div>`} },

/* ═════ 8 · CASOS ESPECIALES + CALCULADORA ═════ */
{ title:"8. Distancia — Calculadora", left:{ html:`
<h2>8. Casos especiales</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-arrows-left-right"></i> Puntos alineados horizontalmente</span>
  <p>Si $y_1 = y_2$ (los puntos están en la misma línea horizontal):</p>
  <div class="formula-box">$d = |\\Delta x| = |x_2 - x_1|$</div>
</div>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-arrows-up-down"></i> Puntos alineados verticalmente</span>
  <p>Si $x_1 = x_2$ (los puntos están en la misma línea vertical):</p>
  <div class="formula-box">$d = |\\Delta y| = |y_2 - y_1|$</div>
</div>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Ejemplo horizontal</span>
  <p>$P_1(6,3)$ y $P_2(-4,3)$. Como $y$ es igual: $d = |{-4}-6| = 10$.</p>

</div>`}, right:{ html:`

</div>`} },

/* ═════ 9 · PUNTO MEDIO ═════ */
{ title:"9. Punto medio", left:{ html:`
<h2>9. Punto medio de un segmento</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-dot-circle"></i> Fórmula</span>
  <p>El punto medio $M$ del segmento que une $P_1(x_1,y_1)$ con $P_2(x_2,y_2)$ es:</p>
  <div class="formula-box">$M = \\left( \\dfrac{x_1+x_2}{2},\\ \\dfrac{y_1+y_2}{2} \\right)$</div>
</div>
<h3>Interpretación</h3>
<p>El punto medio es simplemente el <strong>promedio aritmético</strong> de las coordenadas: promedio de las abscisas y promedio de las ordenadas.</p>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> $P_1(-4,2)$ y $P_2(3,5)$</span>
  <p>
    $\\bar x = \\dfrac{-4+3}{2} = -\\dfrac{1}{2} = -0{,}5$<br>
    $\\bar y = \\dfrac{2+5}{2} = \\dfrac{7}{2} = 3{,}5$<br>
    $M = (-0{,}5;\\ 3{,}5)$
  </p>
</div>
<div class="warning-box">
  <strong><i class="fa-solid fa-brain"></i> Truco mental</strong>
  <p>Si uno de los puntos es el origen $(0,0)$, el punto medio es simplemente <em>la mitad de las coordenadas del otro punto</em>.</p>
</div>`}, right:{ html:`
<h3>Laboratorio del punto medio</h3>
<div class="interactive-controls">
  <div class="control-row">
    <span class="control-label">P₁:</span>
    (<input type="number" class="lab-input" id="m-x1" value="-4" step="0.5">,
     <input type="number" class="lab-input" id="m-y1" value="2"  step="0.5">)
  </div>
  <div class="control-row">
    <span class="control-label">P₂:</span>
    (<input type="number" class="lab-input" id="m-x2" value="3" step="0.5">,
     <input type="number" class="lab-input" id="m-y2" value="5" step="0.5">)
  </div>
  <div class="control-row"><button class="lab-btn success" onclick="calcMid()"><i class="fa-solid fa-crosshairs"></i> Hallar punto medio</button></div>
</div>
${buildCartFrame('plot-9', 330, 'Punto medio M')}
<div class="result-display">
  <div class="result-title">Punto medio</div>
  <div class="result-value" id="m-out">M = (−0.5, 3.5)</div>
</div>`} },

/* ═════ 10 · DIVISIÓN DE UN SEGMENTO EN RAZÓN DADA ═════ */
{ title:"10. División en razón dada", left:{ html:`
<h2>10. División de un segmento en una razón dada</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-divide"></i> Razón k = P₁P / PP₂</span>
  <p>Sea $P(x,y)$ el punto que divide al segmento dirigido $\\overline{P_1P_2}$ en la razón $k = \\dfrac{P_1P}{PP_2}$. Sus coordenadas son:</p>
  <div class="formula-box">
    $x = \\dfrac{x_1 + k\\, x_2}{1 + k} \\qquad y = \\dfrac{y_1 + k\\, y_2}{1 + k}$
  </div>
</div>
<h3>Observaciones clave</h3>
<ul style="font-size:.88rem">
  <li>Si $k = 1$, $P$ es el <strong>punto medio</strong> ($M$).</li>
  <li>Si $k = 2$, $P$ divide al segmento de forma que $P_1P$ vale el <em>doble</em> de $PP_2$.</li>
  <li>Si $k < 0$ (división externa), $P$ cae <em>fuera</em> del segmento.</li>
  <li>El caso $k \\to \\infty$ lleva a $P \\to P_2$.</li>
</ul>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Caso k = 2</span>
  <p>Si $P_1(-2,1)$ y $P_2(4,7)$ y queremos dividir en razón $k=2$:<br>
  $x = \\dfrac{-2 + 2(4)}{1+2} = \\dfrac{6}{3} = 2$<br>
  $y = \\dfrac{1 + 2(7)}{1+2} = \\dfrac{15}{3} = 5$<br>
  $\\therefore P(2, 5)$</p>
</div>`}, right:{ html:`
<h3>Laboratorio de división</h3>
<div class="interactive-controls">
  <div class="control-row">
    <span class="control-label">P₁:</span>
    (<input type="number" class="lab-input" id="r-x1" value="-2" step="0.5">,
     <input type="number" class="lab-input" id="r-y1" value="1" step="0.5">)
  </div>
  <div class="control-row">
    <span class="control-label">P₂:</span>
    (<input type="number" class="lab-input" id="r-x2" value="4" step="0.5">,
     <input type="number" class="lab-input" id="r-y2" value="7" step="0.5">)
  </div>
  <div class="control-row">
    <span class="control-label">k:</span>
    <input type="range" class="control-slider" id="r-k" min="-3" max="5" value="2" step="0.1" oninput="calcRazon()">
    <span class="control-value" id="r-k-val">2.0</span>
  </div>
</div>
${buildCartFrame('plot-10', 330, 'División P en razón k')}
<div class="result-display">
  <div class="result-title">Punto P</div>
  <div class="result-value" id="r-out">P = (2.00, 5.00)</div>
</div>`} },

/* ═════ 11 · PENDIENTE DE UNA RECTA ═════ */
{ title:"11. Pendiente", left:{ html:`
<h2>11. Pendiente de una recta</h2>
<div style="text-align:center;margin:6px 0">
  <img src="../imagenes/FuncionLineal/TechoPendiente.png"
       alt="Techo a dos aguas con la pendiente como razón Δy/Δx"
       class="historic-img"
       style="max-width:100%;width:360px;border-color:rgba(220,38,38,.45)"
       loading="lazy" onerror="this.style.display='none'">
  <p class="caption">La pendiente en la vida real: el techo de una casa tiene una inclinación $m = \\Delta y / \\Delta x$.</p>
</div>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-angle-up"></i> Definición</span>
  <p>La <strong>pendiente</strong> de una recta es una medida de su <em>inclinación</em>. Se calcula como la razón entre el desplazamiento vertical y el desplazamiento horizontal:</p>
</div>
<div class="formula-box">$m = \\dfrac{\\Delta y}{\\Delta x} = \\dfrac{y_2 - y_1}{x_2 - x_1}$</div>
<h3>Interpretación de la pendiente</h3>
<ul style="font-size:.88rem">
  <li>Si $m > 0$: recta <strong>creciente</strong> (sube de izquierda a derecha) 📈</li>
  <li>Si $m < 0$: recta <strong>decreciente</strong> (baja de izquierda a derecha) 📉</li>
  <li>Si $m = 0$: recta <strong>horizontal</strong> ➖</li>
  <li>Si $m$ <em>no existe</em> ($x_1 = x_2$): recta <strong>vertical</strong> ⏐</li>
</ul>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> $P_1(-4,1)$ y $P_2(4,5)$</span>
  <p>
    $m = \\dfrac{5-1}{4-(-4)} = \\dfrac{4}{8} = \\dfrac{1}{2}$<br>
    Por cada <strong>2 unidades que avanzamos horizontalmente</strong>, la recta <strong>sube 1 unidad</strong>.
  </p>
</div>`}, right:{ html:`
<h3>Visualización de la pendiente</h3>
${buildCartFrame('plot-11', 360, 'Pendiente como razón Δy/Δx')}
<div class="glass-panel">
  <p style="font-size:.85rem"><strong>Interpretación física:</strong> la pendiente es la <em>tasa de cambio</em> de $y$ respecto a $x$. En un gráfico posición–tiempo, es la <b>velocidad</b>. En un gráfico costo–cantidad, es el <b>costo marginal</b>.</p>
</div>
<div class="warning-box">
  <strong><i class="fa-solid fa-triangle-exclamation"></i> Errores comunes</strong>
  <ul style="font-size:.84rem">
    <li>Invertir el orden: $\\dfrac{x_2-x_1}{y_2-y_1}$ ❌ — eso sería la pendiente recíproca.</li>
    <li>Olvidar el signo: si bajas, la pendiente es <strong>negativa</strong>.</li>
    <li>Dividir por cero: si $x_1 = x_2$, la pendiente <em>no existe</em>.</li>
  </ul>
</div>`} },

/* ═════ 13 · ECUACIÓN PENDIENTE-INTERCEPTO ═════ */
{ title:"13. y = mx + b", left:{ html:`
<h2>13. Ecuación pendiente–intercepto</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-chart-line"></i> Forma 1</span>
  <p>La ecuación de la recta que <strong>intercepta al eje Y</strong> en el punto $(0,b)$ y tiene pendiente $m$ es:</p>
</div>
<div class="formula-box">$y = m \\cdot x + b$</div>
<h3>Significado de cada parámetro</h3>
<ul style="font-size:.9rem">
  <li>$m$ = <strong>pendiente</strong> (inclinación).</li>
  <li>$b$ = <strong>intercepto vertical</strong> (dónde la recta corta al eje Y).</li>
</ul>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Ejemplo</span>
  <p>Ecuación de la recta que intercepta al eje Y en $B(0,-4)$ y tiene pendiente $m=3$:<br><br>
  $y = m \\cdot x + b$<br>
  $y = 3 \\cdot x + (-4)$<br>
  $\\boxed{y = 3x - 4}$</p>
</div>
<div class="warning-box">
  <strong><i class="fa-solid fa-lightbulb"></i> Observa</strong>
  <p>El valor de $b$ es la <em>distancia vertical</em> (positiva o negativa) donde la recta corta el eje Y.</p>
</div>`}, right:{ html:`
<h3>Laboratorio pendiente–intercepto</h3>
<div class="interactive-controls">
  <div class="control-row">
    <span class="control-label">m =</span>
    <input type="range" class="control-slider" id="y1-m" min="-5" max="5" value="3" step="0.1" oninput="updY1()">
    <span class="control-value" id="y1-m-val">3.0</span>
  </div>
  <div class="control-row">
    <span class="control-label">b =</span>
    <input type="range" class="control-slider" id="y1-b" min="-6" max="6" value="-4" step="0.1" oninput="updY1()">
    <span class="control-value" id="y1-b-val">-4.0</span>
  </div>
</div>
${buildCartFrame('plot-13', 360, 'y = m·x + b')}
<div class="result-display">
  <div class="result-title">Ecuación</div>
  <div class="result-value" id="y1-eq">y = 3x − 4</div>
</div>`} },

/* ═════ 14 · ECUACIÓN PUNTO-PENDIENTE ═════ */
{ title:"14. Punto–pendiente", left:{ html:`
<h2>14. Ecuación punto–pendiente</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-arrow-right-long"></i> Forma 2</span>
  <p>La ecuación de la recta que pasa por el punto $P_1(x_1, y_1)$ y tiene pendiente $m$ es:</p>
</div>
<div class="formula-box">$y = m(x - x_1) + y_1$</div>
<p style="font-size:.88rem">Es la forma más útil cuando se conoce la pendiente y <strong>un punto cualquiera</strong> (no necesariamente el intercepto con el eje Y).</p>
<h3>Ejemplo paso a paso</h3>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Recta por $A(-5,-2)$ con pendiente $m=2$</span>
  <p>
    $y = m(x - x_1) + y_1$<br>
    $y = 2(x - (-5)) + (-2)$<br>
    $y = 2(x + 5) - 2$<br>
    $y = 2x + 10 - 2$<br>
    $\\boxed{y = 2x + 8}$
  </p>
</div>`}, right:{ html:`
<h3>Laboratorio punto–pendiente</h3>
<div class="interactive-controls">
  <div class="control-row">
    <span class="control-label">x₁:</span>
    <input type="range" class="control-slider" id="pp-x1" min="-8" max="8" value="-5" step="0.5" oninput="updPP()">
    <span class="control-value" id="pp-x1-val">-5.0</span>
  </div>
  <div class="control-row">
    <span class="control-label">y₁:</span>
    <input type="range" class="control-slider" id="pp-y1" min="-6" max="6" value="-2" step="0.5" oninput="updPP()">
    <span class="control-value" id="pp-y1-val">-2.0</span>
  </div>
  <div class="control-row">
    <span class="control-label">m =</span>
    <input type="range" class="control-slider" id="pp-m"  min="-5" max="5" value="2"  step="0.1" oninput="updPP()">
    <span class="control-value" id="pp-m-val">2.0</span>
  </div>
</div>
${buildCartFrame('plot-14', 380, 'y = m(x − x₁) + y₁')}
<div class="result-display">
  <div class="result-title">Ecuación simplificada</div>
  <div class="result-value" id="pp-eq">y = 2x + 8</div>
</div>`} },

/* ═════ 15 · ECUACIÓN DOS PUNTOS ═════ */
{ title:"15. Por dos puntos", left:{ html:`
<h2>15. Recta que pasa por dos puntos</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-arrows-to-dot"></i> Forma 3</span>
  <p>Si conocemos $P_1(x_1,y_1)$ y $P_2(x_2,y_2)$, primero calculamos la pendiente y luego usamos la forma punto–pendiente:</p>
</div>
<div class="formula-box">
  $m = \\dfrac{y_2 - y_1}{x_2 - x_1}$ <br><br>
  $y = \\left( \\dfrac{y_2 - y_1}{x_2 - x_1} \\right)(x - x_1) + y_1$
</div>
<h3>Ejemplo guiado</h3>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> $P_1(-4,1)$ y $P_2(4,5)$</span>
  <p>Paso 1 — Pendiente:<br>
  $m = \\dfrac{5-1}{4-(-4)} = \\dfrac{4}{8} = \\dfrac{1}{2}$</p>
  <p>Paso 2 — Sustituir en punto–pendiente:<br>
  $y = \\tfrac{1}{2}(x - 4) + 5$<br>
  $y = \\tfrac{1}{2}x - 2 + 5$<br>
  $\\boxed{y = \\tfrac{1}{2}x + 3}$</p>
</div>`}, right:{ html:`
<h3>Laboratorio: recta por dos puntos</h3>
<div class="interactive-controls">
  <div class="control-row">
    <span class="control-label">P₁:</span>
    (<input type="number" class="lab-input" id="dp-x1" value="-4" step="0.5" onchange="updDP()">,
     <input type="number" class="lab-input" id="dp-y1" value="1"  step="0.5" onchange="updDP()">)
  </div>
  <div class="control-row">
    <span class="control-label">P₂:</span>
    (<input type="number" class="lab-input" id="dp-x2" value="4" step="0.5" onchange="updDP()">,
     <input type="number" class="lab-input" id="dp-y2" value="5" step="0.5" onchange="updDP()">)
  </div>
  <div class="control-row"><button class="lab-btn" onclick="updDP()"><i class="fa-solid fa-play"></i> Graficar</button></div>
</div>
${buildCartFrame('plot-15', 380, 'Recta por P₁ y P₂')}
<div class="result-display">
  <div class="result-title">Ecuación simplificada</div>
  <div class="result-value" id="dp-eq">y = 0.50 x + 3</div>
</div>`} },

/* ═════ 16 · ECUACIÓN GENERAL ═════ */
{ title:"16. Ecuación general", left:{ html:`
<h2>16. Ecuación general de la recta</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-vector-square"></i> Forma 4</span>
  <p>Toda recta del plano puede expresarse en la <strong>forma general</strong>:</p>
</div>
<div class="formula-box">$A \\cdot x + B \\cdot y + C = 0$</div>
<p style="font-size:.88rem">Si $B \\neq 0$, podemos despejar $y$ y obtener la forma pendiente–intercepto:</p>
<div class="formula-box" style="font-size:.95rem">
  $y = -\\dfrac{A}{B} \\cdot x - \\dfrac{C}{B}$
</div>
<p style="font-size:.88rem">Comparando con $y = m x + b$ se concluye:</p>
<div class="formula-box" style="font-size:.95rem">
  $m = -\\dfrac{A}{B}\\qquad b = -\\dfrac{C}{B}$
</div>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Ejemplo</span>

/* ═════ 17 · ECUACIÓN CANÓNICA / SEGMENTARIA ═════ */
{ title:"17. Canónica o segmentaria", left:{ html:`
<h2>17. Ecuación canónica (segmentaria)</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-divide"></i> Forma 5</span>
  <p>Es la expresión de la recta en función de los <strong>segmentos</strong> que determina sobre los ejes coordenados:</p>
</div>
<div class="formula-box">$\\dfrac{x}{a} + \\dfrac{y}{b} = 1$</div>
<p style="font-size:.88rem">Donde:</p>
<ul style="font-size:.88rem">
  <li>$a$ = valor de $x$ donde la recta corta al eje X, es decir el punto $(a, 0)$.</li>
  <li>$b$ = valor de $y$ donde la recta corta al eje Y, es decir el punto $(0, b)$.</li>
</ul>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Recta que corta en $A(6,0)$ y $B(0,4)$</span>
  <p>
    $a = 6,\\ b = 4$<br>
    Canónica: $\\dfrac{x}{6} + \\dfrac{y}{4} = 1$<br><br>
    Pendiente–intercepto: despejando $y$:<br>
    $\\tfrac{y}{4} = -\\tfrac{x}{6} + 1 \\Rightarrow y = -\\tfrac{2}{3} x + 4$
  </p>
</div>`}, right:{ html:`

</div>`} },

/* ═════ 18 · RECTAS HORIZONTALES Y VERTICALES ═════ */
{ title:"18. Horizontales y verticales", left:{ html:`
<h2>18. Rectas horizontales y verticales</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-minus"></i> Recta horizontal</span>
  <p>Tiene pendiente $m = 0$. Todos los puntos tienen la <strong>misma ordenada $y$</strong>. Su ecuación es:</p>
  <div class="formula-box">$y = k$</div>
</div>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-grip-lines-vertical"></i> Recta vertical</span>
  <p>Tiene pendiente <strong>indefinida</strong> (división por cero). Todos los puntos tienen la misma <strong>abscisa $x$</strong>. Su ecuación es:</p>
  <div class="formula-box">$x = h$</div>
</div>
<div class="warning-box">
  <strong><i class="fa-solid fa-ban"></i> ¡Atención!</strong>
  <p>La recta vertical <em>no es una función</em>: al valor $x = h$ le corresponden infinitos valores de $y$. No se puede escribir en la forma $y = f(x)$.</p>
</div>
<h3>Ejemplos</h3>
<ul style="font-size:.88rem">
  <li>$y = 3$ → horizontal que pasa por $(0,3)$.</li>
  <li>$x = -2$ → vertical que pasa por $(-2, 0)$.</li>
  <li>El eje X es $y=0$; el eje Y es $x=0$.</li>
</ul>`}, right:{ html:`

</div>

<div class="glass-panel">
  <p style="font-size:.84rem">🟢 Horizontal: $y = k$ (pendiente $m=0$)<br>🔴 Vertical: $x = h$ (pendiente indefinida)</p>
</div>`} },

/* ═════ 19 · RECTAS PARALELAS ═════ */
{ title:"19. Rectas paralelas", left:{ html:`
<h2>19. Rectas paralelas</h2>
<div style="text-align:center;margin:6px 0">
  <img src="../imagenes/FuncionLineal/PuenteColgante.png"
       alt="Puente colgante con cables paralelos y pilares perpendiculares"
       class="historic-img"
       style="max-width:100%;width:360px;border-color:rgba(29,78,216,.45)"
       loading="lazy" onerror="this.style.display='none'">
  <p class="caption">Un puente colgante: cables <strong>paralelos</strong> entre sí y <strong>perpendiculares</strong> a la plataforma.</p>
</div>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-equals"></i> Criterio</span>
  <p>Dos rectas $L_1$ y $L_2$ son <strong>paralelas</strong> si y solo si tienen la <strong>misma pendiente</strong>:</p>
  <div class="formula-box">$L_1 \\parallel L_2 \\iff m_1 = m_2$</div>
</div>
<p style="font-size:.88rem">Geometricamente, dos rectas paralelas <strong>no se cruzan nunca</strong> (no tienen puntos en común) o son <em>la misma recta</em>. Son equidistantes: siempre mantienen la misma distancia entre sí.</p>
<h3>Ejemplo resuelto</h3>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Recta paralela a $4x + 2y - 5 = 0$ que pasa por $A(3,4)$</span>
  <p>Despejando: $y = -2x + \\tfrac{5}{2}\\ \\Rightarrow\\ m_1 = -2$.<br>
  Como la nueva recta es paralela: $m_2 = -2$.<br>
  Usando punto–pendiente:<br>
  $y = -2(x-3) + 4$<br>
  $y = -2x + 6 + 4$<br>
  $\\boxed{y = -2x + 10}$</p>
</div>`}, right:{ html:`
<h3>Laboratorio de paralelas</h3>
<div class="interactive-controls">

/* ═════ 20 · RECTAS PERPENDICULARES ═════ */
{ title:"20. Rectas perpendiculares", left:{ html:`
<h2>20. Rectas perpendiculares</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-square"></i> Criterio</span>
  <p>Dos rectas $L_1$ y $L_2$ son <strong>perpendiculares</strong> (se cruzan formando un ángulo de 90°) si y solo si el producto de sus pendientes es $-1$:</p>
  <div class="formula-box">$L_1 \\perp L_2 \\iff m_1 \\cdot m_2 = -1$</div>
</div>
<p style="font-size:.88rem">Equivalentemente, $m_2$ es el <strong>inverso cambiado de signo</strong> de $m_1$:</p>
<div class="formula-box">$m_2 = -\\dfrac{1}{m_1}$</div>
<h3>Ejemplo resuelto</h3>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Recta perpendicular a $4x + 2y - 5 = 0$ por $A(3,4)$</span>
  <p>$m_1 = -2$ (obtenida al despejar $y$).<br>
  $m_2 = -\\dfrac{1}{-2} = \\dfrac{1}{2}$<br><br>
  Usando punto–pendiente:<br>
  $y = \\tfrac{1}{2}(x-3) + 4 = \\tfrac{1}{2}x - \\tfrac{3}{2} + 4$<br>
  $\\boxed{y = \\tfrac{1}{2} x + \\tfrac{5}{2}}$</p>
</div>
<div class="warning-box">
  <strong><i class="fa-solid fa-circle-info"></i> Casos especiales</strong>
  <p>Una recta horizontal ($m=0$) es perpendicular a cualquier recta vertical ($m$ indefinida). En este caso la fórmula $m_1 m_2 = -1$ no aplica literalmente, pero la perpendicularidad sigue siendo cierta.</p>
</div>`}, right:{ html:`
<h3>Laboratorio de perpendiculares</h3>

/* ═════ 21 · DISTANCIA DE UN PUNTO A UNA RECTA ═════ */
{ title:"21. Punto a recta", left:{ html:`
<h2>21. Distancia de un punto a una recta</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-ruler-combined"></i> Fórmula</span>
  <p>La distancia del punto $P_1(x_1, y_1)$ a la recta $A \\cdot x + B \\cdot y + C = 0$ es:</p>
  <div class="formula-box">$d = \\dfrac{|\\, A \\cdot x_1 + B \\cdot y_1 + C\\,|}{\\sqrt{A^2 + B^2}}$</div>
</div>
<p style="font-size:.86rem">Esta fórmula devuelve <strong>siempre un valor positivo</strong> (el valor absoluto en el numerador) y mide la <em>distancia perpendicular</em> entre el punto y la recta.</p>
<h3>Ejemplo resuelto</h3>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Distancia del punto $P_1(3,4)$ a la recta $1 \\cdot x + 1 \\cdot y - 2 = 0$</span>
  <p>Identificamos $A=1,\\ B=1,\\ C=-2$.<br>
  $d = \\dfrac{|1(3) + 1(4) - 2|}{\\sqrt{1^2 + 1^2}} = \\dfrac{|5|}{\\sqrt{2}} = \\dfrac{5}{\\sqrt 2} \\approx 3{,}54$</p>
</div>
<div class="warning-box">
  <strong><i class="fa-solid fa-lightbulb"></i> Tip</strong>
  <p>Si la recta está en la forma $y = mx + b$, primero se pasa a general: $mx - y + b = 0$, con $A=m$, $B=-1$, $C=b$.</p>
</div>`}, right:{ html:`
<h3>Laboratorio punto–recta</h3>
<div class="interactive-controls">
  <div class="control-row">
    <span class="control-label">A:</span>
    <input type="number" class="lab-input" id="dr-A" value="1" step="0.5" onchange="updDR()">
    <span class="control-label">B:</span>
    <input type="number" class="lab-input" id="dr-B" value="1" step="0.5" onchange="updDR()">
    <span class="control-label">C:</span>
    <input type="number" class="lab-input" id="dr-C" value="-2" step="0.5" onchange="updDR()">
  </div>
  <div class="control-row">
    <span class="control-label">P:</span>
    (<input type="number" class="lab-input" id="dr-x" value="3" step="0.5" onchange="updDR()">,
     <input type="number" class="lab-input" id="dr-y" value="4" step="0.5" onchange="updDR()">)
  </div>
  <div class="control-row"><button class="lab-btn" onclick="updDR()"><i class="fa-solid fa-calculator"></i> Calcular</button></div>
</div>
${buildCartFrame('plot-21', 340, 'd = |Ax₁+By₁+C|/√(A²+B²)')}
<div class="result-display">
  <div class="result-title">Distancia</div>
  <div class="result-value" id="dr-out">d = |5| / √2 ≈ 3.54</div>
</div>`} },

/* ═════ 22 · ÁREA DE TRIÁNGULO (HERÓN) ═════ */
{ title:"22. Área — Herón", left:{ html:`
<h2>22. Área de un triángulo · Fórmula de Herón</h2>
<div class="def-box">
  <span class="def-title"><i class="fa-solid fa-draw-polygon"></i> Método</span>
  <p>Dados tres vértices $A, B, C$ del triángulo:</p>
  <ol style="font-size:.88rem">
    <li>Calcula las longitudes de los <strong>tres lados</strong> con la fórmula de distancia: $a, b, c$.</li>
    <li>Calcula el <strong>perímetro</strong>: $P = a + b + c$.</li>
    <li>Calcula el <strong>semiperímetro</strong>: $s = \\dfrac{P}{2}$.</li>
    <li>Aplica la fórmula de Herón para el área:</li>
  </ol>
</div>
<div class="formula-box">$\\text{Área} = \\sqrt{ s(s-a)(s-b)(s-c) }$</div>
<div class="example-box">
  <span class="example-title"><i class="fa-solid fa-star"></i> Triángulo con vértices $A(0,0)$, $B(6,0)$, $C(3,5)$</span>
  <p>
    $a = |BC| = \\sqrt{9 + 25} \\approx 5{,}83$<br>
    $b = |AC| = \\sqrt{9 + 25} \\approx 5{,}83$<br>
    $c = |AB| = 6$<br>
    $P = 17{,}66$ &nbsp; $s = 8{,}83$<br>
    $\\text{Área} = \\sqrt{8{,}83 \\cdot 3 \\cdot 3 \\cdot 2{,}83} \\approx 15$
  </p>
</div>`}, right:{ html:`

/* ═════ 23 · APLICACIÓN 1 — ESCALAS DE TEMPERATURA ═════ */
{ title:"23. Aplicación — Temperaturas", left:{ html:`
<h2>23. Aplicación: Escalas de temperatura</h2>
<div style="text-align:center;margin:6px 0">
  <img src="../imagenes/FuncionLineal/TermometrosEscalas.png"
       alt="Tres termómetros: Kelvin, Celsius y Fahrenheit con puntos de congelación y ebullición"
       class="historic-img"
       style="max-width:100%;width:340px;border-color:rgba(14,165,233,.45)"
       loading="lazy" onerror="this.style.display='none'">
  <p class="caption">Tres escalas termométricas: <strong>Kelvin</strong>, <strong>Celsius</strong> y <strong>Fahrenheit</strong>, relacionadas linealmente.</p>
</div>
<div class="app-box">
  <span class="app-title"><i class="fa-solid fa-temperature-high"></i> Problema</span>
  <p>Las escalas <strong>Celsius (°C)</strong> y <strong>Fahrenheit (°F)</strong> están relacionadas linealmente. Sabemos que el punto de congelación del agua es $0\\,°C = 32\\,°F$ y el de ebullición es $100\\,°C = 212\\,°F$. ¿Cuál es la ecuación que las relaciona?</p>
</div>
<h3>Solución</h3>
<p style="font-size:.88rem">Graficamos en el plano con $°C$ en el eje X y $°F$ en el eje Y. Tenemos los puntos $(0, 32)$ y $(100, 212)$.</p>
<div class="concept-box">
  <p>Pendiente:<br>
  $m = \\dfrac{212 - 32}{100 - 0} = \\dfrac{180}{100} = \\dfrac{9}{5}$</p>
  <p>Intercepto $b = 32$ (el valor en $°C = 0$).</p>
  <p>Ecuación:<br>
  $\\boxed{\\,°F = \\dfrac{9}{5} \\cdot °C + 32\\,}$</p>
</div>
<p style="font-size:.86rem"><strong>Inversa:</strong> despejando $°C$:<br>
$°C = \\dfrac{5}{9}(°F - 32)$</p>
<div class="warning-box">
  <strong>Kelvin:</strong> $K = °C + 273{,}15$. Tres rectas paralelas con la misma pendiente.
</div>`}, right:{ html:`

/* ═════ 24 · APLICACIÓN 2 — MRU (FÍSICA) ═════ */
{ title:"24. Aplicación — MRU", left:{ html:`
<h2>24. Aplicación: Movimiento rectilíneo uniforme</h2>
<div class="app-box">
  <span class="app-title"><i class="fa-solid fa-car"></i> Problema</span>
  <p>Dos automóviles se mueven en línea recta sobre una carretera. El auto <strong>A</strong> parte del kilómetro 0 a 20 km/h. El auto <strong>B</strong> parte del kilómetro 300 hacia <em>A</em> a 10 km/h (en sentido contrario). ¿En qué momento y lugar se encuentran?</p>
</div>
<h3>Modelado con rectas</h3>
<div class="concept-box">
  <p>Las ecuaciones de posición–tiempo son rectas con pendiente igual a la velocidad:</p>

/* ══════════════════════════════════════════════════════════════════════════
   🧠 LÓGICA INTERACTIVA DE CADA PÁGINA
   ══════════════════════════════════════════════════════════════════════════ */

/* ── Helpers numéricos ── */
const fmt = (n, d=2) => (Math.abs(n) < 1e-12 ? '0' : (+n.toFixed(d)).toString());
const dist = (a,b) => Math.hypot(b[0]-a[0], b[1]-a[1]);
const signed = n => (n >= 0 ? '+' + fmt(n) : fmt(n));

/* ═════ P5 · Plano cartesiano con cuadrantes ═════ */
function initPage5() {
  _makePlot('plot-5', {
    xMin:-6, xMax:6, yMin:-5, yMax:5, scale:40,
    objects: [
      { kind:'polygon', pts:[[0,0],[6,0],[6,5],[0,5]], fill:'rgba(16,185,129,.18)', color:'rgba(16,185,129,.0)' },
      { kind:'polygon', pts:[[0,0],[-6,0],[-6,5],[0,5]], fill:'rgba(132,204,22,.18)', color:'rgba(132,204,22,.0)' },
      { kind:'polygon', pts:[[0,0],[-6,0],[-6,-5],[0,-5]], fill:'rgba(245,158,11,.18)', color:'rgba(245,158,11,.0)' },
      { kind:'polygon', pts:[[0,0],[6,0],[6,-5],[0,-5]], fill:'rgba(249,115,22,.18)', color:'rgba(249,115,22,.0)' },
      { kind:'text', t:'I',   x: 3, y: 2.5, color:'#047857' },
      { kind:'text', t:'II',  x:-3, y: 2.5, color:'#4d7c0f' },
      { kind:'text', t:'III', x:-3, y:-2.5, color:'#b45309' },
      { kind:'text', t:'IV',  x: 3, y:-2.5, color:'#c2410c' },
    ]
  });
}

/* ═════ P6 · Localizador ═════ */
const locPts = [{x:3,y:4,c:'#1d4ed8'}, {x:-3,y:2,c:'#ef4444'}, {x:-5,y:-3,c:'#0f172a'}, {x:2,y:-1,c:'#f59e0b'}];
function initPage6() {
  renderPage6();
}
function renderPage6() {
  const objs = locPts.map((p,i) => ({ kind:'point', x:p.x, y:p.y, color:p.c, r:6, label:`P${i+1}(${p.x}, ${p.y})`, labelDx:8, labelDy:-8 }));
  _makePlot('plot-6', { xMin:-7, xMax:7, yMin:-5, yMax:5, scale:40, objects: objs });
}
function addLocPoint(){
  const x = parseFloat(document.getElementById('loc-x').value);
  const y = parseFloat(document.getElementById('loc-y').value);
  if (isNaN(x) || isNaN(y)) return;
  const colors = ['#1d4ed8','#ef4444','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899'];
  locPts.push({ x, y, c: colors[locPts.length % colors.length] });
  const q = (x>0&&y>0)?'I · (+, +)' : (x<0&&y>0)?'II · (−, +)' : (x<0&&y<0)?'III · (−, −)' : (x>0&&y<0)?'IV · (+, −)' : 'Sobre un eje';
  document.getElementById('loc-quad').textContent = q;
  renderPage6();
}
function clearLocPoints(){ locPts.length = 0; renderPage6(); document.getElementById('loc-quad').textContent = '—'; }

/* ═════ P7 · Distancia visual ═════ */
function initPage7() {
  const P1=[-4,2], P2=[3,5];
  _makePlot('plot-7', {
    xMin:-6, xMax:6, yMin:-1, yMax:7, scale:42,
    objects: [
      { kind:'polygon', pts:[P1,[P2[0],P1[1]],P2], fill:'rgba(245,158,11,.25)', color:'rgba(245,158,11,0)' },
      { kind:'segment', x1:P1[0], y1:P1[1], x2:P2[0], y2:P1[1], color:'#ef4444', dashed:true, label:'Δx = 7', labelDy:16 },
      { kind:'segment', x1:P2[0], y1:P1[1], x2:P2[0], y2:P2[1], color:'#2563eb', dashed:true, label:'Δy = 3', labelDx:20, labelDy:-10 },
      { kind:'segment', x1:P1[0], y1:P1[1], x2:P2[0], y2:P2[1], color:'#7c3aed', lineWidth:3, label:'d ≈ 7,62', labelDy:-14 },
      { kind:'rightAngle', v:[P2[0],P1[1]], a:P1, b:P2, color:'#111' },
      { kind:'point', x:P1[0], y:P1[1], color:'#ef4444', label:'P₁(−4, 2)', labelDy:-10 },
      { kind:'point', x:P2[0], y:P2[1], color:'#1d4ed8', label:'P₂(3, 5)',  labelDy:-10 },
    ]
  });
}

/* ═════ P8 · Calculadora de distancia ═════ */
function calcDist(){
  const x1=+document.getElementById('d-x1').value, y1=+document.getElementById('d-y1').value;
  const x2=+document.getElementById('d-x2').value, y2=+document.getElementById('d-y2').value;
  const dx=x2-x1, dy=y2-y1;
  const d = Math.hypot(dx, dy);
  document.getElementById('d-out').textContent = `Δx=${fmt(dx)} · Δy=${fmt(dy)} → d = √(${fmt(dx*dx)}+${fmt(dy*dy)}) = ${fmt(d)}`;
  _makePlot('plot-8', {
    xMin:Math.min(x1,x2)-2, xMax:Math.max(x1,x2)+2, yMin:Math.min(y1,y2)-2, yMax:Math.max(y1,y2)+2, scale:null,
    objects:[
      { kind:'polygon', pts:[[x1,y1],[x2,y1],[x2,y2]], fill:'rgba(245,158,11,.22)', color:'rgba(0,0,0,0)' },
      { kind:'segment', x1, y1, x2, y2:y1, color:'#ef4444', dashed:true, label:'Δx='+fmt(dx), labelDy:16 },
      { kind:'segment', x1:x2, y1, x2, y2, color:'#2563eb', dashed:true, label:'Δy='+fmt(dy), labelDx:20 },
      { kind:'segment', x1, y1, x2, y2, color:'#7c3aed', lineWidth:3, label:'d='+fmt(d), labelDy:-14 },
      { kind:'point', x:x1, y:y1, color:'#ef4444', label:`P₁(${x1},${y1})` },
      { kind:'point', x:x2, y:y2, color:'#1d4ed8', label:`P₂(${x2},${y2})` },
    ]
  });
}
function initPage8(){ calcDist(); }

/* ═════ P9 · Punto medio ═════ */
function calcMid(){
  const x1=+document.getElementById('m-x1').value, y1=+document.getElementById('m-y1').value;
  const x2=+document.getElementById('m-x2').value, y2=+document.getElementById('m-y2').value;
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  document.getElementById('m-out').textContent = `M = (${fmt(mx)}, ${fmt(my)})`;
  _makePlot('plot-9', {
    xMin:Math.min(x1,x2)-2, xMax:Math.max(x1,x2)+2, yMin:Math.min(y1,y2)-2, yMax:Math.max(y1,y2)+2, scale:null,
    objects:[
      { kind:'segment', x1, y1, x2, y2, color:'#475569', lineWidth:2 },

      objects:[

        { kind:'point', x:x2, y:y2, color:'#1d4ed8', label:'P₂' },

    });

    m = (y2-y1)/(x2-x1);

      xMin:-8, xMax:8, yMin:-7, yMax:7, scale:30,

/* ═════ P21 · distancia punto-recta ═════ */
function updDR(){
  const A=+document.getElementById('dr-A').value, B=+document.getElementById('dr-B').value, C=+document.getElementById('dr-C').value;
  const x=+document.getElementById('dr-x').value, y=+document.getElementById('dr-y').value;
  const num = Math.abs(A*x + B*y + C);
  const den = Math.hypot(A, B);
  if (den < 1e-9) { document.getElementById('dr-out').textContent = 'A y B no pueden ser ambos 0'; return; }
  const d = num/den;
  document.getElementById('dr-out').textContent = `d = |${fmt(A)}·${fmt(x)}+${fmt(B)}·${fmt(y)}${signed(C)}| / √(${fmt(A*A)}+${fmt(B*B)}) = ${fmt(num)} / ${fmt(den,3)} ≈ ${fmt(d,3)}`;
  // Pie perpendicular: proyección
  const k = (A*x + B*y + C)/(A*A + B*B);
  const px = x - A*k, py = y - B*k;
  const objs = [];
  if (Math.abs(B) > 1e-6) objs.push({ kind:'line', m:-A/B, b:-C/B, color:'#1d4ed8', lineWidth:3, label:`${fmt(A)}x ${signed(B)}y ${signed(C)} = 0`, labelX:-4 });
  else objs.push({ kind:'line', vertical: -C/A, color:'#1d4ed8', lineWidth:3 });
  objs.push({ kind:'segment', x1:x, y1:y, x2:px, y2:py, color:'#8b5cf6', dashed:true, lineWidth:2, label:`d=${fmt(d,2)}`, labelDx:10 });
  objs.push({ kind:'point', x, y, color:'#ef4444', r:7, label:`P(${x},${y})`, labelDy:-10 });
  objs.push({ kind:'point', x:px, y:py, color:'#f59e0b', r:5, label:'pie ⊥', labelDy:-10 });
  _makePlot('plot-21', { xMin:-6, xMax:8, yMin:-4, yMax:7, scale:32, objects: objs });
}
function initPage21(){ updDR(); }

/* ═════ P22 · Fórmula de Herón ═════ */
function updHeron(){
  const A=[+document.getElementById('h-ax').value, +document.getElementById('h-ay').value];
  const B=[+document.getElementById('h-bx').value, +document.getElementById('h-by').value];
  const C=[+document.getElementById('h-cx').value, +document.getElementById('h-cy').value];
  const a=dist(B,C), b=dist(A,C), c=dist(A,B);
  const P=a+b+c, s=P/2;
  const disc = s*(s-a)*(s-b)*(s-c);
  const area = disc > 0 ? Math.sqrt(disc) : 0;
  document.getElementById('h-lados').textContent = `a=${fmt(a)} · b=${fmt(b)} · c=${fmt(c)}`;
  document.getElementById('h-perim').textContent = `P=${fmt(P)} · s=${fmt(s)}`;
  document.getElementById('h-area').textContent  = `A ≈ ${fmt(area)} u²`;
  const xs=[A[0],B[0],C[0]], ys=[A[1],B[1],C[1]];
  _makePlot('plot-22', {
    xMin:Math.min(...xs)-2, xMax:Math.max(...xs)+2, yMin:Math.min(...ys)-2, yMax:Math.max(...ys)+2, scale:null,
    objects:[
      { kind:'polygon', pts:[A,B,C], fill:'rgba(245,158,11,.28)', color:'#f59e0b', lineWidth:2 },
      { kind:'point', x:A[0], y:A[1], color:'#ef4444', label:`A(${A[0]},${A[1]})` },
      { kind:'point', x:B[0], y:B[1], color:'#1d4ed8', label:`B(${B[0]},${B[1]})` },
      { kind:'point', x:C[0], y:C[1], color:'#10b981', label:`C(${C[0]},${C[1]})` }
    ]
  });
}

function updEco(){

}
