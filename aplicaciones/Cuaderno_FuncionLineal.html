/* ═════ P26 · QUIZ ═════ */
const QUIZ = [
  { q:"¿En qué cuadrante está el punto P(-4, 3)?", options:["I","II","III","IV"], answer:1, explain:"x<0, y>0 → II cuadrante." },
  { q:"Distancia entre P₁(1,2) y P₂(4,6):", options:["3","4","5","6"], answer:2, explain:"d = √(3²+4²) = √25 = 5." },
  { q:"Punto medio de (−2, 4) y (6, 0):", options:["(2, 2)","(4, 4)","(2, 4)","(0, 2)"], answer:0, explain:"M = ((−2+6)/2, (4+0)/2) = (2, 2)." },
  { q:"Pendiente de la recta que pasa por (0,0) y (4,8):", options:["0.5","1","2","4"], answer:2, explain:"m = (8−0)/(4−0) = 2." },
  { q:"Ecuación pendiente-intercepto con m=−3 y b=5:", options:["y=3x−5","y=−3x+5","y=5x−3","y=−3x−5"], answer:1, explain:"y = mx + b = −3x + 5." },
  { q:"¿Las rectas y = 2x + 1 y y = 2x − 5 son...?", options:["Iguales","Paralelas","Perpendiculares","Secantes"], answer:1, explain:"Tienen la misma pendiente m=2 → paralelas." },
  { q:"La recta perpendicular a y = −2x + 1 tiene pendiente:", options:["−2","2","−1/2","1/2"], answer:3, explain:"m₂ = −1/m₁ = −1/(−2) = 1/2." },
  { q:"Distancia de P(0,0) a la recta 3x + 4y − 10 = 0:", options:["1","2","3","4"], answer:1, explain:"d = |−10|/√(9+16) = 10/5 = 2." },
  { q:"La recta x = 5 es:", options:["Horizontal","Vertical","Creciente","Decreciente"], answer:1, explain:"x = constante → recta vertical." },
  { q:"El área de un triángulo por Herón con lados 3, 4, 5:", options:["5","6","7","12"], answer:1, explain:"s=6 → √(6·3·2·1) = √36 = 6." }
];
let quizIdx=0, quizScore=0, quizAnswered=false;
function renderQuiz(){
  const c=document.getElementById('quiz-container'); if(!c)return;
  if (quizIdx >= QUIZ.length){
    c.innerHTML = `<div class="example-box" style="text-align:center">
      <span class="example-title"><i class="fas fa-trophy"></i> ¡Quiz terminado!</span>
      <p style="font-size:1.1rem">Puntaje final: <strong>${quizScore} / ${QUIZ.length}</strong></p>
      <p>${quizScore===QUIZ.length?'¡Perfecto! 🎉':quizScore>=QUIZ.length*.7?'¡Muy bien! 👏':'Sigue practicando 💪'}</p>
    </div>`;
    return;
  }
  const q=QUIZ[quizIdx];
  c.innerHTML = `<div class="concept-box"><h4>Pregunta ${quizIdx+1} de ${QUIZ.length}</h4><p style="font-size:.95rem">${q.q}</p></div>` +
    q.options.map((o,i)=>`<button class="quiz-option" data-i="${i}">${String.fromCharCode(65+i)}) ${o}</button>`).join('');
  c.querySelectorAll('.quiz-option').forEach(btn=>{
    btn.onclick=()=>{
      if (quizAnswered) return;
      quizAnswered=true;
      const i=+btn.dataset.i, correct=i===q.answer;
      if (correct){ btn.classList.add('correct'); quizScore++; }
      else { btn.classList.add('wrong'); c.querySelectorAll('.quiz-option')[q.answer].classList.add('correct'); }
      document.getElementById('score-value').textContent = `${quizScore} / ${quizIdx+1}`;
      const exp=document.createElement('div'); exp.className='warning-box'; exp.style.marginTop='10px';
      exp.innerHTML=`<strong><i class="fas fa-lightbulb"></i> Explicación:</strong><p>${q.explain}</p>`;
      c.appendChild(exp);
    };
  });
}
window.nextQuestion = () => { if (!quizAnswered && quizIdx<QUIZ.length) return; quizIdx++; quizAnswered=false; renderQuiz(); };
window.restartQuiz  = () => { quizIdx=0; quizScore=0; quizAnswered=false; document.getElementById('score-value').textContent='0 / 0'; renderQuiz(); };
function initPage26(){ if (!document.querySelector('.quiz-option')) renderQuiz(); }

/* ═════ P27 · evaluador universal ═════ */
function updEval(){
  const x1=+document.getElementById('ev-x1').value, y1=+document.getElementById('ev-y1').value;
  const x2=+document.getElementById('ev-x2').value, y2=+document.getElementById('ev-y2').value;
  const d=Math.hypot(x2-x1,y2-y1);
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const objs=[];
  let mTxt, eqTxt;
  if (Math.abs(x2-x1) < 1e-6) {
    mTxt = 'm indefinida';
    eqTxt = `x = ${fmt(x1)} (vertical)`;
    objs.push({ kind:'line', vertical:x1, color:'#10b981', lineWidth:3 });
  } else {
    const m=(y2-y1)/(x2-x1), b=y1-m*x1;
    mTxt = `m = ${fmt(m,3)}`;
    eqTxt = `y = ${fmt(m,2)}x ${signed(b)}`;
    objs.push({ kind:'line', m, b, color:'#10b981', lineWidth:3, label:eqTxt, labelX:(x1+x2)/2 });
  }
  document.getElementById('ev-d').textContent = `d = ${fmt(d,3)}`;
  document.getElementById('ev-m').textContent = `M = (${fmt(mx)}, ${fmt(my)})`;
  document.getElementById('ev-p').textContent = mTxt;
  document.getElementById('ev-eq').textContent = eqTxt;
  objs.push({ kind:'polygon', pts:[[x1,y1],[x2,y1],[x2,y2]], fill:'rgba(245,158,11,.22)', color:'rgba(0,0,0,0)' });
  objs.push({ kind:'segment', x1, y1, x2, y2:y1, color:'#ef4444', dashed:true, label:'Δx', labelDy:14 });
  objs.push({ kind:'segment', x1:x2, y1, x2, y2, color:'#2563eb', dashed:true, label:'Δy', labelDx:18 });
  objs.push({ kind:'point', x:x1, y:y1, color:'#ef4444', label:`P₁(${x1},${y1})` });
  objs.push({ kind:'point', x:x2, y:y2, color:'#1d4ed8', label:`P₂(${x2},${y2})` });
  objs.push({ kind:'point', x:mx, y:my, color:'#8b5cf6', r:7, label:`M`, labelDy:-10 });
  _makePlot('plot-27', {
    xMin:Math.min(x1,x2)-2, xMax:Math.max(x1,x2)+2, yMin:Math.min(y1,y2)-2, yMax:Math.max(y1,y2)+2, scale:null,
    objects: objs
  });
}
function initPage27(){ updEval(); }

/* ═════ Mapa conceptual SVG ═════ */
function drawConceptMap(){
  const svg=document.getElementById('cm-svg'); if(!svg)return;
  const lines=[
    [50,10,18,36],[50,10,50,36],[50,10,82,36],
    [18,36,8,70],[18,36,22,70],[18,36,15,92],
    [50,36,42,70],[50,36,58,70],[50,36,50,92],
    [82,36,76,70],[82,36,92,70],[82,36,84,92]
  ];
  svg.innerHTML = lines.map(([x1,y1,x2,y2]) => `<line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%" stroke="rgba(29,78,216,0.4)" stroke-width="2" stroke-dasharray="5,4"/>`).join('');
}

/* ══════════════════════════════════════════════════════════
   🎬 RUNTIME — Navegación del libro
   ══════════════════════════════════════════════════════════ */
window.currentPage = 0;
let mobileView = 'left';

document.addEventListener('DOMContentLoaded', () => {
  initSpine(); render(); handleResize();
  window.addEventListener('resize', handleResize);
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') nextPage();
    if (e.key === 'ArrowLeft')  prevPage();
    if (e.key === 'Escape')     hideIndex();
  });
  if (localStorage.getItem('flin-theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('theme-icon').className = 'fas fa-sun';
  }
});

function initSpine(){
  const s  = document.getElementById('spine');
  const hL = document.getElementById('holes-l');
  const hR = document.getElementById('holes-r');
  s.innerHTML = hL.innerHTML = hR.innerHTML = '';
  for (let i = 0; i < 15; i++) {
    s.innerHTML  += '<div class="metal-ring"></div>';
    hL.innerHTML += '<div class="paper-hole"></div>';
    hR.innerHTML += '<div class="paper-hole"></div>';
  }
}

function render(){
  const d = BOOK_DATA[window.currentPage];
  document.getElementById('c-left').innerHTML  = d.left.html;
  document.getElementById('c-right').innerHTML = d.right.html;
  document.getElementById('page-num').innerText =
    window.currentPage === 0 ? "PORTADA"
                             : `HOJA ${window.currentPage} / ${BOOK_DATA.length - 1}`;
  document.getElementById('btn-prev').disabled = window.currentPage === 0;
  document.getElementById('btn-next').disabled = window.currentPage === BOOK_DATA.length - 1;
  document.getElementById('num-left').innerText  = window.currentPage > 0 ? window.currentPage * 2 : '';
  document.getElementById('num-right').innerText = window.currentPage * 2 + 1;
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise().catch(()=>{});
  handleResize();
  setTimeout(initDiagrams, 120);
}

window.nextPage = () => { if (window.currentPage < BOOK_DATA.length - 1) { window.currentPage++; animatePage(1); } };
window.prevPage = () => { if (window.currentPage > 0)                    { window.currentPage--; animatePage(-1); } };
window.goToPage = n  => { window.currentPage = n; render(); };

function animatePage(dir){
  const b = document.getElementById('book-el');
  b.style.transform = `rotateY(${dir * -4}deg) scale(.98)`;
  setTimeout(() => { render(); b.style.transform = 'rotateY(0) scale(1)'; }, 250);
}

window.showIndex = () => {
  const m = document.getElementById('index-modal');
  const l = document.getElementById('index-list');
  l.innerHTML = '';
  BOOK_DATA.forEach((p, i) => {
    const it = document.createElement('div');
    it.className = 'index-item';
    it.innerHTML = `<strong>${i}.</strong> ${p.title}`;
    it.onclick = () => { goToPage(i); hideIndex(); };
    l.appendChild(it);
  });
  m.classList.add('active');
};
window.hideIndex = () => document.getElementById('index-modal').classList.remove('active');

window.toggleTheme = () => {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('flin-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
  // Redibujar todos los plots (por tema)
  Object.values(window._plots || {}).forEach(p => p && p.draw());
};

function handleResize(){
  const isMob = window.innerWidth <= 900;
  const l = document.getElementById('p-left');
  const r = document.getElementById('p-right');
  if (isMob) {
    if (mobileView === 'left') { l.style.display='flex'; r.style.display='none'; document.getElementById('fab-text').textContent='Ver Der.'; }
    else                        { l.style.display='none'; r.style.display='flex'; document.getElementById('fab-text').textContent='Ver Izq.'; }
  } else { l.style.display='flex'; r.style.display='flex'; }
  // Tras el resize, refitear los plots visibles
  Object.values(window._plots || {}).forEach(p => { if (p && p.cv.offsetParent) { p._fit(); p.draw(); } });
}
window.toggleMobileSide = () => { mobileView = mobileView === 'left' ? 'right' : 'left'; handleResize(); };

function initDiagrams(){
  // Limpia referencias anteriores
  window._plots = {};
  const p = window.currentPage;
  const map = {
    4:  drawConceptMap,
    5:  initPage5,  6: initPage6, 7: initPage7, 8: initPage8, 9: initPage9, 10: initPage10,
    11: initPage11, 12: initPage12, 13: initPage13, 14: initPage14, 15: initPage15,
    16: initPage16, 17: initPage17, 18: initPage18, 19: initPage19, 20: initPage20,
    21: initPage21, 22: initPage22, 23: initPage23, 24: initPage24, 25: initPage25,
    26: initPage26, 27: initPage27
  };
  if (map[p]) try { map[p](); } catch(e){ console.warn('Diagram init error p'+p, e); }
}
</script>
