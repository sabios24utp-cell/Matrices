<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo degradado esmeralda (color de la plataforma) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6ee7b7;stop-opacity:1"/>
    </linearGradient>
    <!-- Sombra suave para el texto -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Borde redondeado (maskable: zona segura 80%) -->
    <clipPath id="round">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Brillo sutil en la esquina superior izquierda -->
  <ellipse cx="130" cy="110" rx="160" ry="120" fill="rgba(255,255,255,0.06)"/>

  <!-- Símbolo principal: integral ∫ estilizada -->
  <text
    x="146"
    y="330"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="270"
    font-weight="400"
    font-style="italic"
    fill="url(#glow)"
    filter="url(#shadow)"
    letter-spacing="-10">∫</text>

  <!-- Símbolo secundario: π pequeño arriba a la derecha -->
  <text
    x="302"
    y="215"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    font-weight="700"
    fill="rgba(167,243,208,0.85)"
    filter="url(#shadow)">π</text>

  <!-- Línea decorativa inferior -->
  <rect x="80" y="400" width="352" height="4" rx="2" fill="rgba(52,211,153,0.4)"/>

  <!-- Texto "MAT" pequeño en la parte inferior -->
  <text
    x="256"
    y="462"
    font-family="'Poppins', 'Nunito', Arial, sans-serif"
    font-size="56"
    font-weight="700"
    fill="rgba(167,243,208,0.7)"
    text-anchor="middle"
    letter-spacing="12">MAT</text>
</svg>
